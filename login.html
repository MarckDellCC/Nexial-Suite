<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Nexial Suite Login</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    
    <!-- ESTILOS COMPLETAMENTE INCORPORADOS -->
    <style>
        /* RESET CSS */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        /* ESTILOS GENERALES */
        body {
            font-family: system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
            background-color: #0f172a;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }
        
        /* CONTENEDOR PRINCIPAL */
        .login-container {
            width: 100%;
            max-width: 400px;
            background: white;
            border-radius: 16px;
            padding: 40px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
        }
        
        /* LOGO Y TÍTULO */
        .logo-container {
            text-align: center;
            margin-bottom: 40px;
        }
        
        .logo-icon {
            display: inline-block;
            width: 80px;
            height: 80px;
            background: linear-gradient(135deg, #7c3aed 0%, #00f5ff 100%);
            border-radius: 20px;
            margin-bottom: 20px;
            position: relative;
        }
        
        .logo-icon::before {
            content: "🧠";
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            font-size: 40px;
            filter: brightness(0) invert(1);
        }
        
        .company-name {
            font-size: 32px;
            font-weight: 800;
            background: linear-gradient(135deg, #7c3aed 0%, #00f5ff 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin-bottom: 8px;
        }
        
        .company-tagline {
            color: #64748b;
            font-size: 14px;
            font-weight: 500;
            letter-spacing: 1.5px;
            text-transform: uppercase;
        }
        
        /* FORMULARIO */
        .form-group {
            margin-bottom: 24px;
        }
        
        label {
            display: block;
            margin-bottom: 8px;
            color: #334155;
            font-weight: 600;
            font-size: 14px;
        }
        
        input {
            width: 100%;
            padding: 14px;
            border: 2px solid #e2e8f0;
            border-radius: 10px;
            font-size: 16px;
            background: white;
            transition: border-color 0.3s;
        }
        
        input:focus {
            outline: none;
            border-color: #7c3aed;
            box-shadow: 0 0 0 3px rgba(124, 58, 237, 0.1);
        }
        
        .password-container {
            position: relative;
        }
        
        .toggle-password {
            position: absolute;
            right: 12px;
            top: 50%;
            transform: translateY(-50%);
            background: none;
            border: none;
            color: #64748b;
            cursor: pointer;
            font-size: 20px;
            padding: 5px;
        }
        
        .login-btn {
            width: 100%;
            padding: 16px;
            background: linear-gradient(135deg, #7c3aed 0%, #00f5ff 100%);
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            margin-top: 10px;
            transition: transform 0.2s;
        }
        
        .login-btn:hover {
            transform: translateY(-2px);
        }
        
        .login-btn:active {
            transform: translateY(0);
        }
        
        .login-btn:disabled {
            opacity: 0.6;
            cursor: not-allowed;
            transform: none;
        }
        
        /* MENSAJES DE ERROR */
        .error-message {
            background: #fee2e2;
            color: #dc2626;
            padding: 14px;
            border-radius: 8px;
            margin-bottom: 24px;
            font-size: 14px;
            display: none;
        }
        
        .loading {
            text-align: center;
            color: #64748b;
            margin-top: 15px;
            font-size: 14px;
            display: none;
        }
        
        .spinner {
            display: inline-block;
            width: 18px;
            height: 18px;
            border: 3px solid rgba(124, 58, 237, 0.2);
            border-radius: 50%;
            border-top-color: #7c3aed;
            animation: spin 1s linear infinite;
            margin-right: 8px;
            vertical-align: middle;
        }
        
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        
        /* PIE DE PÁGINA */
        .footer-text {
            text-align: center;
            margin-top: 30px;
            color: #94a3b8;
            font-size: 12px;
            border-top: 1px solid #e2e8f0;
            padding-top: 20px;
        }
        
        /* RESPONSIVE */
        @media (max-width: 480px) {
            .login-container {
                padding: 30px 20px;
            }
            
            .company-name {
                font-size: 28px;
            }
            
            .logo-icon {
                width: 70px;
                height: 70px;
            }
            
            .logo-icon::before {
                font-size: 35px;
            }
        }
    </style>
</head>
<body>
    <div class="login-container">
        <div class="logo-container">
            <div class="logo-icon"></div>
            <div class="company-name">NEXIAL SUITE</div>
            <div class="company-tagline">Enterprise Platform</div>
        </div>
        
        <div id="errorMessage" class="error-message"></div>
        
        <form id="loginForm">
            <div class="form-group">
                <label for="email">Email Corporativo</label>
                <input type="email" id="email" required placeholder="ejemplo@empresa.com">
            </div>
            
            <div class="form-group">
                <label for="password">Contraseña</label>
                <div class="password-container">
                    <input type="password" id="password" required minlength="12" placeholder="••••••••••••">
                    <button type="button" class="toggle-password" id="togglePassword">
                        👁️
                    </button>
                </div>
                <div style="font-size: 12px; color: #64748b; margin-top: 5px;">Mínimo 12 caracteres</div>
            </div>
            
            <button type="submit" class="login-btn" id="loginBtn">Acceder al Sistema</button>
        </form>
        
        <div id="loading" class="loading">
            <span class="spinner"></span>
            <span>Verificando credenciales...</span>
        </div>
        
        <div class="footer-text">
            &copy; 2024 Nexial Suite. Todos los derechos reservados.<br>
            Sistema Corporativo Multi-Empresa
        </div>
    </div>

    <!-- JAVASCRIPT INCORPORADO -->
    <script>
        // Inicializar cuando la página cargue
        window.onload = function() {
            console.log('✅ Nexial Suite Login - Cargado');
            
            // Configurar eventos
            setupEventListeners();
            
            // Enfocar campo email
            setTimeout(() => {
                document.getElementById('email').focus();
            }, 100);
        };

        function setupEventListeners() {
            // Toggle para mostrar/ocultar contraseña
            const toggleBtn = document.getElementById('togglePassword');
            toggleBtn.addEventListener('click', function() {
                const passwordInput = document.getElementById('password');
                if (passwordInput.type === 'password') {
                    passwordInput.type = 'text';
                    this.innerHTML = '🙈';
                } else {
                    passwordInput.type = 'password';
                    this.innerHTML = '👁️';
                }
            });

            // Manejar el formulario de login
            const loginForm = document.getElementById('loginForm');
            loginForm.addEventListener('submit', async function(e) {
                e.preventDefault();
                
                const email = document.getElementById('email').value.trim();
                const password = document.getElementById('password').value;
                const errorDiv = document.getElementById('errorMessage');
                const loginBtn = document.getElementById('loginBtn');
                const loading = document.getElementById('loading');

                // Limpiar error anterior
                errorDiv.style.display = 'none';
                errorDiv.textContent = '';

                // Validaciones
                if (!email || !email.includes('@')) {
                    errorDiv.textContent = 'Ingrese un email válido';
                    errorDiv.style.display = 'block';
                    return;
                }

                if (!password || password.length < 12) {
                    errorDiv.textContent = 'La contraseña debe tener al menos 12 caracteres';
                    errorDiv.style.display = 'block';
                    return;
                }

                // Mostrar loading
                loginBtn.disabled = true;
                loginBtn.textContent = 'Verificando...';
                loading.style.display = 'block';

                try {
                    // SIMULACIÓN DE LOGIN PARA PRUEBAS
                    // En producción, aquí iría la conexión real con Supabase
                    
                    // Por ahora, simulamos un login exitoso después de 1.5 segundos
                    setTimeout(() => {
                        loginBtn.disabled = false;
                        loginBtn.textContent = 'Acceder al Sistema';
                        loading.style.display = 'none';
                        
                        // Redirigir al panel
                        window.location.href = 'director_corporativo.html';
                    }, 1500);
                    
                } catch (error) {
                    console.error('Error de login:', error);
                    errorDiv.textContent = 'Error: ' + error.message;
                    errorDiv.style.display = 'block';
                    
                    // Restaurar botón
                    loginBtn.disabled = false;
                    loginBtn.textContent = 'Acceder al Sistema';
                    loading.style.display = 'none';
                }
            });

            // Login con Enter
            document.addEventListener('keypress', function(e) {
                if (e.key === 'Enter') {
                    const loginBtn = document.getElementById('loginBtn');
                    if (!loginBtn.disabled) {
                        loginBtn.click();
                    }
                }
            });
        }
    </script>
</body>
</html>
