<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Iniciar Sesión - Nexial Suite</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: 'Segoe UI', system-ui, sans-serif;
            background: #0a0a1f;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            color: #fff;
        }
        .login-container {
            background: rgba(255,255,255,0.05);
            backdrop-filter: blur(10px);
            border-radius: 16px;
            padding: 2.5rem;
            width: 100%;
            max-width: 400px;
            box-shadow: 0 8px 32px rgba(0,0,0,0.3);
            border: 1px solid rgba(0,102,255,0.2);
        }
        .logo {
            text-align: center;
            margin-bottom: 2rem;
        }
        .logo i {
            font-size: 4rem;
            background: linear-gradient(45deg, #0066ff, #00f5ff, #0099ff);
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
            animation: glow 2s infinite alternate;
            filter: drop-shadow(0 0 10px rgba(0,102,255,0.5));
        }
        @keyframes glow {
            0% { filter: drop-shadow(0 0 6px rgba(0,102,255,0.3)); }
            100% { filter: drop-shadow(0 0 18px rgba(0,102,255,0.8)) drop-shadow(0 0 25px rgba(0,245,255,0.5)); }
        }
        h2 { text-align: center; margin-bottom: 1.5rem; font-weight: 500; }
        .form-group { margin-bottom: 1rem; }
        label { display: block; margin-bottom: 0.5rem; font-size: 0.9rem; color: #aaa; }
        input {
            width: 100%;
            padding: 12px;
            border: 1px solid rgba(255,255,255,0.1);
            background: rgba(255,255,255,0.05);
            color: #fff;
            border-radius: 8px;
            font-size: 1rem;
            outline: none;
            transition: border-color 0.3s;
        }
        input:focus { border-color: #0066ff; }
        button {
            width: 100%;
            padding: 12px;
            background: linear-gradient(45deg, #0066ff, #0099ff);
            border: none;
            color: #fff;
            font-size: 1rem;
            font-weight: 600;
            border-radius: 8px;
            cursor: pointer;
            margin-top: 1rem;
            transition: opacity 0.3s;
        }
        button:hover { opacity: 0.9; }
        button:disabled { opacity: 0.5; cursor: not-allowed; }
        .error-message {
            color: #e74c3c;
            font-size: 0.9rem;
            text-align: center;
            margin-top: 0.5rem;
            display: none;
        }
    </style>
</head>
<body>
    <div class="login-container">
        <div class="logo">
            <!-- Ícono de cerebro (Font Awesome) -->
            <i class="fas fa-brain"></i>
        </div>
        <h2>Nexial Suite</h2>
        <form id="loginForm">
            <div class="form-group">
                <label for="email">Correo electrónico</label>
                <input type="email" id="email" placeholder="ejemplo@correo.com" required autofocus>
            </div>
            <div class="form-group">
                <label for="password">Contraseña</label>
                <input type="password" id="password" placeholder="Ingresa tu contraseña" required>
            </div>
            <button type="submit" id="submitBtn">Iniciar sesión</button>
            <div class="error-message" id="errorMsg"></div>
        </form>
    </div>

    <!-- Font Awesome para el ícono del cerebro -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <script>
        const SUPABASE_URL = 'https://syoienwxlmauitopxone.supabase.co';
        const SUPABASE_ANON_KEY = 'sb_publishable_BlxURubQbfvoRUIlXDEwUA_DYx3jAt3';

        // Crear cliente de Supabase
        const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

        const form = document.getElementById('loginForm');
        const errorMsg = document.getElementById('errorMsg');
        const submitBtn = document.getElementById('submitBtn');

        form.addEventListener('submit', async (e) => {
            e.preventDefault();
            const email = document.getElementById('email').value.trim();
            const password = document.getElementById('password').value;

            if (!email || !password) {
                showError('Por favor completa todos los campos.');
                return;
            }

            submitBtn.disabled = true;
            submitBtn.textContent = 'Ingresando...';
            errorMsg.style.display = 'none';

            try {
                // Llamar a la función login_user definida en el SQL
                const { data, error } = await supabase.rpc('login_user', {
                    p_email: email,
                    p_password: password
                });

                if (error) {
                    console.error('Error RPC:', error);
                    showError('Error de conexión. Intenta de nuevo más tarde.');
                    return;
                }

                // La función devuelve una tabla; si no coincide, data estará vacío
                if (!data || data.length === 0) {
                    showError('Credenciales incorrectas. Verifica tu email y contraseña.');
                    return;
                }

                const user = data[0]; // primer (y único) registro
                // Guardar datos en localStorage para usar en la sesión
                localStorage.setItem('user_id', user.id);
                localStorage.setItem('user_empresa_id', user.empresa_id);
                localStorage.setItem('user_nombres', user.nombres);
                localStorage.setItem('user_apellido_paterno', user.apellido_paterno);
                localStorage.setItem('user_email', user.email);
                localStorage.setItem('user_rol', user.rol);

                // Redirigir según el rol
                if (user.rol === 'Director Corporativo') {
                    window.location.href = 'director_corporativo.html';
                } else {
                    // Puedes agregar más redirecciones para otros roles aquí
                    // Por ahora, redirigimos a un panel genérico o mostramos mensaje
                    alert('Inicio de sesión exitoso. Rol: ' + user.rol);
                    // Por ejemplo: window.location.href = 'panel_general.html';
                }
            } catch (err) {
                console.error('Error inesperado:', err);
                showError('Error inesperado. Intenta nuevamente.');
            } finally {
                submitBtn.disabled = false;
                submitBtn.textContent = 'Iniciar sesión';
            }
        });

        function showError(message) {
            errorMsg.textContent = message;
            errorMsg.style.display = 'block';
            // Ocultar después de 5 segundos
            clearTimeout(window.errorTimeout);
            window.errorTimeout = setTimeout(() => {
                errorMsg.style.display = 'none';
            }, 5000);
        }
    </script>
</body>
</html>
