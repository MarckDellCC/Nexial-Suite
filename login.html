<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <meta http-equiv="Pragma" content="no-cache">
    <meta http-equiv="Expires" content="0">
    <title>Nexial Suite</title>
    <link rel="shortcut icon" type="image/x-icon" href="data:image/x-icon;base64,iVBORw0KGgoAAAANSUhEUgAAABAAAAAQCAYAAAAf8/9hAAAACXBIWXMAAAsTAAALEwEAmpwYAAAAXElEQVQ4T2NkQANMTEz/YXxGvIqRGWEVMjAwMDAyMjJgM4gBZgg2xVANMLUYhqAbgNcL6IYw4jOAEZsXcBqAbggjPgMYcRmC1wB0QxjxGcCIzRAGQgAARU4bE9A4l9IAAAAASUVORK5CYII=">
    <style>
        /* RESET COMPLETO */
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body {
            font-family: Arial, Helvetica, sans-serif;
            background: #0f172a;
            color: white;
            height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: 20px;
            text-align: center;
        }
        
        .logo {
            font-size: 50px;
            margin-bottom: 20px;
        }
        
        h1 {
            font-size: 40px;
            background: linear-gradient(45deg, #7c3aed, #00f5ff);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 10px;
        }
        
        .subtitle {
            color: #94a3b8;
            margin-bottom: 40px;
            font-size: 14px;
            letter-spacing: 2px;
        }
        
        .login-box {
            background: white;
            color: black;
            padding: 30px;
            border-radius: 15px;
            width: 100%;
            max-width: 400px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.3);
        }
        
        .input-group {
            margin-bottom: 20px;
            text-align: left;
        }
        
        label {
            display: block;
            color: #475569;
            font-weight: bold;
            margin-bottom: 8px;
            font-size: 14px;
        }
        
        input {
            width: 100%;
            padding: 12px 15px;
            border: 2px solid #e2e8f0;
            border-radius: 8px;
            font-size: 16px;
        }
        
        input:focus {
            outline: none;
            border-color: #7c3aed;
        }
        
        .password-container {
            position: relative;
        }
        
        .toggle-password {
            position: absolute;
            right: 10px;
            top: 50%;
            transform: translateY(-50%);
            background: none;
            border: none;
            font-size: 18px;
            cursor: pointer;
        }
        
        .login-btn {
            width: 100%;
            padding: 15px;
            background: linear-gradient(45deg, #7c3aed, #00f5ff);
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            margin-top: 10px;
        }
        
        .login-btn:hover {
            opacity: 0.9;
        }
        
        .footer {
            margin-top: 30px;
            color: #64748b;
            font-size: 12px;
        }
        
        .error {
            background: #fee2e2;
            color: #dc2626;
            padding: 12px;
            border-radius: 8px;
            margin-bottom: 20px;
            display: none;
        }
    </style>
</head>
<body>
    <div class="logo">🧠</div>
    <h1>NEXIAL SUITE</h1>
    <div class="subtitle">ENTERPRISE PLATFORM</div>
    
    <div class="login-box">
        <div class="error" id="errorMsg"></div>
        
        <form id="loginForm">
            <div class="input-group">
                <label>Email Corporativo</label>
                <input type="email" id="email" placeholder="admin@nexialsuite.com" required>
            </div>
            
            <div class="input-group">
                <label>Contraseña</label>
                <div class="password-container">
                    <input type="password" id="password" placeholder="••••••••••••" required minlength="12">
                    <button type="button" class="toggle-password" id="toggleBtn">👁️</button>
                </div>
                <small style="color: #64748b; font-size: 12px;">Mínimo 12 caracteres</small>
            </div>
            
            <button type="submit" class="login-btn" id="loginBtn">ACCEDER AL SISTEMA</button>
        </form>
        
        <div class="footer">
            © 2024 Nexial Suite - Sistema Corporativo
        </div>
    </div>

    <script>
        // Forzar recarga sin cache
        if (window.performance) {
            if (performance.navigation.type === 1) {
                console.log("Página recargada");
            }
        }
        
        // Toggle password visibility
        document.getElementById('toggleBtn').onclick = function() {
            const passwordInput = document.getElementById('password');
            if (passwordInput.type === 'password') {
                passwordInput.type = 'text';
                this.textContent = '🙈';
            } else {
                passwordInput.type = 'password';
                this.textContent = '👁️';
            }
        };
        
        // Handle login form
        document.getElementById('loginForm').onsubmit = function(e) {
            e.preventDefault();
            
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            const errorDiv = document.getElementById('errorMsg');
            const loginBtn = document.getElementById('loginBtn');
            
            // Clear previous error
            errorDiv.style.display = 'none';
            errorDiv.textContent = '';
            
            // Validate
            if (!email.includes('@')) {
                errorDiv.textContent = 'Por favor ingrese un email válido';
                errorDiv.style.display = 'block';
                return;
            }
            
            if (password.length < 12) {
                errorDiv.textContent = 'La contraseña debe tener al menos 12 caracteres';
                errorDiv.style.display = 'block';
                return;
            }
            
            // Show loading
            loginBtn.textContent = 'VERIFICANDO...';
            loginBtn.disabled = true;
            
            // Simulate login (replace with actual Supabase login)
            setTimeout(() => {
                // For demo, always redirect
                window.location.href = 'director_corporativo.html';
            }, 1000);
        };
        
        // Auto-focus email field
        setTimeout(() => {
            document.getElementById('email').focus();
        }, 500);
    </script>
</body>
</html>
