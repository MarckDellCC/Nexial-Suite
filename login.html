<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Nexial Suite</title>
    <!-- Favicon embebido - NO EXTERNO -->
    <link rel="icon" href="data:image/svg+xml;base64,PHN2ZyB4bWxucz0iaHR0cDovL3d3dy53My5vcmcvMjAwMC9zdmciIHZpZXdCb3g9IjAgMCAxMDAgMTAwIj48dGV4dCB5PSIuOWVtIiBmb250LXNpemU9IjcwIiBmaWxsPSJ1cmwoI2dyYWRpZW50KSI+wqDCoDwvdGV4dD48ZGVmcz48bGluZWFyR3JhZGllbnQgaWQ9ImdyYWRpZW50IiB4MT0iMCUiIHkxPSIwJSIgeDI9IjEwMCUiIHkyPSIxMDAlIj48c3RvcCBvZmZzZXQ9IjAlIiBzdG9wLWNvbG9yPSIjN2MzYWVkIi8+PHN0b3Agb2Zmc2V0PSIxMDAlIiBzdG9wLWNvbG9yPSIjMDBmNWZmIi8+PC9saW5lYXJHcmFkaWVudD48L2RlZnM+PC9zdmc+">
    
    <!-- ESTILOS COMPLETAMENTE INCORPORADOS -->
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, sans-serif;
        }
        
        body {
            background: linear-gradient(135deg, #0f172a 0%, #1e293b 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }
        
        .login-container {
            width: 100%;
            max-width: 420px;
            background: rgba(255, 255, 255, 0.98);
            border-radius: 16px;
            padding: 40px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
        }
        
        .logo-container {
            text-align: center;
            margin-bottom: 40px;
        }
        
        /* Icono usando Unicode y CSS - NO FontAwesome */
        .nexial-logo-icon {
            display: inline-block;
            width: 80px;
            height: 80px;
            background: linear-gradient(45deg, #7c3aed, #00f5ff);
            border-radius: 20px;
            margin-bottom: 20px;
            position: relative;
            box-shadow: 0 10px 30px rgba(124, 58, 237, 0.3);
        }
        
        .nexial-logo-icon::before {
            content: "🧠";
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            font-size: 40px;
            filter: brightness(0) invert(1);
        }
        
        .company-name {
            font-size: 32px;
            font-weight: 800;
            background: linear-gradient(45deg, #7c3aed, #00f5ff);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            margin-bottom: 8px;
            letter-spacing: 0.5px;
        }
        
        .company-tagline {
            color: #64748b;
            font-size: 14px;
            font-weight: 500;
            letter-spacing: 1.5px;
            text-transform: uppercase;
        }
        
        .form-group {
            margin-bottom: 24px;
        }
        
        label {
            display: block;
            margin-bottom: 8px;
            color: #334155;
            font-weight: 600;
            font-size: 14px;
        }
        
        input {
            width: 100%;
            padding: 14px 16px;
            border: 2px solid #e2e8f0;
            border-radius: 10px;
            font-size: 16px;
            background: white;
            transition: border-color 0.3s;
        }
        
        input:focus {
            outline: none;
            border-color: #7c3aed;
        }
        
        .password-container {
            position: relative;
        }
        
        .toggle-password {
            position: absolute;
            right: 12px;
            top: 50%;
            transform: translateY(-50%);
            background: none;
            border: none;
            color: #94a3b8;
            cursor: pointer;
            font-size: 20px;
        }
        
        .login-btn {
            width: 100%;
            padding: 16px;
            background: linear-gradient(45deg, #7c3aed, #00f5ff);
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            margin-top: 10px;
            transition: transform 0.2s;
        }
        
        .login-btn:hover {
            transform: translateY(-2px);
        }
        
        .login-btn:active {
            transform: translateY(0);
        }
        
        .login-btn:disabled {
            opacity: 0.6;
            cursor: not-allowed;
            transform: none;
        }
        
        .error-message {
            background: #fee2e2;
            color: #dc2626;
            padding: 14px;
            border-radius: 8px;
            margin-bottom: 24px;
            font-size: 14px;
            display: none;
        }
        
        .loading {
            text-align: center;
            color: #64748b;
            margin-top: 15px;
            font-size: 14px;
            display: none;
        }
        
        .spinner {
            display: inline-block;
            width: 18px;
            height: 18px;
            border: 3px solid rgba(124, 58, 237, 0.2);
            border-radius: 50%;
            border-top-color: #7c3aed;
            animation: spin 1s linear infinite;
            margin-right: 8px;
            vertical-align: middle;
        }
        
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        
        .footer-text {
            text-align: center;
            margin-top: 30px;
            color: #94a3b8;
            font-size: 12px;
            border-top: 1px solid #e2e8f0;
            padding-top: 20px;
        }
        
        @media (max-width: 480px) {
            .login-container {
                padding: 30px 20px;
            }
            
            .company-name {
                font-size: 28px;
            }
            
            .nexial-logo-icon {
                width: 70px;
                height: 70px;
            }
            
            .nexial-logo-icon::before {
                font-size: 36px;
            }
        }
    </style>
</head>
<body>
    <div class="login-container">
        <div class="logo-container">
            <div class="nexial-logo-icon"></div>
            <div class="company-name">NEXIAL SUITE</div>
            <div class="company-tagline">Enterprise Platform</div>
        </div>
        
        <div id="errorMessage" class="error-message"></div>
        
        <form id="loginForm">
            <div class="form-group">
                <label for="email">Email Corporativo</label>
                <input type="email" id="email" required placeholder="ejemplo@empresa.com">
            </div>
            
            <div class="form-group">
                <label for="password">Contraseña</label>
                <div class="password-container">
                    <input type="password" id="password" required minlength="12" placeholder="••••••••••••">
                    <button type="button" class="toggle-password" id="togglePassword">
                        👁️
                    </button>
                </div>
                <div style="font-size: 12px; color: #64748b; margin-top: 5px;">Mínimo 12 caracteres</div>
            </div>
            
            <button type="submit" class="login-btn" id="loginBtn">Acceder al Sistema</button>
        </form>
        
        <div id="loading" class="loading">
            <span class="spinner"></span>
            <span>Verificando credenciales...</span>
        </div>
        
        <div class="footer-text">
            &copy; 2024 Nexial Suite. Todos los derechos reservados.<br>
            Sistema Corporativo Multi-Empresa
        </div>
    </div>

    <script>
        // Inicializar cuando la página cargue
        document.addEventListener('DOMContentLoaded', function() {
            console.log('Nexial Suite Login - Inicializando...');
            
            // Inicializar Supabase
            initializeSupabase();
            
            // Configurar eventos
            setupEventListeners();
            
            // Enfocar campo email
            setTimeout(() => {
                document.getElementById('email').focus();
            }, 100);
        });

        function initializeSupabase() {
            try {
                // URL de Supabase (tú la proporcionaste)
                const SUPABASE_URL = 'https://tjtpdxeoxissrpdrhqbc.supabase.co';
                const SUPABASE_KEY = 'sb_publishable_yH2lzZ_AWTvHsxW4TI2yYw_KnY5krtq';
                
                // Verificar que Supabase exista
                if (typeof supabase === 'undefined') {
                    // Cargar Supabase dinámicamente si no está disponible
                    const script = document.createElement('script');
                    script.src = 'https://unpkg.com/@supabase/supabase-js@2/dist/umd/supabase.js';
                    script.onload = function() {
                        window.supabase = supabase;
                        setupSupabaseClient();
                    };
                    document.head.appendChild(script);
                } else {
                    setupSupabaseClient();
                }
                
                function setupSupabaseClient() {
                    // Crear cliente (usando window.supabase si está disponible)
                    const supabaseClient = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
                    window.supabaseClient = supabaseClient;
                    console.log('Supabase inicializado');
                }
                
            } catch (error) {
                console.error('Error inicializando Supabase:', error);
                document.getElementById('errorMessage').textContent = 'Error de conexión. Recargue la página.';
                document.getElementById('errorMessage').style.display = 'block';
            }
        }

        function setupEventListeners() {
            // Toggle para mostrar/ocultar contraseña
            document.getElementById('togglePassword').addEventListener('click', function() {
                const passwordInput = document.getElementById('password');
                if (passwordInput.type === 'password') {
                    passwordInput.type = 'text';
                    this.innerHTML = '🙈';
                } else {
                    passwordInput.type = 'password';
                    this.innerHTML = '👁️';
                }
            });

            // Manejar el formulario de login
            document.getElementById('loginForm').addEventListener('submit', async function(e) {
                e.preventDefault();
                
                const email = document.getElementById('email').value.trim();
                const password = document.getElementById('password').value;
                const errorDiv = document.getElementById('errorMessage');
                const loginBtn = document.getElementById('loginBtn');
                const loading = document.getElementById('loading');

                // Limpiar error anterior
                errorDiv.style.display = 'none';
                errorDiv.textContent = '';

                // Validaciones
                if (!email || !email.includes('@')) {
                    errorDiv.textContent = 'Ingrese un email válido';
                    errorDiv.style.display = 'block';
                    return;
                }

                if (!password || password.length < 12) {
                    errorDiv.textContent = 'La contraseña debe tener al menos 12 caracteres';
                    errorDiv.style.display = 'block';
                    return;
                }

                // Mostrar loading
                loginBtn.disabled = true;
                loginBtn.textContent = 'Verificando...';
                loading.style.display = 'block';

                try {
                    // Verificar que Supabase esté disponible
                    if (!window.supabaseClient) {
                        throw new Error('Error de conexión. Intente de nuevo.');
                    }

                    // Intentar autenticación
                    const { data, error } = await window.supabaseClient.auth.signInWithPassword({
                        email: email,
                        password: password
                    });

                    if (error) throw error;

                    // Verificar rol del usuario
                    const { data: userData, error: userError } = await window.supabaseClient
                        .from('usuarios')
                        .select('rol, activo')
                        .eq('email', email)
                        .single();

                    if (userError) throw userError;

                    if (!userData.activo) {
                        throw new Error('Cuenta desactivada. Contacte al administrador.');
                    }

                    if (userData.rol !== 'Director Corporativo') {
                        await window.supabaseClient.auth.signOut();
                        throw new Error('Acceso restringido. Solo para Directores Corporativos.');
                    }

                    // Redirigir al panel
                    window.location.href = 'director_corporativo.html';

                } catch (error) {
                    console.error('Error de login:', error);
                    
                    let mensajeError = error.message;
                    if (error.message.includes('Invalid login credentials')) {
                        mensajeError = 'Credenciales incorrectas';
                    } else if (error.message.includes('Email not confirmed')) {
                        mensajeError = 'Email no confirmado';
                    } else if (error.message.includes('Too many requests')) {
                        mensajeError = 'Demasiados intentos. Espere unos minutos.';
                    }
                    
                    errorDiv.textContent = 'Error: ' + mensajeError;
                    errorDiv.style.display = 'block';
                } finally {
                    // Restaurar botón
                    loginBtn.disabled = false;
                    loginBtn.textContent = 'Acceder al Sistema';
                    loading.style.display = 'none';
                }
            });

            // Login con Enter
            document.addEventListener('keypress', function(e) {
                if (e.key === 'Enter') {
                    const loginBtn = document.getElementById('loginBtn');
                    if (!loginBtn.disabled) {
                        loginBtn.click();
                    }
                }
            });
        }
    </script>
</body>
</html>
