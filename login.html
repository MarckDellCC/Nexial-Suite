<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Iniciar Sesión - Director Corporativo</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 flex items-center justify-center min-h-screen">
  <div class="bg-white p-8 rounded-lg shadow-md w-full max-w-md">
    <h1 class="text-2xl font-bold text-center mb-6 text-indigo-600">Acceso Director Corporativo</h1>
    <div id="error-message" class="mb-4 text-red-500 text-sm hidden"></div>
    <form id="login-form" class="space-y-4">
      <div>
        <label class="block text-sm font-medium text-gray-700">Correo electrónico</label>
        <input type="email" id="email" required class="mt-1 block w-full px-3 py-2 border border-gray-300 rounded-md shadow-sm focus:outline-none focus:ring-indigo-500 focus:border-indigo-500">
      </div>
      <div>
        <label class="block text-sm font-medium text-gray-700">Contraseña</label>
        <input type="password" id="password" required class="mt-1 block w-full px-3 py-2 border border-gray-300 rounded-md shadow-sm focus:outline-none focus:ring-indigo-500 focus:border-indigo-500">
      </div>
      <button type="submit" class="w-full bg-indigo-600 text-white py-2 px-4 rounded-md hover:bg-indigo-700 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-indigo-500">
        Ingresar
      </button>
    </form>
  </div>

  <script type="module">
    import { createClient } from 'https://cdn.jsdelivr.net/npm/@supabase/supabase-js/+esm';
    
    const supabase = createClient(
      'https://ogkjeokfcosaeqrlyfdj.supabase.co',
      'sb_publishable_SdiAWuSUYzEQiNF0ILOCOQ_IAKESzos'
    );

    const form = document.getElementById('login-form');
    const errorDiv = document.getElementById('error-message');

    form.addEventListener('submit', async (e) => {
      e.preventDefault();
      const email = document.getElementById('email').value;
      const password = document.getElementById('password').value;

      const { data, error } = await supabase.auth.signInWithPassword({ email, password });
      if (error) {
        errorDiv.textContent = error.message;
        errorDiv.classList.remove('hidden');
        return;
      }
      
      // Verificar que sea Director Corporativo
      const { data: usuario, error: userError } = await supabase
        .from('usuarios')
        .select('rol')
        .eq('auth_id', data.user.id)
        .single();

      if (userError || !usuario || usuario.rol !== 'Director Corporativo') {
        errorDiv.textContent = 'No tienes permisos de Director Corporativo.';
        errorDiv.classList.remove('hidden');
        await supabase.auth.signOut();
        return;
      }

      window.location.href = 'director_corporativo.html';
    });
  </script>
</body>
</html>
