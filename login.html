<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Login - Nexial Suite</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, sans-serif;
            background: linear-gradient(135deg, #0f172a 0%, #1e293b 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .login-container {
            width: 100%;
            max-width: 400px;
            background: white;
            border-radius: 12px;
            padding: 40px;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.2);
        }

        .logo-container {
            text-align: center;
            margin-bottom: 40px;
        }

        .nexial-logo-icon {
            font-size: 48px;
            background: linear-gradient(45deg, #7c3aed, #00f5ff);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 20px;
        }

        .company-name {
            font-size: 28px;
            font-weight: 700;
            color: #1e293b;
            margin-bottom: 8px;
        }

        .company-tagline {
            color: #64748b;
            font-size: 14px;
            font-weight: 500;
            letter-spacing: 1px;
            text-transform: uppercase;
        }

        .form-group {
            margin-bottom: 20px;
        }

        label {
            display: block;
            margin-bottom: 8px;
            color: #475569;
            font-weight: 500;
            font-size: 14px;
        }

        input {
            width: 100%;
            padding: 12px 16px;
            border: 2px solid #e2e8f0;
            border-radius: 8px;
            font-size: 16px;
            transition: all 0.3s;
            background: white;
        }

        input:focus {
            outline: none;
            border-color: #7c3aed;
            box-shadow: 0 0 0 3px rgba(124, 58, 237, 0.1);
        }

        .password-container {
            position: relative;
        }

        .toggle-password {
            position: absolute;
            right: 15px;
            top: 50%;
            transform: translateY(-50%);
            background: none;
            border: none;
            color: #94a3b8;
            cursor: pointer;
            font-size: 18px;
        }

        button[type="submit"] {
            width: 100%;
            padding: 14px;
            background: linear-gradient(45deg, #7c3aed, #00f5ff);
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
            margin-top: 10px;
        }

        button[type="submit"]:hover {
            background: linear-gradient(45deg, #6d28d9, #00d4e8);
        }

        button[type="submit"]:disabled {
            background: #cbd5e1;
            cursor: not-allowed;
        }

        .error-message {
            background: #fee2e2;
            color: #dc2626;
            padding: 12px;
            border-radius: 8px;
            margin-bottom: 20px;
            display: none;
            font-size: 14px;
            border: 1px solid #fecaca;
        }

        .loading {
            text-align: center;
            color: #64748b;
            margin-top: 15px;
            font-size: 14px;
            display: none;
        }

        .spinner {
            display: inline-block;
            width: 20px;
            height: 20px;
            border: 3px solid rgba(124, 58, 237, 0.2);
            border-radius: 50%;
            border-top-color: #7c3aed;
            animation: spin 1s linear infinite;
            margin-right: 10px;
            vertical-align: middle;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .footer-text {
            text-align: center;
            margin-top: 30px;
            color: #94a3b8;
            font-size: 12px;
            border-top: 1px solid #e2e8f0;
            padding-top: 20px;
        }

        @media (max-width: 480px) {
            .login-container {
                padding: 30px 20px;
            }

            .company-name {
                font-size: 24px;
            }

            .nexial-logo-icon {
                font-size: 40px;
            }
        }
    </style>
</head>
<body>
    <div class="login-container">
        <div class="logo-container">
            <!-- Icono de Nexial Suite -->
            <div class="nexial-logo-icon">⚡</div>
            <div class="company-name">NEXIAL SUITE</div>
            <div class="company-tagline">Enterprise Platform</div>
        </div>

        <div id="errorMessage" class="error-message"></div>

        <form id="loginForm">
            <div class="form-group">
                <label for="email">Email Corporativo</label>
                <input type="email" id="email" required placeholder="usuario@empresa.com">
            </div>

            <div class="form-group">
                <label for="password">Contraseña</label>
                <div class="password-container">
                    <input type="password" id="password" required minlength="12" placeholder="Mínimo 12 caracteres">
                    <button type="button" class="toggle-password" id="togglePassword">
                        👁️
                    </button>
                </div>
            </div>

            <button type="submit" id="loginBtn">Acceder al Sistema</button>
        </form>

        <div id="loading" class="loading">
            <span class="spinner"></span>
            <span>Verificando credenciales...</span>
        </div>

        <div class="footer-text">
            &copy; 2024 Nexial Suite. Sistema Corporativo Multi-Empresa
        </div>
    </div>

    <script>
        // Configuración de Supabase
        const SUPABASE_URL = 'https://tjtpdxeoxissrpdrhqbc.supabase.co';
        const SUPABASE_KEY = 'sb_publishable_yH2lzZ_AWTvHsxW4TI2yYw_KnY5krtq';

        // Inicializar Supabase
        const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        // Toggle para mostrar/ocultar contraseña
        document.getElementById('togglePassword').addEventListener('click', function() {
            const passwordInput = document.getElementById('password');
            if (passwordInput.type === 'password') {
                passwordInput.type = 'text';
                this.textContent = '🙈';
            } else {
                passwordInput.type = 'password';
                this.textContent = '👁️';
            }
        });

        // Manejar el formulario de login
        document.getElementById('loginForm').addEventListener('submit', async function(e) {
            e.preventDefault();

            const email = document.getElementById('email').value.trim();
            const password = document.getElementById('password').value;
            const errorDiv = document.getElementById('errorMessage');
            const loginBtn = document.getElementById('loginBtn');
            const loading = document.getElementById('loading');

            // Limpiar mensajes anteriores
            errorDiv.style.display = 'none';
            errorDiv.textContent = '';

            // Validaciones básicas
            if (!email || !password) {
                errorDiv.textContent = 'Por favor, complete todos los campos';
                errorDiv.style.display = 'block';
                return;
            }

            // Mostrar loading
            loginBtn.disabled = true;
            loading.style.display = 'block';
            loginBtn.textContent = 'Procesando...';

            try {
                // Intentar autenticación con Supabase
                const { data, error } = await supabase.auth.signInWithPassword({
                    email: email,
                    password: password
                });

                if (error) {
                    let errorMessage = error.message;
                    if (error.message.includes('Invalid login credentials')) {
                        errorMessage = 'Credenciales inválidas. Verifique su email y contraseña.';
                    } else if (error.message.includes('Email not confirmed')) {
                        errorMessage = 'Email no confirmado. Por favor, verifique su cuenta.';
                    } else if (error.message.includes('Too many requests')) {
                        errorMessage = 'Demasiados intentos. Por favor, espere unos minutos.';
                    }

                    throw new Error(errorMessage);
                }

                // Verificar el rol del usuario en nuestra tabla de usuarios
                const { data: userData, error: userError } = await supabase
                    .from('usuarios')
                    .select('rol, activo, nombre')
                    .eq('email', email)
                    .single();

                if (userError || !userData) {
                    throw new Error('Usuario no encontrado en el sistema');
                }

                if (!userData.activo) {
                    throw new Error('Cuenta desactivada. Contacte al administrador del sistema.');
                }

                // Redirigir según el rol
                if (userData.rol === 'Director Corporativo') {
                    // Redirigir al panel del Director Corporativo
                    window.location.href = 'director_corporativo.html';
                } else {
                    // Cerrar sesión si no es Director Corporativo
                    await supabase.auth.signOut();
                    throw new Error('Acceso no autorizado. Solo para Directores Corporativos.');
                }

            } catch (error) {
                // Mostrar error
                errorDiv.textContent = error.message;
                errorDiv.style.display = 'block';
            } finally {
                // Restaurar botón
                loginBtn.disabled = false;
                loading.style.display = 'none';
                loginBtn.textContent = 'Acceder al Sistema';
            }
        });

        // Verificar si ya hay sesión activa
        async function checkSession() {
            try {
                const { data } = await supabase.auth.getSession();
                if (data.session) {
                    const user = data.session.user;

                    // Verificar rol y redirigir
                    const { data: userData } = await supabase
                        .from('usuarios')
                        .select('rol')
                        .eq('email', user.email)
                        .single();

                    if (userData && userData.rol === 'Director Corporativo') {
                        window.location.href = 'director_corporativo.html';
                    }
                }
            } catch (error) {
                console.log('Error verificando sesión:', error);
            }
        }

        // Ejecutar al cargar la página
        document.addEventListener('DOMContentLoaded', function() {
            checkSession();

            // Enfocar automáticamente el campo de email
            setTimeout(() => {
                document.getElementById('email').focus();
            }, 300);
        });

        // Permitir login con Enter
        document.addEventListener('keypress', function(e) {
            if (e.key === 'Enter' && !document.getElementById('loginBtn').disabled) {
                document.getElementById('loginForm').dispatchEvent(new Event('submit'));
            }
        });
    </script>
</body>
</html>
