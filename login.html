<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Login - Sistema Corporativo</title>
    <script src="https://unpkg.com/@supabase/supabase-js@2"></script>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 20px;
            background: #f0f2f5;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }
        
        .login-container {
            max-width: 400px;
            width: 100%;
            background: white;
            padding: 40px;
            border-radius: 8px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.1);
        }
        
        h1 {
            text-align: center;
            color: #2c3e50;
            margin-bottom: 10px;
        }
        
        .subtitle {
            text-align: center;
            color: #7f8c8d;
            margin-bottom: 30px;
            font-size: 14px;
        }
        
        .form-group {
            margin-bottom: 20px;
        }
        
        label {
            display: block;
            margin-bottom: 8px;
            color: #333;
            font-weight: 500;
        }
        
        input {
            width: 100%;
            padding: 12px;
            border: 1px solid #ddd;
            border-radius: 4px;
            font-size: 16px;
            box-sizing: border-box;
        }
        
        input:focus {
            outline: none;
            border-color: #3498db;
            box-shadow: 0 0 0 2px rgba(52, 152, 219, 0.2);
        }
        
        button {
            width: 100%;
            padding: 14px;
            background: #2c3e50;
            color: white;
            border: none;
            border-radius: 4px;
            font-size: 16px;
            font-weight: 500;
            cursor: pointer;
            transition: background 0.3s;
        }
        
        button:hover {
            background: #1a252f;
        }
        
        button:disabled {
            background: #95a5a6;
            cursor: not-allowed;
        }
        
        .error-message {
            background: #f8d7da;
            color: #721c24;
            padding: 12px;
            border-radius: 4px;
            margin-bottom: 20px;
            display: none;
        }
        
        .loading {
            text-align: center;
            color: #7f8c8d;
            margin-top: 10px;
        }
    </style>
</head>
<body>
    <div class="login-container">
        <h1>Sistema Corporativo</h1>
        <div class="subtitle">Acceso Seguro Multi-Empresa</div>
        
        <div id="errorMessage" class="error-message"></div>
        
        <form id="loginForm">
            <div class="form-group">
                <label for="email">Email Corporativo</label>
                <input type="email" id="email" required placeholder="usuario@empresa.com">
            </div>
            
            <div class="form-group">
                <label for="password">Contraseña</label>
                <input type="password" id="password" required minlength="12">
            </div>
            
            <button type="submit" id="loginBtn">Iniciar Sesión</button>
        </form>
        
        <div id="loading" class="loading" style="display: none;">Verificando credenciales...</div>
    </div>

    <script>
        // Configuración de Supabase
        const SUPABASE_URL = 'https://tjtpdxeoxissrpdrhqbc.supabase.co';
        const SUPABASE_KEY = 'sb_publishable_yH2lzZ_AWTvHsxW4TI2yYw_KnY5krtq';
        
        // Inicializar Supabase
        const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
        
        // Manejar el formulario de login
        document.getElementById('loginForm').addEventListener('submit', async function(e) {
            e.preventDefault();
            
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            const errorDiv = document.getElementById('errorMessage');
            const loginBtn = document.getElementById('loginBtn');
            const loading = document.getElementById('loading');
            
            // Limpiar mensajes anteriores
            errorDiv.style.display = 'none';
            errorDiv.textContent = '';
            
            // Mostrar loading
            loginBtn.disabled = true;
            loading.style.display = 'block';
            loginBtn.textContent = 'Procesando...';
            
            try {
                // Intentar autenticación con Supabase
                const { data, error } = await supabase.auth.signInWithPassword({
                    email: email,
                    password: password
                });
                
                if (error) {
                    throw new Error(error.message);
                }
                
                // Verificar el rol del usuario
                const { data: userData, error: userError } = await supabase
                    .from('usuarios')
                    .select('rol, activo')
                    .eq('email', email)
                    .single();
                
                if (userError || !userData) {
                    throw new Error('Usuario no encontrado en el sistema');
                }
                
                if (!userData.activo) {
                    throw new Error('Cuenta desactivada. Contacte al administrador');
                }
                
                // Redirigir según el rol
                switch(userData.rol) {
                    case 'Director Corporativo':
                        window.location.href = 'director_corporativo.html';
                        break;
                    default:
                        throw new Error('Acceso no autorizado para este panel');
                }
                
            } catch (error) {
                // Mostrar error
                errorDiv.textContent = 'Error: ' + error.message;
                errorDiv.style.display = 'block';
                
                // Registrar intento fallido en auditoría (si fuera una función)
                try {
                    await supabase.rpc('registrar_auditoria', {
                        p_tipo_evento: 'login_fallido',
                        p_severidad: 'warning',
                        p_usuario_id: null,
                        p_empresa_id: null,
                        p_tabla_afectada: 'usuarios',
                        p_registro_id: null,
                        p_datos_anteriores: null,
                        p_datos_nuevos: JSON.stringify({ email: email }),
                        p_descripcion: 'Intento de login fallido',
                        p_transaccion_id: null,
                        p_funcion_procedimiento: 'login.html'
                    });
                } catch (auditError) {
                    console.log('Error en auditoría:', auditError);
                }
            } finally {
                // Restaurar botón
                loginBtn.disabled = false;
                loading.style.display = 'none';
                loginBtn.textContent = 'Iniciar Sesión';
            }
        });
        
        // Verificar si ya hay sesión activa
        async function checkSession() {
            const { data } = await supabase.auth.getSession();
            if (data.session) {
                const user = data.session.user;
                
                // Verificar rol y redirigir
                const { data: userData } = await supabase
                    .from('usuarios')
                    .select('rol')
                    .eq('email', user.email)
                    .single();
                
                if (userData && userData.rol === 'Director Corporativo') {
                    window.location.href = 'director_corporativo.html';
                }
            }
        }
        
        // Ejecutar al cargar
        checkSession();
    </script>
</body>
</html>
