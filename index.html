<script>
    // =============================================
    // OBJETO PRINCIPAL NEXIAL - Versión Corregida
    // =============================================
    const Nexial = (function() {
        const SUPABASE_URL = 'https://cmrysvcahpouziogzang.supabase.co';
        const SUPABASE_ANON_KEY = 'sb_publishable_rj4q31YiBwxLcfuswCX21g_LxsxRc_n';
        
        let _supabase = null;
        
        function getSupabase() {
            if (!_supabase) {
                _supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
            }
            return _supabase;
        }
        
        // Crear partículas (sin cambios)
        function createParticles() {
            const particlesContainer = document.getElementById('particles');
            if (!particlesContainer) return;
            
            for (let i = 0; i < 50; i++) {
                const particle = document.createElement('div');
                particle.classList.add('particle');
                particle.style.width = Math.random() * 4 + 1 + 'px';
                particle.style.height = particle.style.width;
                particle.style.left = Math.random() * 100 + '%';
                particle.style.animationDuration = Math.random() * 20 + 10 + 's';
                particle.style.animationDelay = Math.random() * 5 + 's';
                particlesContainer.appendChild(particle);
            }
        }
        
        return {
            // =============================================
            // MANEJO DE MODALES (sin cambios)
            // =============================================
            openLoginModal: function() {
                document.getElementById('registerModal').style.display = 'none';
                document.getElementById('loginModal').style.display = 'flex';
                document.getElementById('loginEmail').focus();
                document.body.style.overflow = 'hidden';
            },
            
            closeLoginModal: function() {
                document.getElementById('loginModal').style.display = 'none';
                document.getElementById('loginAlert').style.display = 'none';
                document.getElementById('loginEmail').value = '';
                document.getElementById('loginPassword').value = '';
                document.body.style.overflow = 'auto';
            },
            
            openRegisterModal: function() {
                document.getElementById('loginModal').style.display = 'none';
                document.getElementById('registerModal').style.display = 'flex';
                document.getElementById('companyName').focus();
                document.body.style.overflow = 'hidden';
            },
            
            closeRegisterModal: function() {
                const modal = document.getElementById('registerModal');
                if (modal.style.display === 'flex') {
                    modal.style.display = 'none';
                    document.getElementById('registerAlert').style.display = 'none';
                    document.getElementById('registerForm').reset();
                    document.body.style.overflow = 'auto';
                }
            },
            
            togglePassword: function(fieldId) {
                const field = document.getElementById(fieldId);
                if (!field) return;
                
                const button = field.parentElement.querySelector('.toggle-password');
                const icon = button.querySelector('i');
                
                if (field.type === 'password') {
                    field.type = 'text';
                    icon.classList.remove('fa-eye');
                    icon.classList.add('fa-eye-slash');
                } else {
                    field.type = 'password';
                    icon.classList.remove('fa-eye-slash');
                    icon.classList.add('fa-eye');
                }
            },
            
            showTerms: function() {
                alert('TÉRMINOS Y CONDICIONES NEXIAL SUITE\n\n1. Uso exclusivo para empresas registradas\n2. Los datos serán tratados conforme a las leyes de protección de datos del país correspondiente\n3. Período de prueba gratuito de 30 días\n4. Cancelación en cualquier momento desde el panel de control\n5. Responsabilidad del usuario sobre la veracidad de los datos proporcionados\n6. Nexial Suite se reserva el derecho de suspender cuentas con información falsa\n\nPara ver los términos completos, contacte a soporte: marcelodanielcc@gmail.com');
                return false;
            },
            
            // =============================================
            // LOGIN CORREGIDO - Usa solo Supabase Auth
            // =============================================
            login: async function() {
                const email = document.getElementById('loginEmail')?.value.trim();
                const password = document.getElementById('loginPassword')?.value;
                
                if (!email || !password) {
                    this.showAlert('loginAlert', 'error', 'Por favor complete todos los campos');
                    return;
                }
                
                this.showLoading();
                
                try {
                    const supabase = getSupabase();
                    
                    // 1. Autenticación con Supabase Auth
                    const { data: authData, error: authError } = await supabase.auth.signInWithPassword({
                        email: email,
                        password: password
                    });
                    
                    if (authError) {
                        console.error('Error de autenticación:', authError);
                        this.hideLoading();
                        this.showAlert('loginAlert', 'error', 'Credenciales incorrectas o usuario no existe');
                        return;
                    }
                    
                    // 2. Obtener información del usuario de nuestra tabla 'usuarios'
                    const { data: userData, error: userError } = await supabase
                        .from('usuarios')
                        .select('*, empresas(*)')
                        .eq('email', email)
                        .single();
                    
                    let userInfo;
                    
                    if (userError) {
                        console.warn('Usuario no encontrado en tabla usuarios:', userError);
                        // Si no existe en usuarios, crear un registro básico
                        userInfo = {
                            id: authData.user.id,
                            email: authData.user.email,
                            nombre: authData.user.email.split('@')[0],
                            rol: 'admin_empresa',
                            empresa_id: 1 // Empresa por defecto
                        };
                    } else {
                        userInfo = userData;
                        
                        // Actualizar último login
                        await supabase
                            .from('usuarios')
                            .update({ 
                                ultimo_login: new Date().toISOString(),
                                actualizado_en: new Date().toISOString()
                            })
                            .eq('id', userInfo.id);
                    }
                    
                    // 3. Guardar en localStorage
                    localStorage.setItem('nexial_user', JSON.stringify(userInfo));
                    localStorage.setItem('nexial_session', JSON.stringify({
                        access_token: authData.session.access_token,
                        refresh_token: authData.session.refresh_token,
                        expires_at: authData.session.expires_at
                    }));
                    
                    this.hideLoading();
                    
                    // 4. Redirigir al dashboard
                    this.showAlert('loginAlert', 'success', '✅ Acceso exitoso. Redirigiendo...');
                    
                    setTimeout(() => {
                        this.closeLoginModal();
                        window.location.href = 'dashboard.html';
                    }, 1000);
                    
                } catch (error) {
                    this.hideLoading();
                    console.error('Error en login:', error);
                    this.showAlert('loginAlert', 'error', 'Error de conexión. Por favor intenta nuevamente.');
                }
            },
            
            // =============================================
            // REGISTRO CORREGIDO - Crea usuario en Auth y tabla usuarios
            // =============================================
            registerCompany: async function(event) {
                event.preventDefault();
                this.showLoading();
                
                // Validar contraseñas
                const password = document.getElementById('adminPassword')?.value;
                const confirmPassword = document.getElementById('confirmPassword')?.value;
                
                if (password !== confirmPassword) {
                    this.showAlert('registerAlert', 'error', 'Las contraseñas no coinciden');
                    this.hideLoading();
                    return;
                }
                
                if (password.length < 8) {
                    this.showAlert('registerAlert', 'error', 'La contraseña debe tener mínimo 8 caracteres');
                    this.hideLoading();
                    return;
                }
                
                // Recopilar datos
                const companyData = {
                    nombre: document.getElementById('companyName')?.value.trim(),
                    nit: document.getElementById('companyDocNumber')?.value.trim() || 
                         'TEMP-' + Date.now(), // Temporal si no tiene NIT
                    email: document.getElementById('companyEmail')?.value.trim().toLowerCase(),
                    telefono: (document.getElementById('countryCode')?.value || '+591') + 
                             (document.getElementById('companyPhone')?.value || ''),
                    direccion: 'Por definir',
                    activa: true
                };
                
                const userData = {
                    nombres: document.getElementById('names')?.value.trim(),
                    primer_apellido: document.getElementById('firstLastName')?.value.trim(),
                    segundo_apellido: document.getElementById('secondLastName')?.value.trim() || '',
                    email: document.getElementById('companyEmail')?.value.trim().toLowerCase(),
                    password: password,
                    nombre_completo: document.getElementById('names')?.value.trim() + ' ' + 
                                   document.getElementById('firstLastName')?.value.trim(),
                    rol: 'admin_empresa'
                };
                
                // Validar campos
                const requiredFields = ['nombre', 'email', 'nombres', 'primer_apellido'];
                for (const field of requiredFields) {
                    const value = companyData[field] || userData[field];
                    if (!value || value.trim() === '') {
                        const fieldNames = {
                            'nombre': 'Razón Social',
                            'email': 'Email Corporativo',
                            'nombres': 'Nombres',
                            'primer_apellido': 'Primer Apellido'
                        };
                        this.showAlert('registerAlert', 'error', 
                            `Por favor complete: ${fieldNames[field] || field}`);
                        this.hideLoading();
                        return;
                    }
                }
                
                try {
                    const supabase = getSupabase();
                    
                    // 1. Verificar si el email ya existe
                    const { data: existingUser } = await supabase
                        .from('usuarios')
                        .select('id')
                        .eq('email', userData.email)
                        .single();
                    
                    if (existingUser) {
                        this.showAlert('registerAlert', 'error', 
                            'Este email ya está registrado. Use otro o recupere su contraseña.');
                        this.hideLoading();
                        return;
                    }
                    
                    // 2. Registrar usuario en Supabase Auth
                    const { data: authData, error: authError } = await supabase.auth.signUp({
                        email: userData.email,
                        password: userData.password,
                        options: {
                            data: {
                                nombre: userData.nombre_completo,
                                empresa: companyData.nombre,
                                rol: userData.rol
                            }
                        }
                    });
                    
                    if (authError) {
                        throw new Error(`Error en registro Auth: ${authError.message}`);
                    }
                    
                    console.log('✅ Usuario creado en Auth:', authData.user?.id);
                    
                    // 3. Crear empresa (trigger generará código automático)
                    const { data: empresaData, error: empresaError } = await supabase
                        .from('empresas')
                        .insert([companyData])
                        .select()
                        .single();
                    
                    if (empresaError) {
                        // Intentar eliminar el usuario de Auth si falla la empresa
                        if (authData.user) {
                            await supabase.auth.admin.deleteUser(authData.user.id);
                        }
                        throw new Error(`Error al crear empresa: ${empresaError.message}`);
                    }
                    
                    console.log('✅ Empresa creada:', empresaData.id, empresaData.codigo);
                    
                    // 4. Crear usuario en tabla usuarios (el trigger generará código)
                    const { data: usuarioData, error: usuarioError } = await supabase
                        .from('usuarios')
                        .insert([{
                            id: authData.user?.id, // Usar el mismo ID de Auth
                            empresa_id: empresaData.id,
                            email: userData.email,
                            nombre: userData.nombre_completo,
                            apellido: userData.primer_apellido + 
                                     (userData.segundo_apellido ? ' ' + userData.segundo_apellido : ''),
                            rol: userData.rol,
                            activo: true,
                            creado_en: new Date().toISOString(),
                            actualizado_en: new Date().toISOString()
                        }])
                        .select()
                        .single();
                    
                    if (usuarioError) {
                        // Revertir: eliminar empresa y usuario de Auth
                        await supabase.from('empresas').delete().eq('id', empresaData.id);
                        if (authData.user) {
                            await supabase.auth.admin.deleteUser(authData.user.id);
                        }
                        throw new Error(`Error al crear usuario: ${usuarioError.message}`);
                    }
                    
                    console.log('✅ Usuario creado en tabla:', usuarioData.codigo);
                    
                    this.hideLoading();
                    
                    // 5. Mostrar éxito con datos de acceso
                    const successMessage = `
                        ✅ ¡Registro exitoso!<br><br>
                        <strong>Empresa:</strong> ${companyData.nombre}<br>
                        <strong>Código:</strong> ${empresaData.codigo}<br><br>
                        <strong>Credenciales de acceso:</strong><br>
                        📧 Email: ${userData.email}<br>
                        🔑 Contraseña: La que ingresaste<br><br>
                        <strong>Información importante:</strong><br>
                        1. Ya puedes iniciar sesión<br>
                        2. Revisa tu email para confirmar tu cuenta<br>
                        3. Tu período de prueba de 30 días ha comenzado
                    `;
                    
                    this.showAlert('registerAlert', 'success', successMessage);
                    
                    // 6. Iniciar sesión automáticamente después de 3 segundos
                    setTimeout(async () => {
                        try {
                            const { data: sessionData, error: loginError } = 
                                await supabase.auth.signInWithPassword({
                                    email: userData.email,
                                    password: userData.password
                                });
                            
                            if (!loginError && sessionData.user) {
                                localStorage.setItem('nexial_user', JSON.stringify({
                                    ...usuarioData,
                                    empresa: empresaData
                                }));
                                
                                this.closeRegisterModal();
                                this.closeLoginModal();
                                window.location.href = 'dashboard.html';
                            } else {
                                // Si no puede auto-login, mostrar login modal
                                this.closeRegisterModal();
                                this.openLoginModal();
                                document.getElementById('loginEmail').value = userData.email;
                                document.getElementById('loginPassword').focus();
                            }
                        } catch (e) {
                            console.error('Auto-login error:', e);
                            this.closeRegisterModal();
                            this.openLoginModal();
                        }
                    }, 3000);
                    
                } catch (error) {
                    this.hideLoading();
                    console.error('Error en registro completo:', error);
                    
                    let errorMessage = 'Error en el registro: ' + error.message;
                    
                    if (error.message.includes('duplicate key')) {
                        errorMessage = 'El email o documento ya está registrado. Usa otros datos.';
                    } else if (error.message.includes('network')) {
                        errorMessage = 'Error de conexión. Verifica tu internet.';
                    }
                    
                    this.showAlert('registerAlert', 'error', 
                        errorMessage + '<br><br>Contacta soporte: marcelodanielcc@gmail.com');
                }
            },
            
            // =============================================
            // FUNCIONES AUXILIARES
            // =============================================
            recoverPassword: async function() {
                const email = prompt('Ingrese su email para recuperar contraseña:');
                if (email) {
                    try {
                        const supabase = getSupabase();
                        const { error } = await supabase.auth.resetPasswordForEmail(email, {
                            redirectTo: window.location.origin + '/reset-password.html'
                        });
                        
                        if (error) {
                            alert('Error: ' + error.message);
                        } else {
                            alert(`✅ Enlace enviado a: ${email}\nRevise su bandeja.`);
                        }
                    } catch (error) {
                        alert('Error de conexión.');
                    }
                }
            },
            
            showLoading: function() {
                const loading = document.getElementById('globalLoading');
                if (loading) loading.style.display = 'flex';
            },
            
            hideLoading: function() {
                const loading = document.getElementById('globalLoading');
                if (loading) loading.style.display = 'none';
            },
            
            showAlert: function(elementId, type, message) {
                const alertElement = document.getElementById(elementId);
                if (!alertElement) return;
                
                alertElement.className = `alert alert-${type}`;
                alertElement.innerHTML = message;
                alertElement.style.display = 'block';
                
                if (type === 'success') {
                    setTimeout(() => {
                        alertElement.style.display = 'none';
                    }, 5000);
                }
            },
            
            // =============================================
            // INICIALIZACIÓN
            // =============================================
            initialize: async function() {
                createParticles();
                
                console.log('🚀 Nexial Suite v3.5 - Supabase Auth Ready');
                console.log('🔗 Supabase URL:', SUPABASE_URL);
                
                // Configurar eventos de modales
                document.getElementById('loginModal')?.addEventListener('click', (e) => {
                    if (e.target === e.currentTarget) this.closeLoginModal();
                });
                
                document.getElementById('registerModal')?.addEventListener('click', (e) => {
                    if (e.target === e.currentTarget) this.closeRegisterModal();
                });
                
                // Enter en login
                const loginPassword = document.getElementById('loginPassword');
                if (loginPassword) {
                    loginPassword.addEventListener('keypress', (e) => {
                        if (e.key === 'Enter') this.login();
                    });
                }
                
                // Enter en email del login
                const loginEmail = document.getElementById('loginEmail');
                if (loginEmail) {
                    loginEmail.addEventListener('keypress', (e) => {
                        if (e.key === 'Enter') {
                            e.preventDefault();
                            document.getElementById('loginPassword')?.focus();
                        }
                    });
                }
                
                // Verificar si ya está autenticado
                try {
                    const supabase = getSupabase();
                    const { data: { session } } = await supabase.auth.getSession();
                    
                    if (session) {
                        console.log('👤 Sesión activa encontrada:', session.user.email);
                        
                        // Verificar si hay dashboard, si no, quedarse aquí
                        // Esto evita redirección infinita si no hay dashboard.html
                        const currentPage = window.location.pathname.split('/').pop();
                        if (currentPage === 'index.html' || currentPage === '') {
                            // Opcional: mostrar que ya está logueado
                            console.log('Usuario ya autenticado. Use el dashboard.');
                        }
                    }
                } catch (error) {
                    console.warn('Error verificando sesión:', error);
                }
            }
        };
    })();
    
    // =============================================
    // INICIALIZAR AL CARGAR
    // =============================================
    document.addEventListener('DOMContentLoaded', function() {
        Nexial.initialize();
    });
    
    // =============================================
    // FUNCIONES GLOBALES PARA ONCLICK
    // =============================================
    window.openLoginModal = function() { Nexial.openLoginModal(); };
    window.openRegisterModal = function() { Nexial.openRegisterModal(); };
    window.closeLoginModal = function() { Nexial.closeLoginModal(); };
    window.closeRegisterModal = function() { Nexial.closeRegisterModal(); };
</script>
