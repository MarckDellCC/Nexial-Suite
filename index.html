<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nexial Suite - Director Corporativo</title>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>👑</text></svg>">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', system-ui, sans-serif;
        }
        
        body {
            background: linear-gradient(135deg, #0f0f23 0%, #1a1a2e 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        
        .login-container {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(10px);
            border-radius: 12px;
            padding: 40px;
            width: 100%;
            max-width: 400px;
            border: 1px solid rgba(124, 58, 237, 0.2);
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
        }
        
        .logo {
            text-align: center;
            margin-bottom: 30px;
        }
        
        .logo h1 {
            color: #7c3aed;
            font-size: 28px;
            font-weight: 600;
            margin-bottom: 5px;
        }
        
        .logo p {
            color: rgba(255, 255, 255, 0.6);
            font-size: 14px;
        }
        
        .badge {
            display: inline-block;
            background: linear-gradient(45deg, #7c3aed, #9d5bff);
            color: white;
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: 600;
            margin-top: 10px;
        }
        
        .login-form .input-group {
            margin-bottom: 20px;
        }
        
        .login-form label {
            display: block;
            color: rgba(255, 255, 255, 0.8);
            margin-bottom: 8px;
            font-size: 14px;
            font-weight: 500;
        }
        
        .login-form input {
            width: 100%;
            padding: 12px 16px;
            background: rgba(255, 255, 255, 0.08);
            border: 1px solid rgba(124, 58, 237, 0.3);
            border-radius: 8px;
            color: white;
            font-size: 15px;
            transition: all 0.3s;
        }
        
        .login-form input:focus {
            outline: none;
            border-color: #7c3aed;
            background: rgba(255, 255, 255, 0.1);
        }
        
        .login-btn {
            width: 100%;
            padding: 14px;
            background: linear-gradient(45deg, #7c3aed, #9d5bff);
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
            margin-top: 10px;
        }
        
        .login-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 20px rgba(124, 58, 237, 0.4);
        }
        
        .login-btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            transform: none;
        }
        
        .error-message {
            background: rgba(255, 0, 85, 0.1);
            border: 1px solid rgba(255, 0, 85, 0.3);
            border-radius: 8px;
            padding: 12px;
            margin-top: 20px;
            color: #ff0055;
            font-size: 14px;
            display: none;
        }
        
        .loading {
            text-align: center;
            color: rgba(255, 255, 255, 0.6);
            font-size: 14px;
            margin-top: 20px;
            display: none;
        }
        
        .footer {
            text-align: center;
            margin-top: 30px;
            color: rgba(255, 255, 255, 0.4);
            font-size: 12px;
        }
        
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
    </style>
</head>
<body>
    <div class="login-container">
        <div class="logo">
            <h1>Nexial Suite</h1>
            <p>Sistema Corporativo Empresarial</p>
            <div class="badge">DIRECTOR CORPORATIVO</div>
        </div>
        
        <form class="login-form" id="loginForm">
            <div class="input-group">
                <label for="email">Correo Electrónico</label>
                <input type="email" id="email" placeholder="correo@ejemplo.com" required>
            </div>
            
            <div class="input-group">
                <label for="password">Contraseña</label>
                <input type="password" id="password" placeholder="••••••••" required>
            </div>
            
            <button type="submit" class="login-btn" id="loginBtn">
                <span id="btnText">Iniciar Sesión</span>
            </button>
            
            <div class="error-message" id="errorMessage"></div>
            
            <div class="loading" id="loading">
                <div style="display: inline-block; width: 16px; height: 16px; border: 2px solid rgba(124, 58, 237, 0.3); border-top-color: #7c3aed; border-radius: 50%; margin-right: 8px; animation: spin 1s linear infinite;"></div>
                Verificando credenciales...
            </div>
        </form>
        
        <div class="footer">
            © 2024 Nexial Suite. Acceso exclusivo para Directores Corporativos.
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script>
        // IIFE para evitar conflictos de variables
        (function() {
            // CONFIGURACIÓN SUPABASE
            const SUPABASE_URL = 'https://tjtpdxeoxissrpdrhqbc.supabase.co';
            const SUPABASE_ANON_KEY = 'sb_publishable_yH2lzZ_AWTvHsxW4TI2yYw_KnY5krtq';
            
            // Elementos del DOM
            const loginForm = document.getElementById('loginForm');
            const emailInput = document.getElementById('email');
            const passwordInput = document.getElementById('password');
            const loginBtn = document.getElementById('loginBtn');
            const btnText = document.getElementById('btnText');
            const errorMessage = document.getElementById('errorMessage');
            const loading = document.getElementById('loading');
            
            // Variable para Supabase (usamos var para evitar errores de redeclaración)
            var supabase = null;
            
            // Inicializar Supabase
            function initSupabase() {
                supabase = window.supabaseClient.createClient(SUPABASE_URL, SUPABASE_ANON_KEY, {
                    auth: {
                        persistSession: true,
                        autoRefreshToken: true
                    }
                });
            }
            
            // Verificar si hay sesión activa
            async function checkExistingSession() {
                if (!supabase) return;
                
                try {
                    const { data: { session } } = await supabase.auth.getSession();
                    
                    if (session) {
                        // Verificar si el usuario es Director Corporativo
                        const { data: userData, error } = await supabase
                            .from('usuarios')
                            .select('id, rol, activo, empresa_id')
                            .eq('id', session.user.id)
                            .single();
                        
                        if (!error && userData && userData.rol === 'Director Corporativo' && userData.activo) {
                            // Redirigir al dashboard
                            window.location.href = 'dashboard.html';
                        } else {
                            // Cerrar sesión si no es Director Corporativo
                            await supabase.auth.signOut();
                        }
                    }
                } catch (error) {
                    console.log('No hay sesión activa:', error.message);
                }
            }
            
            // Manejar el login
            async function handleLogin(email, password) {
                showLoading();
                
                try {
                    // Iniciar sesión con Supabase Auth
                    const { data: authData, error: authError } = await supabase.auth.signInWithPassword({
                        email,
                        password
                    });
                    
                    if (authError) {
                        if (authError.message.includes('Invalid login credentials')) {
                            throw new Error('Credenciales incorrectas');
                        } else if (authError.message.includes('Email not confirmed')) {
                            throw new Error('Email no confirmado');
                        } else {
                            throw new Error('Error de autenticación: ' + authError.message);
                        }
                    }
                    
                    // Verificar que el usuario exista en la tabla usuarios
                    const { data: userData, error: userError } = await supabase
                        .from('usuarios')
                        .select('*')
                        .eq('email', email)
                        .eq('activo', true)
                        .single();
                    
                    if (userError || !userData) {
                        await supabase.auth.signOut();
                        throw new Error('Usuario no encontrado en el sistema');
                    }
                    
                    // Verificar rol de Director Corporativo
                    if (userData.rol !== 'Director Corporativo') {
                        await supabase.auth.signOut();
                        throw new Error('Acceso solo para Directores Corporativos');
                    }
                    
                    // Registrar auditoría del login
                    try {
                        await supabase.from('auditoria').insert({
                            evento_id: `LOGIN-${Date.now()}`,
                            tipo_evento: 'login',
                            severidad: 'info',
                            usuario_id: userData.id,
                            empresa_id: userData.empresa_id,
                            tabla_afectada: 'usuarios',
                            registro_id: userData.id,
                            datos_nuevos: { login_time: new Date().toISOString() },
                            descripcion: 'Inicio de sesión de Director Corporativo',
                            user_agent: navigator.userAgent
                        });
                    } catch (auditError) {
                        console.log('Error en auditoría:', auditError.message);
                    }
                    
                    // Redirigir al dashboard
                    window.location.href = 'dashboard.html';
                    
                } catch (error) {
                    showError(error.message);
                } finally {
                    hideLoading();
                }
            }
            
            // Mostrar/ocultar loading
            function showLoading() {
                loginBtn.disabled = true;
                btnText.textContent = 'Verificando...';
                loading.style.display = 'block';
                errorMessage.style.display = 'none';
            }
            
            function hideLoading() {
                loginBtn.disabled = false;
                btnText.textContent = 'Iniciar Sesión';
                loading.style.display = 'none';
            }
            
            // Mostrar error
            function showError(message) {
                errorMessage.textContent = message;
                errorMessage.style.display = 'block';
            }
            
            // Event Listeners
            loginForm.addEventListener('submit', async (e) => {
                e.preventDefault();
                
                const email = emailInput.value.trim();
                const password = passwordInput.value.trim();
                
                if (!email || !password) {
                    showError('Por favor complete todos los campos.');
                    return;
                }
                
                await handleLogin(email, password);
            });
            
            // Permitir login con Enter
            passwordInput.addEventListener('keypress', (e) => {
                if (e.key === 'Enter') {
                    loginForm.requestSubmit();
                }
            });
            
            // Inicializar cuando el DOM esté listo
            document.addEventListener('DOMContentLoaded', function() {
                initSupabase();
                checkExistingSession();
            });
            
        })(); // Fin de la IIFE
    </script>
</body>
</html>
