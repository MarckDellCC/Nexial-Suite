<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nexial Suite - Director Corporativo</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        :root {
            --primary: #7c3aed;
            --primary-glow: #9d5bff;
            --secondary: #00f5ff;
            --danger: #ff0055;
            --success: #00ff41;
            --warning: #ffaa00;
            --dark: #0f0f23;
            --darker: #070710;
            --card-bg: rgba(15, 15, 35, 0.8);
        }
        
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Segoe UI', sans-serif;
            background: var(--darker);
            color: #fff;
            overflow-x: hidden;
        }
        
        .dashboard {
            display: flex;
            min-height: 100vh;
        }
        
        .sidebar {
            width: 280px;
            background: var(--dark);
            border-right: 1px solid rgba(124, 58, 237, 0.3);
            padding: 2rem 1.5rem;
            position: fixed;
            height: 100vh;
        }
        
        .logo {
            display: flex;
            align-items: center;
            gap: 1rem;
            font-size: 1.5rem;
            font-weight: 700;
            color: var(--secondary);
            margin-bottom: 2rem;
        }
        
        .user-info {
            background: rgba(124, 58, 237, 0.1);
            padding: 1rem;
            border-radius: 8px;
            margin-bottom: 2rem;
            border: 1px solid rgba(124, 58, 237, 0.3);
        }
        
        .user-badge {
            display: inline-block;
            padding: 0.3rem 1rem;
            background: var(--primary);
            color: white;
            border-radius: 20px;
            font-size: 0.8rem;
            font-weight: 600;
            margin-bottom: 0.5rem;
        }
        
        .user-name {
            font-size: 1.1rem;
            font-weight: 600;
        }
        
        .user-role {
            color: var(--secondary);
            font-size: 0.9rem;
        }
        
        .nav-menu {
            display: flex;
            flex-direction: column;
            gap: 0.5rem;
        }
        
        .nav-link {
            display: flex;
            align-items: center;
            gap: 1rem;
            padding: 0.8rem 1rem;
            color: rgba(255, 255, 255, 0.8);
            text-decoration: none;
            border-radius: 8px;
            transition: all 0.3s;
            cursor: pointer;
        }
        
        .nav-link:hover, .nav-link.active {
            background: rgba(124, 58, 237, 0.2);
            color: var(--secondary);
        }
        
        .logout-btn {
            margin-top: 2rem;
            width: 100%;
            padding: 0.8rem;
            background: rgba(255, 0, 85, 0.1);
            border: 1px solid rgba(255, 0, 85, 0.3);
            color: var(--danger);
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.3s;
        }
        
        .logout-btn:hover {
            background: rgba(255, 0, 85, 0.2);
        }
        
        .main-content {
            flex: 1;
            margin-left: 280px;
            padding: 2rem;
        }
        
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 2rem;
            padding-bottom: 1.5rem;
            border-bottom: 1px solid rgba(124, 58, 237, 0.3);
        }
        
        .page-title {
            font-size: 1.8rem;
            color: var(--secondary);
        }
        
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 1.5rem;
            margin-bottom: 2rem;
        }
        
        .stat-card {
            background: var(--card-bg);
            border-radius: 12px;
            padding: 1.5rem;
            border: 1px solid rgba(124, 58, 237, 0.2);
        }
        
        .stat-value {
            font-size: 2.5rem;
            font-weight: 700;
            margin: 0.5rem 0;
            color: var(--secondary);
        }
        
        .table-card {
            background: var(--card-bg);
            border-radius: 12px;
            padding: 1.5rem;
            border: 1px solid rgba(124, 58, 237, 0.2);
            margin-top: 2rem;
        }
        
        .table-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 1.5rem;
        }
        
        .btn {
            padding: 0.8rem 1.5rem;
            border-radius: 8px;
            border: none;
            cursor: pointer;
            font-weight: 600;
            transition: all 0.3s;
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
        }
        
        .btn-primary {
            background: linear-gradient(45deg, var(--primary), var(--secondary));
            color: white;
        }
        
        .btn-secondary {
            background: rgba(255, 255, 255, 0.05);
            color: white;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }
        
        .table-wrapper {
            overflow-x: auto;
        }
        
        .data-table {
            width: 100%;
            border-collapse: collapse;
        }
        
        .data-table th {
            background: rgba(124, 58, 237, 0.1);
            color: var(--secondary);
            padding: 1rem;
            text-align: left;
        }
        
        .data-table td {
            padding: 1rem;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
        }
        
        .action-buttons {
            display: flex;
            gap: 0.5rem;
        }
        
        .action-btn {
            width: 35px;
            height: 35px;
            border-radius: 6px;
            border: none;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.3s;
        }
        
        .action-btn.view { background: rgba(0, 255, 65, 0.1); color: var(--success); }
        .action-btn.edit { background: rgba(0, 170, 255, 0.1); color: var(--secondary); }
        .action-btn.delete { background: rgba(255, 0, 85, 0.1); color: var(--danger); }
        .action-btn.access { background: rgba(157, 0, 255, 0.1); color: #9d5bff; }
        
        .modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(7, 7, 16, 0.95);
            backdrop-filter: blur(10px);
            display: none;
            align-items: center;
            justify-content: center;
            z-index: 1000;
        }
        
        .modal {
            background: var(--card-bg);
            border-radius: 15px;
            padding: 2rem;
            width: 90%;
            max-width: 800px;
            max-height: 90vh;
            overflow-y: auto;
            border: 1px solid rgba(124, 58, 237, 0.3);
        }
        
        .modal-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 1.5rem;
        }
        
        .form-group {
            margin-bottom: 1.5rem;
        }
        
        .form-group label {
            display: block;
            margin-bottom: 0.5rem;
            color: var(--secondary);
        }
        
        .form-group input, .form-group select, .form-group textarea {
            width: 100%;
            padding: 0.8rem;
            background: var(--dark);
            border: 1px solid rgba(124, 58, 237, 0.3);
            border-radius: 6px;
            color: white;
            font-size: 1rem;
        }
        
        .loading {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(7, 7, 16, 0.95);
            display: none;
            align-items: center;
            justify-content: center;
            z-index: 2000;
        }
        
        .spinner {
            width: 50px;
            height: 50px;
            border: 5px solid rgba(124, 58, 237, 0.3);
            border-radius: 50%;
            border-top-color: var(--primary);
            animation: spin 1s linear infinite;
        }
        
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
        
        .notification {
            position: fixed;
            top: 20px;
            right: 20px;
            padding: 1rem 1.5rem;
            border-radius: 8px;
            z-index: 3000;
            display: flex;
            align-items: center;
            gap: 1rem;
            animation: slideIn 0.3s ease-out;
        }
        
        .notification.success {
            background: rgba(0, 255, 65, 0.1);
            border: 1px solid var(--success);
            color: var(--success);
        }
        
        .notification.error {
            background: rgba(255, 0, 85, 0.1);
            border: 1px solid var(--danger);
            color: var(--danger);
        }
        
        @keyframes slideIn {
            from { transform: translateX(100%); }
            to { transform: translateX(0); }
        }
        
        .confirmation-dialog {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(7, 7, 16, 0.95);
            display: none;
            align-items: center;
            justify-content: center;
            z-index: 1000;
        }
        
        .confirmation-content {
            background: var(--card-bg);
            border-radius: 15px;
            padding: 2rem;
            max-width: 400px;
            width: 90%;
            border: 1px solid rgba(124, 58, 237, 0.3);
            text-align: center;
        }
        
        .status-badge {
            display: inline-block;
            padding: 0.3rem 0.8rem;
            border-radius: 20px;
            font-size: 0.8rem;
            font-weight: 600;
        }
        
        .status-active { background: rgba(0, 255, 65, 0.1); color: var(--success); }
        .status-inactive { background: rgba(255, 255, 255, 0.1); color: rgba(255, 255, 255, 0.5); }
        
        .login-overlay {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(7, 7, 16, 0.95);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 10000;
        }
        
        .login-box {
            background: var(--card-bg);
            border-radius: 15px;
            padding: 2.5rem;
            width: 90%;
            max-width: 400px;
            border: 1px solid rgba(124, 58, 237, 0.3);
            text-align: center;
        }
        
        .login-title {
            color: var(--secondary);
            margin-bottom: 1.5rem;
            font-size: 1.5rem;
        }
        
        .login-input {
            width: 100%;
            padding: 0.8rem;
            margin-bottom: 1rem;
            background: var(--dark);
            border: 1px solid rgba(124, 58, 237, 0.3);
            border-radius: 6px;
            color: white;
            font-size: 1rem;
        }
    </style>
</head>
<body>
    <!-- Overlay de login para verificar sesión -->
    <div class="login-overlay" id="loginOverlay">
        <div class="login-box">
            <h2 class="login-title">Verificando Director Corporativo</h2>
            <div id="loginMessage" style="color: var(--secondary); margin-bottom: 1.5rem;">
                <i class="fas fa-spinner fa-spin"></i> Verificando credenciales...
            </div>
            <button class="btn btn-primary" onclick="window.location.href='index.html'" style="width: 100%;">
                <i class="fas fa-sign-in-alt"></i> Volver al Login
            </button>
        </div>
    </div>
    
    <div class="dashboard" id="dashboard" style="display: none;">
        <div class="sidebar">
            <div class="logo">
                <i class="fas fa-brain"></i>
                <span>NEXIAL SUITE</span>
            </div>
            
            <div class="user-info">
                <div class="user-badge">DIRECTOR CORPORATIVO</div>
                <div class="user-name" id="userName">Cargando...</div>
                <div class="user-role">Control Total del Sistema</div>
            </div>
            
            <div class="nav-menu">
                <a class="nav-link active" onclick="loadDashboard()">
                    <i class="fas fa-tachometer-alt"></i>
                    Panel de Control
                </a>
                <a class="nav-link" onclick="loadEmpresas()">
                    <i class="fas fa-building"></i>
                    Gestión de Empresas
                </a>
            </div>
            
            <button class="logout-btn" onclick="logout()">
                <i class="fas fa-sign-out-alt"></i> Cerrar Sesión
            </button>
        </div>
        
        <div class="main-content" id="mainContent">
            <!-- Contenido dinámico -->
        </div>
    </div>
    
    <div class="loading" id="loading">
        <div class="spinner"></div>
    </div>
    
    <div class="modal-overlay" id="modalOverlay">
        <div class="modal" id="modalContent">
            <!-- Contenido del modal -->
        </div>
    </div>
    
    <div class="confirmation-dialog" id="confirmationDialog">
        <div class="confirmation-content">
            <h3 style="color: var(--secondary); margin-bottom: 1rem;" id="confirmationTitle"></h3>
            <p style="color: rgba(255,255,255,0.7); margin-bottom: 1.5rem;" id="confirmationMessage"></p>
            <div style="display: flex; gap: 1rem; justify-content: center;">
                <button class="btn btn-secondary" onclick="hideConfirmation()">Cancelar</button>
                <button class="btn btn-primary" id="confirmActionBtn">Confirmar</button>
            </div>
        </div>
    </div>
    
    <script>
        // CONFIGURACIÓN SUPABASE CORREGIDA
        const SUPABASE_URL = 'https://vgmxfkanyfiaodfptmtv.supabase.co';
        
        // IMPORTANTE: Usa ANON KEY para autenticación, no SERVICE KEY
        const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InZnbXhma2FueWZpYW9kZnB0bXR2Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3MDIwMDc2MzcsImV4cCI6MjAxNzU4MzYzN30.ZrD0BqCFv29sqLIKPqLZc4nR4EoJrxpbv8N2GsD6Z_M';
        
        let supabase = null;
        let empresas = [];
        let currentUser = null;
        
        // Inicializar Supabase con autenticación
        function initSupabase() {
            supabase = supabaseClient.createClient(SUPABASE_URL, SUPABASE_ANON_KEY, {
                auth: {
                    persistSession: true,
                    autoRefreshToken: true,
                    detectSessionInUrl: true
                }
            });
        }
        
        // Verificar si el usuario está autenticado y es Director Corporativo
        async function checkUserRole() {
            showLoading();
            try {
                // Obtener sesión actual
                const { data: { session }, error: sessionError } = await supabase.auth.getSession();
                
                if (sessionError || !session) {
                    throw new Error('No hay sesión activa');
                }
                
                // Obtener información del usuario desde la tabla 'usuarios'
                const { data: userData, error: userError } = await supabase
                    .from('usuarios')
                    .select('*')
                    .eq('id', session.user.id)
                    .single();
                
                if (userError || !userData) {
                    throw new Error('Usuario no encontrado en la base de datos');
                }
                
                // Verificar si es Director Corporativo
                if (userData.rol !== 'Director Corporativo') {
                    throw new Error('Acceso denegado. Solo para Directores Corporativos');
                }
                
                // Verificar si el usuario está activo
                if (!userData.activo) {
                    throw new Error('Usuario inactivo. Contacte al administrador');
                }
                
                currentUser = userData;
                document.getElementById('userName').textContent = `${userData.nombre} ${userData.apellido || ''}`;
                
                // Registrar auditoría de acceso
                await registrarAuditoria('login', 'info', userData.id, userData.empresa_id, 
                    'usuarios', userData.id, null, null, 'Acceso al panel de Director Corporativo');
                
                // Ocultar login y mostrar dashboard
                document.getElementById('loginOverlay').style.display = 'none';
                document.getElementById('dashboard').style.display = 'flex';
                hideLoading();
                
                // Cargar dashboard inicial
                loadDashboard();
                
            } catch (error) {
                console.error('Error verificando usuario:', error);
                document.getElementById('loginMessage').innerHTML = `
                    <i class="fas fa-exclamation-triangle" style="color: var(--danger);"></i>
                    <div>${error.message}</div>
                    <small style="color: rgba(255,255,255,0.5); margin-top: 0.5rem;">Redirigiendo al login...</small>
                `;
                
                setTimeout(() => {
                    window.location.href = 'index.html';
                }, 3000);
            }
        }
        
        // Función para registrar auditoría
        async function registrarAuditoria(tipo_evento, severidad, usuario_id, empresa_id, 
                                         tabla_afectada, registro_id, datos_anteriores, 
                                         datos_nuevos, descripcion) {
            try {
                const { error } = await supabase
                    .from('auditoria')
                    .insert({
                        evento_id: `EVT-${Date.now()}-${Math.random().toString(36).substr(2, 9)}`,
                        tipo_evento: tipo_evento,
                        severidad: severidad,
                        usuario_id: usuario_id,
                        empresa_id: empresa_id,
                        tabla_afectada: tabla_afectada,
                        registro_id: registro_id,
                        datos_anteriores: datos_anteriores,
                        datos_nuevos: datos_nuevos,
                        descripcion: descripcion,
                        ip_address: null, // Se puede obtener con servicios externos
                        user_agent: navigator.userAgent,
                        creado_en: new Date().toISOString()
                    });
                
                if (error) console.error('Error registrando auditoría:', error);
            } catch (error) {
                console.error('Error en auditoría:', error);
            }
        }
        
        // Mostrar/Ocultar loading
        function showLoading() {
            document.getElementById('loading').style.display = 'flex';
        }
        
        function hideLoading() {
            document.getElementById('loading').style.display = 'none';
        }
        
        // Mostrar notificación
        function showNotification(type, message) {
            const notification = document.createElement('div');
            notification.className = `notification ${type}`;
            notification.innerHTML = `
                <i class="fas fa-${type === 'success' ? 'check-circle' : 'exclamation-circle'}"></i>
                <span>${message}</span>
            `;
            
            document.body.appendChild(notification);
            
            setTimeout(() => {
                notification.remove();
            }, 5000);
        }
        
        // Modal functions
        function showModal(title, content) {
            document.getElementById('modalContent').innerHTML = `
                <div class="modal-header">
                    <h2 style="color: var(--secondary);">${title}</h2>
                    <button onclick="closeModal()" style="background: none; border: none; color: white; font-size: 1.5rem; cursor: pointer;">×</button>
                </div>
                ${content}
            `;
            document.getElementById('modalOverlay').style.display = 'flex';
        }
        
        function closeModal() {
            document.getElementById('modalOverlay').style.display = 'none';
        }
        
        // Confirmación
        function showConfirmation(title, message, onConfirm) {
            document.getElementById('confirmationTitle').textContent = title;
            document.getElementById('confirmationMessage').innerHTML = message;
            document.getElementById('confirmationDialog').style.display = 'flex';
            
            document.getElementById('confirmActionBtn').onclick = function() {
                hideConfirmation();
                onConfirm();
            };
        }
        
        function hideConfirmation() {
            document.getElementById('confirmationDialog').style.display = 'none';
        }
        
        // Cargar empresas desde Supabase
        async function loadEmpresasFromSupabase() {
            showLoading();
            try {
                const { data, error } = await supabase
                    .from('empresas')
                    .select('*')
                    .order('creado_en', { ascending: false });
                
                if (error) throw error;
                
                empresas = data || [];
                return empresas;
                
            } catch (error) {
                console.error('Error cargando empresas:', error);
                showNotification('error', 'Error cargando empresas: ' + error.message);
                return [];
            } finally {
                hideLoading();
            }
        }
        
        // Cargar estadísticas compatibles con estructura SQL
        async function loadEstadisticas() {
            try {
                // Obtener todas las empresas para el Director Corporativo
                const { data: empresasData, error: empresasError } = await supabase
                    .from('empresas')
                    .select('id');
                
                if (empresasError) throw empresasError;
                
                let totalEmpresas = empresasData?.length || 0;
                let totalVentas = 0;
                let totalClientes = 0;
                let totalProductos = 0;
                
                // Para cada empresa, obtener estadísticas
                for (const empresa of empresasData) {
                    // Ventas por empresa
                    const { data: ventasData } = await supabase
                        .from('ventas')
                        .select('total')
                        .eq('empresa_id', empresa.id);
                    
                    if (ventasData) {
                        totalVentas += ventasData.reduce((sum, v) => {
                            const valor = parseFloat(v.total) || 0;
                            return sum + valor;
                        }, 0);
                    }
                    
                    // Clientes por empresa
                    const { data: clientesData } = await supabase
                        .from('clientes')
                        .select('id')
                        .eq('empresa_id', empresa.id);
                    
                    if (clientesData) {
                        totalClientes += clientesData.length;
                    }
                    
                    // Productos por empresa
                    const { data: productosData } = await supabase
                        .from('productos')
                        .select('id')
                        .eq('empresa_id', empresa.id);
                    
                    if (productosData) {
                        totalProductos += productosData.length;
                    }
                }
                
                return {
                    totalEmpresas,
                    totalClientes,
                    totalVentas,
                    totalProductos
                };
                
            } catch (error) {
                console.error('Error cargando estadísticas:', error);
                return { totalEmpresas: 0, totalClientes: 0, totalVentas: 0, totalProductos: 0 };
            }
        }
        
        // Dashboard principal
        async function loadDashboard() {
            showLoading();
            try {
                const empresasData = await loadEmpresasFromSupabase();
                const estadisticas = await loadEstadisticas();
                
                document.getElementById('mainContent').innerHTML = `
                    <div class="header">
                        <h1 class="page-title">Panel de Control - Director Corporativo</h1>
                        <button class="btn btn-primary" onclick="loadEmpresas()">
                            <i class="fas fa-building"></i> Gestionar Empresas
                        </button>
                    </div>
                    
                    <div class="stats-grid">
                        <div class="stat-card">
                            <div style="color: var(--secondary); font-size: 0.9rem;">Empresas Totales</div>
                            <div class="stat-value">${estadisticas.totalEmpresas}</div>
                            <div style="color: rgba(255,255,255,0.7); font-size: 0.9rem;">Sistema multi-tenant</div>
                        </div>
                        
                        <div class="stat-card">
                            <div style="color: var(--secondary); font-size: 0.9rem;">Clientes Totales</div>
                            <div class="stat-value">${estadisticas.totalClientes}</div>
                            <div style="color: rgba(255,255,255,0.7); font-size: 0.9rem;">En todas las empresas</div>
                        </div>
                        
                        <div class="stat-card">
                            <div style="color: var(--secondary); font-size: 0.9rem;">Productos Totales</div>
                            <div class="stat-value">${estadisticas.totalProductos}</div>
                            <div style="color: rgba(255,255,255,0.7); font-size: 0.9rem;">En inventario</div>
                        </div>
                        
                        <div class="stat-card">
                            <div style="color: var(--secondary); font-size: 0.9rem;">Ventas Totales</div>
                            <div class="stat-value">$${estadisticas.totalVentas.toLocaleString('es-ES', {minimumFractionDigits: 2, maximumFractionDigits: 2})}</div>
                            <div style="color: rgba(255,255,255,0.7); font-size: 0.9rem;">Histórico completo</div>
                        </div>
                    </div>
                    
                    <div class="table-card">

        // Crear empresa en Supabase (compatible con estructura SQL)
        async function crearEmpresa() {
            showLoading();
            
            const empresaData = {
                id: generateUUID(),
                codigo: document.getElementById('empresaCodigo').value.trim(),
                nombre: document.getElementById('empresaNombre').value.trim(),
                ruc: document.getElementById('empresaRUC').value.trim(),
                email: document.getElementById('empresaEmail').value.trim(),
                telefono: document.getElementById('empresaTelefono').value.trim(),
                direccion: document.getElementById('empresaDireccion').value.trim(),
                pais: document.getElementById('empresaPais').value,
                grupo_corporativo: document.getElementById('empresaGrupo').value.trim() || null,
                dominio_corporativo: document.getElementById('empresaDominio').value.trim() || null,
                nivel_seguridad: document.getElementById('empresaNivelSeguridad').value,
                idioma_default: document.getElementById('empresaIdioma').value,
                moneda_default: document.getElementById('empresaMoneda').value,
                zona_horaria: document.getElementById('empresaZonaHoraria').value,
                activo: document.getElementById('empresaEstado').value === 'true',
                verificada: false,
                creado_en: new Date().toISOString(),
                actualizado_en: new Date().toISOString()
            };
            
            try {
                // Verificar si el código ya existe
                const { data: existingCode } = await supabase
                    .from('empresas')
                    .select('id')
                    .eq('codigo', empresaData.codigo)
                    .single();
                
                if (existingCode) {
                    throw new Error('El código de empresa ya existe');
                }
                
                // Verificar si el RUC ya existe
                const { data: existingRuc } = await supabase
                    .from('empresas')
                    .select('id')
                    .eq('ruc', empresaData.ruc)
                    .single();
                
                if (existingRuc) {
                    throw new Error('El RUC ya está registrado');
                }
                
                const { data, error } = await supabase
                    .from('empresas')
                    .insert([empresaData]);
                
                if (error) throw error;
                
                // Registrar auditoría
                await registrarAuditoria('creacion', 'info', currentUser.id, empresaData.id,
                    'empresas', empresaData.id, null, empresaData, 
                    `Empresa creada: ${empresaData.nombre}`);
                
                showNotification('success', 'Empresa creada exitosamente');
                closeModal();
                loadDashboard();
                
            } catch (error) {
                console.error('Error creando empresa:', error);
                showNotification('error', 'Error creando empresa: ' + error.message);
            } finally {
                hideLoading();
            }
        }

                                <option value="UTC+1" ${empresa.zona_horaria === 'UTC+1' ? 'selected' : ''}>UTC+1 (Madrid)</option>
                                <option value="UTC-8" ${empresa.zona_horaria === 'UTC-8' ? 'selected' : ''}>UTC-8 (Pacífico USA)</option>
                                <option value="UTC-5" ${empresa.zona_horaria === 'UTC-5' ? 'selected' : ''}>UTC-5 (EST - Nueva York)</option>
                            </select>
                        </div>
                        
                        <div class="form-group">
                            <label>Estado</label>
                            <select id="editEmpresaEstado">
                                <option value="true" ${empresa.activo ? 'selected' : ''}>Activa</option>
                                <option value="false" ${!empresa.activo ? 'selected' : ''}>Inactiva</option>
                            </select>
                        </div>
                        
                        <div style="display: flex; gap: 1rem; margin-top: 2rem;">
                            <button type="button" class="btn btn-secondary" onclick="closeModal()" style="flex: 1;">Cancelar</button>
                            <button type="submit" class="btn btn-primary" style="flex: 1;">Guardar Cambios</button>
                        </div>
                    </form>
                `);
                
            } catch (error) {
                console.error('Error cargando empresa:', error);
                showNotification('error', 'Error cargando empresa: ' + error.message);
            } finally {
                hideLoading();
            }
        }
        
        // Guardar cambios de empresa
        async function guardarEmpresa() {
            showLoading();
            
            const empresaData = {
                nombre: document.getElementById('editEmpresaNombre').value.trim(),
                codigo: document.getElementById('editEmpresaCodigo').value.trim(),
                ruc: document.getElementById('editEmpresaRUC').value.trim(),
                email: document.getElementById('editEmpresaEmail').value.trim(),
                telefono: document.getElementById('editEmpresaTelefono').value.trim(),
                direccion: document.getElementById('editEmpresaDireccion').value.trim(),
                pais: document.getElementById('editEmpresaPais').value,
                grupo_corporativo: document.getElementById('editEmpresaGrupo').value.trim() || null,
                dominio_corporativo: document.getElementById('editEmpresaDominio').value.trim() || null,
                nivel_seguridad: document.getElementById('editEmpresaNivelSeguridad').value,
                idioma_default: document.getElementById('editEmpresaIdioma').value,
                moneda_default: document.getElementById('editEmpresaMoneda').value,
                zona_horaria: document.getElementById('editEmpresaZonaHoraria').value,
                activo: document.getElementById('editEmpresaEstado').value === 'true',
                actualizado_en: new Date().toISOString()
            };
            
            const empresaId = document.getElementById('editEmpresaId').value;
            
            try {
                // Obtener datos anteriores para auditoría
                const { data: empresaAnterior } = await supabase
                    .from('empresas')
                    .select('*')
                    .eq('id', empresaId)
                    .single();
                
                const { data, error } = await supabase
                    .from('empresas')
                    .update(empresaData)
                    .eq('id', empresaId);
                
                if (error) throw error;
                
                // Registrar auditoría
                await registrarAuditoria('modificacion', 'warning', currentUser.id, empresaId,
                    'empresas', empresaId, empresaAnterior, empresaData, 
                    `Empresa actualizada: ${empresaData.nombre}`);
                
                showNotification('success', 'Empresa actualizada exitosamente');
                closeModal();
                loadDashboard();
                
            } catch (error) {
                console.error('Error actualizando empresa:', error);
                showNotification('error', 'Error actualizando empresa: ' + error.message);
            } finally {
                hideLoading();
            }
        }
        
        // Confirmar eliminación
        function confirmDeleteEmpresa(id, nombre) {
            showConfirmation(
                'Eliminar Empresa',
                `¿Estás seguro de eliminar la empresa "${nombre}"?<br><br>
                <strong>ADVERTENCIA:</strong> Esta acción eliminará:<br>
                • Todos los usuarios asociados<br>
                • Todos los clientes<br>
                • Todos los productos<br>
                • Todas las ventas<br>
                • Todos los registros relacionados<br><br>
                Esta acción no se puede deshacer.`,
                () => deleteEmpresa(id)
            );
        }
        
        // Eliminar empresa
        async function deleteEmpresa(id) {
            showLoading();
            
            try {
                // Obtener datos de la empresa para auditoría
                const { data: empresa } = await supabase
                    .from('empresas')
                    .select('*')
                    .eq('id', id)
                    .single();
                
                // NOTA: En producción, considerar eliminación en cascada o desactivación
                const { error } = await supabase
                    .from('empresas')
                    .delete()
                    .eq('id', id);
                
                if (error) throw error;
                
                // Registrar auditoría
                await registrarAuditoria('eliminacion', 'critical', currentUser.id, id,
                    'empresas', id, empresa, null, 
                    `Empresa eliminada: ${empresa?.nombre || id}`);
                
                showNotification('success', 'Empresa eliminada exitosamente');
                loadDashboard();
                
            } catch (error) {
                console.error('Error eliminando empresa:', error);
                showNotification('error', 'Error eliminando empresa: ' + error.message);
            } finally {
                hideLoading();
            }
        }
        
        // Acceder como admin de empresa
        async function accessEmpresa(empresaId) {
            try {
                const empresa = empresas.find(e => e.id === empresaId);
                if (!empresa) return;
                
                // Crear credenciales temporales para acceso como admin de la empresa
                const tempAccessData = {
                    empresa_id: empresaId,
                    empresa_nombre: empresa.nombre,
                    access_time: new Date().toISOString(),
                    director_id: currentUser.id,
                    expires_at: new Date(Date.now() + 24 * 60 * 60 * 1000).toISOString() // 24 horas
                };
                
                // Guardar en localStorage para acceso temporal
                localStorage.setItem('temp_empresa_access', JSON.stringify(tempAccessData));
                
                // Registrar auditoría
                await registrarAuditoria('acceso_sensible', 'info', currentUser.id, empresaId,
                    'empresas', empresaId, null, tempAccessData, 
                    `Acceso temporal como admin a empresa: ${empresa.nombre}`);
                
                showNotification('success', `Acceso temporal configurado para ${empresa.nombre}`);
                
                // Preguntar si abrir nueva pestaña
                showConfirmation(
                    'Acceso Temporal',
                    `Acceso configurado para: <strong>${empresa.nombre}</strong><br><br>
                    ¿Abrir panel de administración en nueva pestaña?`,
                    () => {
                        window.open('empresa-panel.html', '_blank');
                    }
                );
                
            } catch (error) {
                console.error('Error configurando acceso:', error);
                showNotification('error', 'Error configurando acceso: ' + error.message);
            }
        }
        
        // Cerrar sesión
        async function logout() {
            showLoading();
            try {
                // Registrar auditoría de logout
                await registrarAuditoria('logout', 'info', currentUser.id, currentUser.empresa_id,
                    'usuarios', currentUser.id, null, null, 'Cierre de sesión de Director Corporativo');
                
                // Cerrar sesión en Supabase
                const { error } = await supabase.auth.signOut();
                if (error) throw error;
                
                // Limpiar localStorage
                localStorage.removeItem('temp_empresa_access');
                
                // Redirigir al login
                window.location.href = 'index.html';
                
            } catch (error) {
                console.error('Error cerrando sesión:', error);
                showNotification('error', 'Error cerrando sesión');
                window.location.href = 'index.html';
            } finally {
                hideLoading();
            }
        }
        
        // Generar UUID
        function generateUUID() {
            return 'xxxxxxxx-xxxx-4xxx-yxxx-xxxxxxxxxxxx'.replace(/[xy]/g, function(c) {
                const r = Math.random() * 16 | 0;
                const v = c === 'x' ? r : (r & 0x3 | 0x8);
                return v.toString(16);
            });
        }
        
        // Inicializar aplicación
        async function initApp() {
            initSupabase();
            
            // Verificar sesión y rol
            await checkUserRole();
        }
        
        // Iniciar cuando el DOM esté listo
        document.addEventListener('DOMContentLoaded', initApp);
        
        // Manejar cambios de sesión
        supabase?.auth.onAuthStateChange(async (event, session) => {
            if (event === 'SIGNED_OUT') {
                window.location.href = 'index.html';
            } else if (event === 'TOKEN_REFRESHED') {
                console.log('Token refrescado');
            }
        });
    </script>
</body>
</html>
