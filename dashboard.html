<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nexial Suite - Login</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Segoe UI', sans-serif;
            background: #070710;
            color: white;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        
        .login-container {
            background: rgba(15, 15, 35, 0.9);
            border-radius: 15px;
            padding: 2.5rem;
            width: 100%;
            max-width: 400px;
            border: 1px solid rgba(124, 58, 237, 0.3);
        }
        
        .logo {
            text-align: center;
            margin-bottom: 2rem;
        }
        
        .logo i {
            font-size: 3rem;
            color: #7c3aed;
            margin-bottom: 1rem;
        }
        
        .logo h1 {
            color: #00f5ff;
            font-size: 1.8rem;
        }
        
        .form-group {
            margin-bottom: 1.5rem;
        }
        
        .form-group label {
            display: block;
            margin-bottom: 0.5rem;
            color: #00f5ff;
            font-weight: 500;
        }
        
        .form-group input {
            width: 100%;
            padding: 0.8rem;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(124, 58, 237, 0.3);
            border-radius: 6px;
            color: white;
            font-size: 1rem;
        }
        
        .form-group input:focus {
            outline: none;
            border-color: #7c3aed;
        }
        
        .btn-login {
            width: 100%;
            padding: 0.8rem;
            background: linear-gradient(45deg, #7c3aed, #00f5ff);
            color: white;
            border: none;
            border-radius: 6px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
        }
        
        .btn-login:hover {
            opacity: 0.9;
        }
        
        .error-message {
            background: rgba(255, 0, 85, 0.1);
            border: 1px solid rgba(255, 0, 85, 0.3);
            color: #ff0055;
            padding: 0.8rem;
            border-radius: 6px;
            margin-bottom: 1rem;
            text-align: center;
            display: none;
        }
        
        .loading {
            display: none;
            text-align: center;
            margin-bottom: 1rem;
        }
        
        .spinner {
            border: 3px solid rgba(124, 58, 237, 0.3);
            border-top: 3px solid #7c3aed;
            border-radius: 50%;
            width: 30px;
            height: 30px;
            animation: spin 1s linear infinite;
            margin: 0 auto;
        }
        
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
    </style>
</head>
<body>
    <div class="login-container">
        <div class="logo">
            <i class="fas fa-brain"></i>
            <h1>NEXIAL SUITE</h1>
        </div>
        
        <div class="error-message" id="errorMessage">
            Error de autenticación
        </div>
        
        <div class="loading" id="loading">
            <div class="spinner"></div>
            <p style="margin-top: 0.5rem;">Iniciando sesión...</p>
        </div>
        
        <form id="loginForm">
            <div class="form-group">
                <label for="email">Email</label>
                <input type="email" id="email" placeholder="usuario@empresa.com" required>
            </div>
            
            <div class="form-group">
                <label for="password">Contraseña</label>
                <input type="password" id="password" placeholder="********" required>
            </div>
            
            <button type="submit" class="btn-login">
                <i class="fas fa-sign-in-alt"></i> Iniciar Sesión
            </button>
        </form>
    </div>

    <script>
        // Configuración Supabase
        const SUPABASE_URL = 'https://cmrysvcahpouziogzang.supabase.co';
        const SUPABASE_ANON_KEY = 'sb_publishable_rj4q31YiBwxLcfuswCX21g_LxsxRc_n';
        
        // Inicializar Supabase
        const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
        
        // Elementos DOM
        const loginForm = document.getElementById('loginForm');
        const errorMessage = document.getElementById('errorMessage');
        const loading = document.getElementById('loading');
        
        // Manejar login
        loginForm.addEventListener('submit', async function(e) {
            e.preventDefault();
            
            const email = document.getElementById('email').value.trim();
            const password = document.getElementById('password').value;
            
            // Validaciones básicas
            if (!email || !password) {
                showError('Por favor completa todos los campos');
                return;
            }
            
            if (!validateEmail(email)) {
                showError('Ingresa un email válido');
                return;
            }
            
            // Mostrar loading
            loading.style.display = 'block';
            errorMessage.style.display = 'none';
            
            try {
                // Intentar autenticación con Supabase
                const { data, error } = await supabase.auth.signInWithPassword({
                    email: email,
                    password: password
                });
                
                if (error) {
                    throw error;
                }
                
                // Verificar que el usuario exista en la tabla usuarios
                const { data: usuarioData, error: userError } = await supabase
                    .from('usuarios')
                    .select('*')
                    .eq('email', email)
                    .single();
                
                if (userError || !usuarioData) {
                    throw new Error('Usuario no encontrado en el sistema');
                }
                
                if (!usuarioData.activo) {
                    throw new Error('Usuario inactivo. Contacta al administrador.');
                }
                
                // Redirigir al dashboard
                window.location.href = 'dashboard.html';
                
            } catch (error) {
                console.error('Error de login:', error);
                showError(error.message || 'Error al iniciar sesión. Verifica tus credenciales.');
            } finally {
                loading.style.display = 'none';
            }
        });
        
        // Función para mostrar errores
        function showError(message) {
            errorMessage.textContent = message;
            errorMessage.style.display = 'block';
        }
        
        // Validar email
        function validateEmail(email) {
            const re = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
            return re.test(email);
        }
        
        // Verificar si ya hay sesión activa
        async function checkExistingSession() {
            const { data: { session } } = await supabase.auth.getSession();
            if (session) {
                // Verificar que el usuario exista en nuestra tabla
                const { data: usuarioData } = await supabase
                    .from('usuarios')
                    .select('*')
                    .eq('email', session.user.email)
                    .single();
                
                if (usuarioData && usuarioData.activo) {
                    window.location.href = 'dashboard.html';
                }
            }
        }
        
        // Inicializar
        document.addEventListener('DOMContentLoaded', function() {
            checkExistingSession();
            console.log('🔐 Login Nexial Suite - Supabase');
        });
    </script>
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/js/all.min.js"></script>
</body>
</html>
