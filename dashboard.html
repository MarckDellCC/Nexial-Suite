<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nexial Suite - Director Corporativo</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        :root {
            --primary: #7c3aed;
            --primary-glow: #9d5bff;
            --secondary: #00f5ff;
            --danger: #ff0055;
            --success: #00ff41;
            --warning: #ffaa00;
            --dark: #0f0f23;
            --darker: #070710;
            --card-bg: rgba(15, 15, 35, 0.8);
        }
        
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Segoe UI', sans-serif;
            background: var(--darker);
            color: #fff;
            overflow-x: hidden;
        }
        
        .dashboard {
            display: flex;
            min-height: 100vh;
        }
        
        .sidebar {
            width: 280px;
            background: var(--dark);
            border-right: 1px solid rgba(124, 58, 237, 0.3);
            padding: 2rem 1.5rem;
            position: fixed;
            height: 100vh;
        }
        
        .logo {
            display: flex;
            align-items: center;
            gap: 1rem;
            font-size: 1.5rem;
            font-weight: 700;
            color: var(--secondary);
            margin-bottom: 2rem;
        }
        
        .user-info {
            background: rgba(124, 58, 237, 0.1);
            padding: 1rem;
            border-radius: 8px;
            margin-bottom: 2rem;
            border: 1px solid rgba(124, 58, 237, 0.3);
        }
        
        .user-badge {
            display: inline-block;
            padding: 0.3rem 1rem;
            background: var(--primary);
            color: white;
            border-radius: 20px;
            font-size: 0.8rem;
            font-weight: 600;
            margin-bottom: 0.5rem;
        }
        
        .user-name {
            font-size: 1.1rem;
            font-weight: 600;
        }
        
        .user-role {
            color: var(--secondary);
            font-size: 0.9rem;
        }
        
        .nav-menu {
            display: flex;
            flex-direction: column;
            gap: 0.5rem;
        }
        
        .nav-link {
            display: flex;
            align-items: center;
            gap: 1rem;
            padding: 0.8rem 1rem;
            color: rgba(255, 255, 255, 0.8);
            text-decoration: none;
            border-radius: 8px;
            transition: all 0.3s;
            cursor: pointer;
        }
        
        .nav-link:hover, .nav-link.active {
            background: rgba(124, 58, 237, 0.2);
            color: var(--secondary);
        }
        
        .logout-btn {
            margin-top: 2rem;
            width: 100%;
            padding: 0.8rem;
            background: rgba(255, 0, 85, 0.1);
            border: 1px solid rgba(255, 0, 85, 0.3);
            color: var(--danger);
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.3s;
        }
        
        .logout-btn:hover {
            background: rgba(255, 0, 85, 0.2);
        }
        
        .main-content {
            flex: 1;
            margin-left: 280px;
            padding: 2rem;
        }
        
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 2rem;
            padding-bottom: 1.5rem;
            border-bottom: 1px solid rgba(124, 58, 237, 0.3);
        }
        
        .page-title {
            font-size: 1.8rem;
            color: var(--secondary);
        }
        
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 1.5rem;
            margin-bottom: 2rem;
        }
        
        .stat-card {
            background: var(--card-bg);
            border-radius: 12px;
            padding: 1.5rem;
            border: 1px solid rgba(124, 58, 237, 0.2);
        }
        
        .stat-value {
            font-size: 2.5rem;
            font-weight: 700;
            margin: 0.5rem 0;
            color: var(--secondary);
        }
        
        .table-card {
            background: var(--card-bg);
            border-radius: 12px;
            padding: 1.5rem;
            border: 1px solid rgba(124, 58, 237, 0.2);
            margin-top: 2rem;
        }
        
        .table-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 1.5rem;
        }
        
        .btn {
            padding: 0.8rem 1.5rem;
            border-radius: 8px;
            border: none;
            cursor: pointer;
            font-weight: 600;
            transition: all 0.3s;
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
        }
        
        .btn-primary {
            background: linear-gradient(45deg, var(--primary), var(--secondary));
            color: white;
        }
        
        .btn-secondary {
            background: rgba(255, 255, 255, 0.05);
            color: white;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }
        
        .table-wrapper {
            overflow-x: auto;
        }
        
        .data-table {
            width: 100%;
            border-collapse: collapse;
        }
        
        .data-table th {
            background: rgba(124, 58, 237, 0.1);
            color: var(--secondary);
            padding: 1rem;
            text-align: left;
        }
        
        .data-table td {
            padding: 1rem;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
        }
        
        .action-buttons {
            display: flex;
            gap: 0.5rem;
        }
        
        .action-btn {
            width: 35px;
            height: 35px;
            border-radius: 6px;
            border: none;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.3s;
        }
        
        .action-btn.view { background: rgba(0, 255, 65, 0.1); color: var(--success); }
        .action-btn.edit { background: rgba(0, 170, 255, 0.1); color: var(--secondary); }
        .action-btn.delete { background: rgba(255, 0, 85, 0.1); color: var(--danger); }
        .action-btn.access { background: rgba(157, 0, 255, 0.1); color: #9d5bff; }
        
        .modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(7, 7, 16, 0.95);
            backdrop-filter: blur(10px);
            display: none;
            align-items: center;
            justify-content: center;
            z-index: 1000;
        }
        
        .modal {
            background: var(--card-bg);
            border-radius: 15px;
            padding: 2rem;
            width: 90%;
            max-width: 800px;
            max-height: 90vh;
            overflow-y: auto;
            border: 1px solid rgba(124, 58, 237, 0.3);
        }
        
        .modal-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 1.5rem;
        }
        
        .form-group {
            margin-bottom: 1.5rem;
        }
        
        .form-group label {
            display: block;
            margin-bottom: 0.5rem;
            color: var(--secondary);
        }
        
        .form-group input, .form-group select, .form-group textarea {
            width: 100%;
            padding: 0.8rem;
            background: var(--dark);
            border: 1px solid rgba(124, 58, 237, 0.3);
            border-radius: 6px;
            color: white;
            font-size: 1rem;
        }
        
        .loading {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(7, 7, 16, 0.95);
            display: none;
            align-items: center;
            justify-content: center;
            z-index: 2000;
        }
        
        .spinner {
            width: 50px;
            height: 50px;
            border: 5px solid rgba(124, 58, 237, 0.3);
            border-radius: 50%;
            border-top-color: var(--primary);
            animation: spin 1s linear infinite;
        }
        
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
        
        .notification {
            position: fixed;
            top: 20px;
            right: 20px;
            padding: 1rem 1.5rem;
            border-radius: 8px;
            z-index: 3000;
            display: flex;
            align-items: center;
            gap: 1rem;
            animation: slideIn 0.3s ease-out;
        }
        
        .notification.success {
            background: rgba(0, 255, 65, 0.1);
            border: 1px solid var(--success);
            color: var(--success);
        }
        
        .notification.error {
            background: rgba(255, 0, 85, 0.1);
            border: 1px solid var(--danger);
            color: var(--danger);
        }
        
        @keyframes slideIn {
            from { transform: translateX(100%); }
            to { transform: translateX(0); }
        }
        
        .confirmation-dialog {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(7, 7, 16, 0.95);
            display: none;
            align-items: center;
            justify-content: center;
            z-index: 1000;
        }
        
        .confirmation-content {
            background: var(--card-bg);
            border-radius: 15px;
            padding: 2rem;
            max-width: 400px;
            width: 90%;
            border: 1px solid rgba(124, 58, 237, 0.3);
            text-align: center;
        }
        
        .status-badge {
            display: inline-block;
            padding: 0.3rem 0.8rem;
            border-radius: 20px;
            font-size: 0.8rem;
            font-weight: 600;
        }
        
        .status-active { background: rgba(0, 255, 65, 0.1); color: var(--success); }
        .status-inactive { background: rgba(255, 255, 255, 0.1); color: rgba(255, 255, 255, 0.5); }
    </style>
</head>
<body>
    <div class="dashboard">
        <div class="sidebar">
            <div class="logo">
                <i class="fas fa-brain"></i>
                <span>NEXIAL SUITE</span>
            </div>
            
            <div class="user-info">
                <div class="user-badge">DIRECTOR CORPORATIVO</div>
                <div class="user-name" id="userName">Director Corporativo</div>
                <div class="user-role">Control Total del Sistema</div>
            </div>
            
            <div class="nav-menu">
                <a class="nav-link active" onclick="loadDashboard()">
                    <i class="fas fa-tachometer-alt"></i>
                    Panel de Control
                </a>
                <a class="nav-link" onclick="loadEmpresas()">
                    <i class="fas fa-building"></i>
                    Gestión de Empresas
                </a>
            </div>
            
            <button class="logout-btn" onclick="logout()">
                <i class="fas fa-sign-out-alt"></i> Cerrar Sesión
            </button>
        </div>
        
        <div class="main-content" id="mainContent">
            <!-- Contenido dinámico -->
        </div>
    </div>
    
    <div class="loading" id="loading">
        <div class="spinner"></div>
    </div>
    
    <div class="modal-overlay" id="modalOverlay">
        <div class="modal" id="modalContent">
            <!-- Contenido del modal -->
        </div>
    </div>
    
    <div class="confirmation-dialog" id="confirmationDialog">
        <div class="confirmation-content">
            <h3 style="color: var(--secondary); margin-bottom: 1rem;" id="confirmationTitle"></h3>
            <p style="color: rgba(255,255,255,0.7); margin-bottom: 1.5rem;" id="confirmationMessage"></p>
            <div style="display: flex; gap: 1rem; justify-content: center;">
                <button class="btn btn-secondary" onclick="hideConfirmation()">Cancelar</button>
                <button class="btn btn-primary" id="confirmActionBtn">Confirmar</button>
            </div>
        </div>
    </div>
    
    <script>
        // Configuración Supabase - USANDO SERVICE KEY para evitar problemas de RLS
        const SUPABASE_URL = 'https://vgmxfkanyfiaodfptmtv.supabase.co';
        // Usar Service Key (administrativa) que ignora RLS
        const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InZnbXhma2FueWZpYW9kZnB0bXR2Iiwicm9sZSI6InNlcnZpY2Vfcm9sZSIsImlhdCI6MTcwMjAwNzYzNywiZXhwIjoyMDE3NTgzNjM3fQ._n7zhqM8zqA2Tzq9hN7K7q8q7q8q7q8q7q8q7q8q7q8';
        
        let supabase = null;
        let empresas = [];
        
        // Inicializar Supabase
        function initSupabase() {
            supabase = supabaseClient.createClient(SUPABASE_URL, SUPABASE_KEY);
        }
        
        // Mostrar/Ocultar loading
        function showLoading() {
            document.getElementById('loading').style.display = 'flex';
        }
        
        function hideLoading() {
            document.getElementById('loading').style.display = 'none';
        }
        
        // Mostrar notificación
        function showNotification(type, message) {
            const notification = document.createElement('div');
            notification.className = `notification ${type}`;
            notification.innerHTML = `
                <i class="fas fa-${type === 'success' ? 'check-circle' : 'exclamation-circle'}"></i>
                <span>${message}</span>
            `;
            
            document.body.appendChild(notification);
            
            setTimeout(() => {
                notification.remove();
            }, 5000);
        }
        
        // Modal functions
        function showModal(title, content) {
            document.getElementById('modalContent').innerHTML = `
                <div class="modal-header">
                    <h2 style="color: var(--secondary);">${title}</h2>
                    <button onclick="closeModal()" style="background: none; border: none; color: white; font-size: 1.5rem; cursor: pointer;">×</button>
                </div>
                ${content}
            `;
            document.getElementById('modalOverlay').style.display = 'flex';
        }
        
        function closeModal() {
            document.getElementById('modalOverlay').style.display = 'none';
        }
        
        // Confirmación
        function showConfirmation(title, message, onConfirm) {
            document.getElementById('confirmationTitle').textContent = title;
            document.getElementById('confirmationMessage').innerHTML = message;
            document.getElementById('confirmationDialog').style.display = 'flex';
            
            document.getElementById('confirmActionBtn').onclick = function() {
                hideConfirmation();
                onConfirm();
            };
        }
        
        function hideConfirmation() {
            document.getElementById('confirmationDialog').style.display = 'none';
        }
        
        // Cargar empresas desde Supabase
        async function loadEmpresasFromSupabase() {
            showLoading();
            try {
                const { data, error } = await supabase
                    .from('empresas')
                    .select('*')
                    .order('creado_en', { ascending: false });
                
                if (error) throw error;
                
                empresas = data || [];
                return empresas;
                
            } catch (error) {
                console.error('Error cargando empresas:', error);
                showNotification('error', 'Error cargando empresas: ' + error.message);
                return [];
            } finally {
                hideLoading();
            }
        }
        
        // Cargar estadísticas sin consultar usuarios (para evitar problemas de RLS)
        async function loadEstadisticas() {
            try {
                // Solo contar empresas y ventas
                const { data: ventasData, error: ventasError } = await supabase
                    .from('ventas')
                    .select('total');
                
                let totalVentas = 0;
                
                if (!ventasError && ventasData) {
                    totalVentas = ventasData.reduce((sum, v) => {
                        const valor = parseFloat(v.total) || 0;
                        return sum + valor;
                    }, 0);
                }
                
                // Contar clientes
                const { data: clientesData, error: clientesError } = await supabase
                    .from('clientes')
                    .select('id');
                
                const totalClientes = !clientesError ? (clientesData?.length || 0) : 0;
                
                return {
                    totalClientes,
                    totalVentas
                };
                
            } catch (error) {
                console.error('Error cargando estadísticas:', error);
                return { totalClientes: 0, totalVentas: 0 };
            }
        }
        
        // Dashboard principal
        async function loadDashboard() {
            showLoading();
            try {
                const empresasData = await loadEmpresasFromSupabase();
                const estadisticas = await loadEstadisticas();
                
                document.getElementById('mainContent').innerHTML = `
                    <div class="header">
                        <h1 class="page-title">Panel de Control - Director Corporativo</h1>
                        <button class="btn btn-primary" onclick="loadEmpresas()">
                            <i class="fas fa-building"></i> Gestionar Empresas
                        </button>
                    </div>
                    
                    <div class="stats-grid">
                        <div class="stat-card">
                            <div style="color: var(--secondary); font-size: 0.9rem;">Empresas Totales</div>
                            <div class="stat-value">${empresasData.length}</div>
                            <div style="color: rgba(255,255,255,0.7); font-size: 0.9rem;">Sistema multi-tenant</div>
                        </div>
                        
                        <div class="stat-card">
                            <div style="color: var(--secondary); font-size: 0.9rem;">Clientes Totales</div>
                            <div class="stat-value">${estadisticas.totalClientes}</div>
                            <div style="color: rgba(255,255,255,0.7); font-size: 0.9rem;">En todas las empresas</div>
                        </div>
                        
                        <div class="stat-card">
                            <div style="color: var(--secondary); font-size: 0.9rem;">Ventas Totales</div>
                            <div class="stat-value">$${estadisticas.totalVentas.toLocaleString('es-ES', {minimumFractionDigits: 2, maximumFractionDigits: 2})}</div>
                            <div style="color: rgba(255,255,255,0.7); font-size: 0.9rem;">Histórico completo</div>
                        </div>
                    </div>
                    
                    <div class="table-card">
                        <div class="table-header">
                            <h3 style="color: var(--secondary);">Empresas Recientes</h3>
                            <button class="btn btn-primary" onclick="showNuevaEmpresaModal()">
                                <i class="fas fa-plus"></i> Nueva Empresa
                            </button>
                        </div>
                        
                        <div class="table-wrapper">
                            <table class="data-table">
                                <thead>
                                    <tr>
                                        <th>Código</th>
                                        <th>Nombre</th>
                                        <th>RUC</th>
                                        <th>Contacto</th>
                                        <th>Estado</th>
                                        <th>Acciones</th>
                                    </tr>
                                </thead>
                                <tbody>
                                    ${empresasData.slice(0, 10).map(empresa => `
                                        <tr>
                                            <td><strong>${empresa.codigo || 'N/A'}</strong></td>
                                            <td>${empresa.nombre || 'Sin nombre'}</td>
                                            <td>${empresa.ruc || 'N/A'}</td>
                                            <td>
                                                ${empresa.email || 'N/A'}<br>
                                                <small>${empresa.telefono || ''}</small>
                                            </td>
                                            <td>
                                                <span class="status-badge ${empresa.activo ? 'status-active' : 'status-inactive'}">
                                                    ${empresa.activo ? 'Activa' : 'Inactiva'}
                                                </span>
                                            </td>
                                            <td>
                                                <div class="action-buttons">
                                                    <button class="action-btn access" onclick="accessEmpresa('${empresa.id}')" title="Acceder como Admin">
                                                        <i class="fas fa-sign-in-alt"></i>
                                                    </button>
                                                    <button class="action-btn view" onclick="viewEmpresa('${empresa.id}')" title="Ver Detalles">
                                                        <i class="fas fa-eye"></i>
                                                    </button>
                                                    <button class="action-btn edit" onclick="editEmpresa('${empresa.id}')" title="Editar">
                                                        <i class="fas fa-edit"></i>
                                                    </button>
                                                    <button class="action-btn delete" onclick="confirmDeleteEmpresa('${empresa.id}', '${(empresa.nombre || '').replace(/'/g, "\\'")}')" title="Eliminar">
                                                        <i class="fas fa-trash"></i>
                                                    </button>
                                                </div>
                                            </td>
                                        </tr>
                                    `).join('')}
                                    ${empresasData.length === 0 ? `
                                        <tr>
                                            <td colspan="6" style="text-align: center; padding: 2rem;">
                                                No hay empresas registradas
                                            </td>
                                        </tr>
                                    ` : ''}
                                </tbody>
                            </table>
                        </div>
                    </div>
                `;
                
            } catch (error) {
                console.error('Error cargando dashboard:', error);
                showNotification('error', 'Error cargando dashboard');
            } finally {
                hideLoading();
            }
        }
        
        // Gestión de empresas
        async function loadEmpresas() {
            showLoading();
            try {
                const empresasData = await loadEmpresasFromSupabase();
                
                document.getElementById('mainContent').innerHTML = `
                    <div class="header">
                        <h1 class="page-title">Gestión Completa de Empresas</h1>
                        <button class="btn btn-primary" onclick="showNuevaEmpresaModal()">
                            <i class="fas fa-plus"></i> Nueva Empresa
                        </button>
                    </div>
                    
                    <div class="table-card">
                        <div class="table-wrapper">
                            <table class="data-table">
                                <thead>
                                    <tr>
                                        <th>Código</th>
                                        <th>Nombre</th>
                                        <th>RUC</th>
                                        <th>Email</th>
                                        <th>Teléfono</th>
                                        <th>País</th>
                                        <th>Estado</th>
                                        <th>Acciones</th>
                                    </tr>
                                </thead>
                                <tbody>
                                    ${empresasData.map(empresa => `
                                        <tr>
                                            <td><strong>${empresa.codigo || 'N/A'}</strong></td>
                                            <td>${empresa.nombre || 'Sin nombre'}</td>
                                            <td>${empresa.ruc || 'N/A'}</td>
                                            <td>${empresa.email || 'N/A'}</td>
                                            <td>${empresa.telefono || 'N/A'}</td>
                                            <td>${empresa.pais || 'N/A'}</td>
                                            <td>
                                                <span class="status-badge ${empresa.activo ? 'status-active' : 'status-inactive'}">
                                                    ${empresa.activo ? 'Activa' : 'Inactiva'}
                                                </span>
                                            </td>
                                            <td>
                                                <div class="action-buttons">
                                                    <button class="action-btn access" onclick="accessEmpresa('${empresa.id}')" title="Acceder como Admin">
                                                        <i class="fas fa-sign-in-alt"></i>
                                                    </button>
                                                    <button class="action-btn view" onclick="viewEmpresa('${empresa.id}')" title="Ver Detalles">
                                                        <i class="fas fa-eye"></i>
                                                    </button>
                                                    <button class="action-btn edit" onclick="editEmpresa('${empresa.id}')" title="Editar">
                                                        <i class="fas fa-edit"></i>
                                                    </button>
                                                    <button class="action-btn delete" onclick="confirmDeleteEmpresa('${empresa.id}', '${(empresa.nombre || '').replace(/'/g, "\\'")}')" title="Eliminar">
                                                        <i class="fas fa-trash"></i>
                                                    </button>
                                                </div>
                                            </td>
                                        </tr>
                                    `).join('')}
                                    ${empresasData.length === 0 ? `
                                        <tr>
                                            <td colspan="8" style="text-align: center; padding: 2rem;">
                                                No hay empresas registradas
                                            </td>
                                        </tr>
                                    ` : ''}
                                </tbody>
                            </table>
                        </div>
                    </div>
                `;
                
            } catch (error) {
                console.error('Error cargando empresas:', error);
                showNotification('error', 'Error cargando empresas');
            } finally {
                hideLoading();
            }
        }
        
        // Modal para nueva empresa
        function showNuevaEmpresaModal() {
            showModal('Registrar Nueva Empresa', `
                <div class="form-group">
                    <label>Nombre de la Empresa *</label>
                    <input type="text" id="empresaNombre" placeholder="Mi Empresa S.A." required>
                </div>
                
                <div class="form-group">
                    <label>Código *</label>
                    <input type="text" id="empresaCodigo" placeholder="EMP-001" required>
                </div>
                
                <div class="form-group">
                    <label>RUC *</label>
                    <input type="text" id="empresaRUC" placeholder="12345678901" required>
                </div>
                
                <div class="form-group">
                    <label>Email de Contacto *</label>
                    <input type="email" id="empresaEmail" placeholder="contacto@empresa.com" required>
                </div>
                
                <div class="form-group">
                    <label>Teléfono *</label>
                    <input type="text" id="empresaTelefono" placeholder="+591 70000000" required>
                </div>
                
                <div class="form-group">
                    <label>Dirección</label>
                    <input type="text" id="empresaDireccion" placeholder="Calle Principal #123">
                </div>
                
                <div class="form-group">
                    <label>País</label>
                    <input type="text" id="empresaPais" placeholder="Bolivia" value="Bolivia">
                </div>
                
                <div class="form-group">
                    <label>Estado</label>
                    <select id="empresaEstado">
                        <option value="true" selected>Activa</option>
                        <option value="false">Inactiva</option>
                    </select>
                </div>
                
                <div style="display: flex; gap: 1rem; margin-top: 2rem;">
                    <button class="btn btn-secondary" onclick="closeModal()" style="flex: 1;">Cancelar</button>
                    <button class="btn btn-primary" onclick="crearEmpresa()" style="flex: 1;">Crear Empresa</button>
                </div>
            `);
        }
        
        // Crear empresa en Supabase
        async function crearEmpresa() {
            showLoading();
            
            const empresaData = {
                id: generateUUID(),
                codigo: document.getElementById('empresaCodigo').value,
                nombre: document.getElementById('empresaNombre').value,
                ruc: document.getElementById('empresaRUC').value,
                email: document.getElementById('empresaEmail').value,
                telefono: document.getElementById('empresaTelefono').value,
                direccion: document.getElementById('empresaDireccion').value,
                pais: document.getElementById('empresaPais').value,
                activo: document.getElementById('empresaEstado').value === 'true',
                nivel_seguridad: 'alto',
                idioma_default: 'es',
                moneda_default: 'USD',
                zona_horaria: 'UTC-4',
                verificada: false,
                creado_en: new Date().toISOString(),
                actualizado_en: new Date().toISOString()
            };
            
            try {
                const { data, error } = await supabase
                    .from('empresas')
                    .insert([empresaData]);
                
                if (error) throw error;
                
                showNotification('success', 'Empresa creada exitosamente');
                closeModal();
                loadDashboard();
                
            } catch (error) {
                console.error('Error creando empresa:', error);
                showNotification('error', 'Error creando empresa: ' + error.message);
            } finally {
                hideLoading();
            }
        }
        
        // Ver empresa completa
        async function viewEmpresa(id) {
            showLoading();
            
            try {
                const { data: empresa, error } = await supabase
                    .from('empresas')
                    .select('*')
                    .eq('id', id)
                    .single();
                
                if (error) throw error;
                
                showModal(`Empresa: ${empresa.nombre || 'Sin nombre'}`, `
                    <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 2rem;">
                        <div>
                            <h4 style="color: var(--secondary); margin-bottom: 1rem;">Información General</h4>
                            <p><strong>Código:</strong> ${empresa.codigo || 'N/A'}</p>
                            <p><strong>RUC:</strong> ${empresa.ruc || 'N/A'}</p>
                            <p><strong>Email:</strong> ${empresa.email || 'N/A'}</p>
                            <p><strong>Teléfono:</strong> ${empresa.telefono || 'N/A'}</p>
                            <p><strong>Dirección:</strong> ${empresa.direccion || 'N/A'}</p>
                            <p><strong>País:</strong> ${empresa.pais || 'N/A'}</p>
                            <p><strong>Grupo Corporativo:</strong> ${empresa.grupo_corporativo || 'N/A'}</p>
                        </div>
                        
                        <div>
                            <h4 style="color: var(--secondary); margin-bottom: 1rem;">Configuración</h4>
                            <p><strong>Nivel Seguridad:</strong> ${empresa.nivel_seguridad || 'alto'}</p>
                            <p><strong>Idioma:</strong> ${empresa.idioma_default || 'es'}</p>
                            <p><strong>Moneda:</strong> ${empresa.moneda_default || 'USD'}</p>
                            <p><strong>Zona Horaria:</strong> ${empresa.zona_horaria || 'UTC-4'}</p>
                            <p><strong>Estado:</strong> ${empresa.activo ? 'Activa' : 'Inactiva'}</p>
                            <p><strong>Verificada:</strong> ${empresa.verificada ? 'Sí' : 'No'}</p>
                            <p><strong>Creada:</strong> ${empresa.creado_en ? new Date(empresa.creado_en).toLocaleDateString() : 'N/A'}</p>
                        </div>
                    </div>
                    
                    <div style="display: flex; gap: 1rem; margin-top: 2rem;">
                        <button class="btn btn-secondary" onclick="closeModal()" style="flex: 1;">Cerrar</button>
                        <button class="btn btn-primary" onclick="editEmpresa('${empresa.id}')" style="flex: 1;">
                            <i class="fas fa-edit"></i> Editar Empresa
                        </button>
                    </div>
                `);
                
            } catch (error) {
                console.error('Error cargando empresa:', error);
                showNotification('error', 'Error cargando empresa: ' + error.message);
            } finally {
                hideLoading();
            }
        }
        
        // Editar empresa
        async function editEmpresa(id) {
            showLoading();
            
            try {
                const { data: empresa, error } = await supabase
                    .from('empresas')
                    .select('*')
                    .eq('id', id)
                    .single();
                
                if (error) throw error;
                
                showModal(`Editar Empresa: ${empresa.nombre || 'Sin nombre'}`, `
                    <input type="hidden" id="editEmpresaId" value="${empresa.id}">
                    
                    <div class="form-group">
                        <label>Nombre de la Empresa *</label>
                        <input type="text" id="editEmpresaNombre" value="${empresa.nombre || ''}" required>
                    </div>
                    
                    <div class="form-group">
                        <label>Código *</label>
                        <input type="text" id="editEmpresaCodigo" value="${empresa.codigo || ''}" required>
                    </div>
                    
                    <div class="form-group">
                        <label>RUC *</label>
                        <input type="text" id="editEmpresaRUC" value="${empresa.ruc || ''}" required>
                    </div>
                    
                    <div class="form-group">
                        <label>Email de Contacto *</label>
                        <input type="email" id="editEmpresaEmail" value="${empresa.email || ''}" required>
                    </div>
                    
                    <div class="form-group">
                        <label>Teléfono *</label>
                        <input type="text" id="editEmpresaTelefono" value="${empresa.telefono || ''}" required>
                    </div>
                    
                    <div class="form-group">
                        <label>Dirección</label>
                        <input type="text" id="editEmpresaDireccion" value="${empresa.direccion || ''}">
                    </div>
                    
                    <div class="form-group">
                        <label>País</label>
                        <input type="text" id="editEmpresaPais" value="${empresa.pais || 'Bolivia'}">
                    </div>
                    
                    <div class="form-group">
                        <label>Estado</label>
                        <select id="editEmpresaEstado">
                            <option value="true" ${empresa.activo ? 'selected' : ''}>Activa</option>
                            <option value="false" ${!empresa.activo ? 'selected' : ''}>Inactiva</option>
                        </select>
                    </div>
                    
                    <div style="display: flex; gap: 1rem; margin-top: 2rem;">
                        <button class="btn btn-secondary" onclick="closeModal()" style="flex: 1;">Cancelar</button>
                        <button class="btn btn-primary" onclick="guardarEmpresa()" style="flex: 1;">Guardar Cambios</button>
                    </div>
                `);
                
            } catch (error) {
                console.error('Error cargando empresa:', error);
                showNotification('error', 'Error cargando empresa: ' + error.message);
            } finally {
                hideLoading();
            }
        }
        
        // Guardar cambios de empresa
        async function guardarEmpresa() {
            showLoading();
            
            const empresaData = {
                nombre: document.getElementById('editEmpresaNombre').value,
                codigo: document.getElementById('editEmpresaCodigo').value,
                ruc: document.getElementById('editEmpresaRUC').value,
                email: document.getElementById('editEmpresaEmail').value,
                telefono: document.getElementById('editEmpresaTelefono').value,
                direccion: document.getElementById('editEmpresaDireccion').value,
                pais: document.getElementById('editEmpresaPais').value,
                activo: document.getElementById('editEmpresaEstado').value === 'true',
                actualizado_en: new Date().toISOString()
            };
            
            const empresaId = document.getElementById('editEmpresaId').value;
            
            try {
                const { data, error } = await supabase
                    .from('empresas')
                    .update(empresaData)
                    .eq('id', empresaId);
                
                if (error) throw error;
                
                showNotification('success', 'Empresa actualizada exitosamente');
                closeModal();
                loadDashboard();
                
            } catch (error) {
                console.error('Error actualizando empresa:', error);
                showNotification('error', 'Error actualizando empresa: ' + error.message);
            } finally {
                hideLoading();
            }
        }
        
        // Confirmar eliminación
        function confirmDeleteEmpresa(id, nombre) {
            showConfirmation(
                'Eliminar Empresa',
                `¿Estás seguro de eliminar la empresa "${nombre}"?<br><br>
                Esta acción eliminará todos los datos asociados y no se puede deshacer.`,
                () => deleteEmpresa(id)
            );
        }
        
        // Eliminar empresa
        async function deleteEmpresa(id) {
            showLoading();
            
            try {
                const { error } = await supabase
                    .from('empresas')
                    .delete()
                    .eq('id', id);
                
                if (error) throw error;
                
                showNotification('success', 'Empresa eliminada exitosamente');
                loadDashboard();
                
            } catch (error) {
                console.error('Error eliminando empresa:', error);
                showNotification('error', 'Error eliminando empresa: ' + error.message);
            } finally {
                hideLoading();
            }
        }
        
        // Acceder como admin de empresa
        function accessEmpresa(empresaId) {
            const empresa = empresas.find(e => e.id === empresaId);
            if (!empresa) return;
            
            showConfirmation(
                'Acceder como Admin',
                `¿Acceder a la empresa "${empresa.nombre || 'Sin nombre'}" como administrador?<br><br>
                Se abrirá el panel de administración de esta empresa.`,
                () => {
                    localStorage.setItem('empresa_admin_access', JSON.stringify({
                        empresa_id: empresaId,
                        empresa_nombre: empresa.nombre,
                        access_time: new Date().toISOString()
                    }));
                    
                    // Redireccionar al panel de empresa
                    window.open('empresa-panel.html', '_blank');
                    showNotification('success', `Ahora eres admin de ${empresa.nombre || 'la empresa'}`);
                }
            );
        }
        
        // Cerrar sesión
        function logout() {
            localStorage.removeItem('nexial_user');
            window.location.href = 'index.html';
        }
        
        // Generar UUID
        function generateUUID() {
            return 'xxxxxxxx-xxxx-4xxx-yxxx-xxxxxxxxxxxx'.replace(/[xy]/g, function(c) {
                const r = Math.random() * 16 | 0;
                const v = c === 'x' ? r : (r & 0x3 | 0x8);
                return v.toString(16);
            });
        }
        
        // Inicializar aplicación
        async function initApp() {
            initSupabase();
            
            // No verificar autenticación para evitar problemas de RLS
            // Asumimos que somos el Director Corporativo
            
            // Cargar dashboard por defecto
            loadDashboard();
        }
        
        // Iniciar cuando el DOM esté listo
        document.addEventListener('DOMContentLoaded', initApp);
    </script>
</body>
</html>
