<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nexial Suite - Panel de Control</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2.38.4/dist/umd/supabase.min.js"></script>
    <style>
        /* ============================================= */
        /* VARIABLES CSS */
        /* ============================================= */
        :root {
            --primary: #7c3aed;
            --primary-glow: #9d5bff;
            --secondary: #00f5ff;
            --success: #00ff41;
            --danger: #ff0055;
            --warning: #ffaa00;
            --info: #00aaff;
            
            --dark: #0f0f23;
            --darker: #070710;
            --card-bg: rgba(15, 15, 35, 0.8);
            --glass: rgba(255, 255, 255, 0.05);
            
            /* Colores por rol */
            --superadmin: #ff0055;
            --admin-empresa: #00ff41;
            --gerente: #ffaa00;
            --contador: #00aaff;
            --vendedor: #7c3aed;
            --distribuidor: #ff00ff;
            --almacenero: #ff5500;
            --supervisor: #00ffff;
        }
        
        /* ============================================= */
        /* RESET Y BASE */
        /* ============================================= */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Segoe UI', 'Roboto', sans-serif;
            background: var(--darker);
            color: #fff;
            overflow-x: hidden;
        }
        
        /* ============================================= */
        /* ANIMACIONES */
        /* ============================================= */
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        
        .fade-in {
            animation: fadeIn 0.5s ease-out;
        }
        
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
        
        /* ============================================= */
        /* ESTRUCTURA PRINCIPAL */
        /* ============================================= */
        .dashboard-container {
            display: flex;
            min-height: 100vh;
        }
        
        /* ============================================= */
        /* SIDEBAR */
        /* ============================================= */
        .sidebar {
            width: 280px;
            background: var(--dark);
            border-right: 1px solid rgba(124, 58, 237, 0.3);
            display: flex;
            flex-direction: column;
            position: fixed;
            height: 100vh;
            z-index: 100;
        }
        
        .sidebar-header {
            padding: 1.5rem;
            border-bottom: 1px solid rgba(124, 58, 237, 0.3);
        }
        
        .company-logo {
            display: flex;
            align-items: center;
            gap: 1rem;
            font-size: 1.3rem;
            font-weight: 700;
            color: var(--secondary);
        }
        
        .user-info {
            padding: 1.5rem;
            border-bottom: 1px solid rgba(124, 58, 237, 0.3);
        }
        
        .user-badge {
            display: inline-block;
            padding: 0.3rem 1rem;
            border-radius: 20px;
            font-size: 0.8rem;
            font-weight: 600;
            margin-bottom: 1rem;
            background: var(--primary);
        }
        
        .user-badge.superadmin { background: var(--superadmin); }
        .user-badge.admin_empresa { background: var(--admin-empresa); }
        .user-badge.gerente { background: var(--gerente); }
        .user-badge.contador { background: var(--contador); }
        .user-badge.vendedor { background: var(--vendedor); }
        .user-badge.distribuidor { background: var(--distribuidor); }
        .user-badge.almacenero { background: var(--almacenero); }
        .user-badge.supervisor { background: var(--supervisor); }
        
        .user-name {
            font-size: 1.1rem;
            font-weight: 600;
            margin-bottom: 0.3rem;
        }
        
        .user-role {
            color: var(--secondary);
            font-size: 0.9rem;
        }
        
        .nav-menu {
            flex: 1;
            overflow-y: auto;
            padding: 1rem;
        }
        
        .nav-section {
            margin-bottom: 2rem;
        }
        
        .nav-title {
            color: var(--secondary);
            font-size: 0.8rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 1rem;
            padding-left: 1rem;
        }
        
        .nav-links {
            list-style: none;
        }
        
        .nav-item {
            margin-bottom: 0.5rem;
        }
        
        .nav-link {
            display: flex;
            align-items: center;
            gap: 1rem;
            padding: 0.8rem 1rem;
            color: rgba(255, 255, 255, 0.8);
            text-decoration: none;
            border-radius: 8px;
            transition: all 0.3s;
        }
        
        .nav-link:hover {
            background: rgba(124, 58, 237, 0.1);
            color: white;
        }
        
        .nav-link.active {
            background: linear-gradient(90deg, rgba(124, 58, 237, 0.3), transparent);
            color: var(--secondary);
            border-left: 4px solid var(--primary);
        }
        
        .sidebar-footer {
            padding: 1rem;
            border-top: 1px solid rgba(124, 58, 237, 0.3);
            text-align: center;
        }
        
        .logout-btn {
            width: 100%;
            padding: 0.8rem;
            background: rgba(255, 0, 85, 0.1);
            border: 1px solid rgba(255, 0, 85, 0.3);
            color: var(--danger);
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.3s;
        }
        
        .logout-btn:hover {
            background: rgba(255, 0, 85, 0.2);
        }
        
        /* ============================================= */
        /* CONTENIDO PRINCIPAL */
        /* ============================================= */
        .main-content {
            flex: 1;
            margin-left: 280px;
            padding: 2rem;
            min-height: 100vh;
        }
        
        .top-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 2rem;
            padding-bottom: 1.5rem;
            border-bottom: 1px solid rgba(124, 58, 237, 0.3);
        }
        
        .page-title {
            font-size: 1.8rem;
            color: var(--secondary);
        }
        
        .top-actions {
            display: flex;
            gap: 1rem;
            align-items: center;
        }
        
        .refresh-btn {
            background: rgba(124, 58, 237, 0.1);
            border: 1px solid rgba(124, 58, 237, 0.3);
            color: var(--secondary);
            border-radius: 8px;
            padding: 0.5rem 1rem;
            cursor: pointer;
            transition: all 0.3s;
        }
        
        .refresh-btn:hover {
            background: rgba(124, 58, 237, 0.2);
        }
        
        /* ============================================= */
        /* TARJETAS DE ESTADÍSTICAS */
        /* ============================================= */
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 1.5rem;
            margin-bottom: 2rem;
        }
        
        .stat-card {
            background: var(--card-bg);
            border-radius: 12px;
            padding: 1.5rem;
            border: 1px solid rgba(124, 58, 237, 0.2);
            position: relative;
            overflow: hidden;
        }
        
        .stat-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 5px;
            height: 100%;
            background: linear-gradient(to bottom, var(--primary), var(--secondary));
        }
        
        .stat-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 1rem;
        }
        
        .stat-title {
            color: var(--secondary);
            font-size: 0.9rem;
            text-transform: uppercase;
            letter-spacing: 1px;
        }
        
        .stat-icon {
            font-size: 1.5rem;
            color: rgba(255, 255, 255, 0.3);
        }
        
        .stat-value {
            font-size: 2.5rem;
            font-weight: 700;
            margin-bottom: 0.5rem;
            background: linear-gradient(45deg, white, var(--secondary));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        
        .stat-change {
            font-size: 0.9rem;
            display: flex;
            align-items: center;
            gap: 0.3rem;
        }
        
        .stat-change.positive { color: var(--success); }
        .stat-change.negative { color: var(--danger); }
        
        /* ============================================= */
        /* TABLAS DE DATOS */
        /* ============================================= */
        .table-card {
            background: var(--card-bg);
            border-radius: 12px;
            padding: 1.5rem;
            border: 1px solid rgba(124, 58, 237, 0.2);
            margin-bottom: 2rem;
        }
        
        .table-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 1.5rem;
        }
        
        .table-title {
            color: var(--secondary);
            font-size: 1.2rem;
            font-weight: 600;
        }
        
        .table-actions {
            display: flex;
            gap: 1rem;
        }
        
        .table-wrapper {
            overflow-x: auto;
        }
        
        .data-table {
            width: 100%;
            border-collapse: collapse;
        }
        
        .data-table th {
            background: rgba(124, 58, 237, 0.1);
            color: var(--secondary);
            font-weight: 600;
            text-align: left;
            padding: 1rem;
            border-bottom: 1px solid rgba(124, 58, 237, 0.3);
        }
        
        .data-table td {
            padding: 1rem;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
        }
        
        .data-table tr:hover {
            background: rgba(124, 58, 237, 0.05);
        }
        
        .status-badge {
            display: inline-block;
            padding: 0.3rem 0.8rem;
            border-radius: 20px;
            font-size: 0.8rem;
            font-weight: 600;
        }
        
        .status-active { background: rgba(0, 255, 65, 0.1); color: var(--success); }
        .status-pending { background: rgba(255, 170, 0, 0.1); color: var(--warning); }
        .status-inactive { background: rgba(255, 255, 255, 0.1); color: rgba(255, 255, 255, 0.5); }
        
        .action-buttons {
            display: flex;
            gap: 0.5rem;
        }
        
        .action-btn {
            width: 35px;
            height: 35px;
            border-radius: 6px;
            border: none;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.3s;
        }
        
        .action-btn.edit { background: rgba(0, 170, 255, 0.1); color: var(--info); }
        .action-btn.delete { background: rgba(255, 0, 85, 0.1); color: var(--danger); }
        .action-btn.view { background: rgba(0, 255, 65, 0.1); color: var(--success); }
        
        /* ============================================= */
        /* MODALES */
        /* ============================================= */
        .modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(7, 7, 16, 0.95);
            display: none;
            align-items: center;
            justify-content: center;
            z-index: 1000;
        }
        
        .modal {
            background: var(--card-bg);
            border-radius: 15px;
            padding: 2rem;
            width: 90%;
            max-width: 800px;
            max-height: 90vh;
            overflow-y: auto;
            border: 1px solid rgba(124, 58, 237, 0.3);
        }
        
        .modal-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 1.5rem;
            padding-bottom: 1rem;
            border-bottom: 1px solid rgba(124, 58, 237, 0.3);
        }
        
        .modal-title {
            color: var(--secondary);
            font-size: 1.5rem;
        }
        
        .modal-close {
            background: none;
            border: none;
            color: white;
            font-size: 1.5rem;
            cursor: pointer;
        }
        
        /* ============================================= */
        /* VISTAS POR ROL */
        /* ============================================= */
        .role-view {
            display: none;
        }
        
        .role-view.active {
            display: block;
        }
        
        /* ============================================= */
        /* DIÁLOGO DE CONFIRMACIÓN */
        /* ============================================= */
        .confirmation-dialog {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(7, 7, 16, 0.95);
            display: none;
            align-items: center;
            justify-content: center;
            z-index: 1000;
        }
        
        .confirmation-content {
            background: var(--card-bg);
            border-radius: 15px;
            padding: 2rem;
            max-width: 400px;
            width: 90%;
            border: 1px solid rgba(124, 58, 237, 0.3);
            text-align: center;
        }
        
        .confirmation-buttons {
            display: flex;
            gap: 1rem;
            margin-top: 1.5rem;
            justify-content: center;
        }
        
        /* ============================================= */
        /* LOADING SPINNER */
        /* ============================================= */
        .loading-spinner {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(7, 7, 16, 0.95);
            display: none;
            align-items: center;
            justify-content: center;
            z-index: 2000;
            flex-direction: column;
            gap: 1rem;
        }
        
        .spinner {
            width: 50px;
            height: 50px;
            border: 5px solid rgba(124, 58, 237, 0.3);
            border-radius: 50%;
            border-top-color: var(--primary);
            animation: spin 1s ease-in-out infinite;
        }
        
        /* ============================================= */
        /* FORMULARIOS */
        /* ============================================= */
        .form-group {
            margin-bottom: 1.5rem;
        }
        
        .form-group label {
            display: block;
            margin-bottom: 0.5rem;
            color: var(--secondary);
            font-weight: 500;
        }
        
        .form-group input,
        .form-group select,
        .form-group textarea {
            width: 100%;
            padding: 0.8rem;
            background: var(--dark);
            border: 1px solid rgba(124, 58, 237, 0.3);
            border-radius: 6px;
            color: white;
            font-size: 1rem;
            transition: all 0.3s;
        }
        
        .form-group input:focus,
        .form-group select:focus,
        .form-group textarea:focus {
            outline: none;
            border-color: var(--primary);
        }
        
        .btn {
            padding: 0.8rem 1.5rem;
            border-radius: 8px;
            border: none;
            cursor: pointer;
            font-weight: 600;
            transition: all 0.3s;
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
        }
        
        .btn-primary {
            background: linear-gradient(45deg, var(--primary), var(--secondary));
            color: white;
        }
        
        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(124, 58, 237, 0.3);
        }
        
        .btn-secondary {
            background: rgba(255, 255, 255, 0.05);
            color: white;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }
        
        /* ============================================= */
        /* NOTIFICACIONES */
        /* ============================================= */
        .notification {
            position: fixed;
            top: 20px;
            right: 20px;
            padding: 1rem 1.5rem;
            border-radius: 8px;
            z-index: 10000;
            max-width: 400px;
            animation: fadeIn 0.3s ease-out;
        }
        
        .notification.success {
            background: rgba(0, 255, 65, 0.1);
            border: 1px solid var(--success);
            color: white;
        }
        
        .notification.error {
            background: rgba(255, 0, 85, 0.1);
            border: 1px solid var(--danger);
            color: white;
        }
        
        .notification.info {
            background: rgba(0, 170, 255, 0.1);
            border: 1px solid var(--info);
            color: white;
        }
        
        .notification.warning {
            background: rgba(255, 170, 0, 0.1);
            border: 1px solid var(--warning);
            color: white;
        }
        
        /* ============================================= */
        /* RESPONSIVE */
        /* ============================================= */
        @media (max-width: 1200px) {
            .sidebar {
                width: 80px;
            }
            
            .main-content {
                margin-left: 80px;
            }
            
            .company-logo span,
            .user-name,
            .user-role,
            .nav-title,
            .nav-link span {
                display: none;
            }
            
            .nav-link {
                justify-content: center;
                padding: 1rem;
            }
        }
        
        @media (max-width: 768px) {
            .main-content {
                padding: 1rem;
                margin-left: 0;
            }
            
            .sidebar {
                width: 100%;
                height: auto;
                position: fixed;
                bottom: 0;
                top: auto;
                flex-direction: row;
                border-right: none;
                border-top: 1px solid rgba(124, 58, 237, 0.3);
            }
            
            .sidebar-header,
            .user-info,
            .nav-section,
            .nav-title {
                display: none;
            }
            
            .nav-menu {
                display: flex;
                justify-content: space-around;
                width: 100%;
                padding: 0.5rem;
            }
            
            .nav-links {
                display: flex;
                width: 100%;
                justify-content: space-around;
            }
            
            .nav-item {
                margin: 0;
            }
            
            .sidebar-footer {
                display: none;
            }
            
            .stats-grid {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>
    <!-- ============================================= -->
    <!-- ESTRUCTURA PRINCIPAL DEL DASHBOARD -->
    <!-- ============================================= -->
    <div class="dashboard-container">
        <!-- SIDEBAR -->
        <aside class="sidebar" id="sidebar">
            <div class="sidebar-header">
                <div class="company-logo">
                    <i class="fas fa-brain"></i>
                    <span id="sidebarCompanyName">NEXIAL SUITE</span>
                </div>
            </div>
            
            <div class="user-info">
                <div class="user-badge" id="userBadge">CARGANDO...</div>
                <div class="user-name" id="userName">Cargando...</div>
                <div class="user-role" id="userRole">Cargando rol...</div>
            </div>
            
            <nav class="nav-menu" id="navMenu">
                <!-- Menú dinámico por rol -->
            </nav>
            
            <div class="sidebar-footer">
                <button class="logout-btn" onclick="logout()">
                    <i class="fas fa-sign-out-alt"></i> Cerrar Sesión
                </button>
            </div>
        </aside>

        <!-- CONTENIDO PRINCIPAL -->
        <main class="main-content">
            <!-- BARRA SUPERIOR -->
            <div class="top-bar">
                <h1 class="page-title" id="pageTitle">Panel de Control</h1>
                
                <div class="top-actions">
                    <button class="refresh-btn" onclick="refreshData()" title="Actualizar datos">
                        <i class="fas fa-sync-alt"></i>
                    </button>
                </div>
            </div>

            <!-- VISTAS POR ROL -->
            <div id="viewSuperadmin" class="role-view"></div>
            <div id="viewAdminEmpresa" class="role-view"></div>
            <div id="viewGerente" class="role-view"></div>
            <div id="viewContador" class="role-view"></div>
            <div id="viewVendedor" class="role-view"></div>
            <div id="viewDistribuidor" class="role-view"></div>
            <div id="viewAlmacenero" class="role-view"></div>
            <div id="viewSupervisor" class="role-view"></div>
        </main>
    </div>

    <!-- ============================================= -->
    <!-- COMPONENTES GLOBALES -->
    <!-- ============================================= -->

    <!-- LOADING SPINNER -->
    <div class="loading-spinner" id="loadingSpinner">
        <div class="spinner"></div>
        <p id="loadingText">Cargando...</p>
    </div>

    <!-- MODAL GENÉRICO -->
    <div class="modal-overlay" id="modalOverlay">
        <div class="modal">
            <div class="modal-header">
                <h3 class="modal-title" id="modalTitle">Título del Modal</h3>
                <button class="modal-close" onclick="closeModal()">&times;</button>
            </div>
            <div id="modalContent">
                Contenido del modal...
            </div>
        </div>
    </div>

    <!-- DIÁLOGO DE CONFIRMACIÓN -->
    <div class="confirmation-dialog" id="confirmationDialog">
        <div class="confirmation-content">
            <h3 style="color: var(--secondary); margin-bottom: 1rem;" id="confirmationTitle">¿Estás seguro?</h3>
            <p style="color: rgba(255,255,255,0.7); margin-bottom: 1.5rem;" id="confirmationMessage"></p>
            <div class="confirmation-buttons">
                <button class="btn btn-secondary" onclick="hideConfirmation()">
                    Cancelar
                </button>
                <button class="btn btn-primary" id="confirmActionBtn">
                    Confirmar
                </button>
            </div>
        </div>
    </div>

    <script>
        // =============================================
        // CONFIGURACIÓN SUPABASE
        // =============================================
        const SUPABASE_URL = 'https://cmrysvcahpouziogzang.supabase.co';
        const SUPABASE_ANON_KEY = 'sb_publishable_rj4q31YiBwxLcfuswCX21g_LxsxRc_n';
        
        // Inicializar Supabase
        let supabase;
        try {
            supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
            console.log('✅ Supabase inicializado correctamente');
        } catch (error) {
            console.error('❌ Error inicializando Supabase:', error);
            showNotification('error', 'Error de conexión', 'No se pudo conectar con la base de datos');
        }
        
        // =============================================
        // VARIABLES GLOBALES
        // =============================================
        let currentUser = null;
        let currentSession = null;
        let database = {
            empresas: [],
            usuarios: [],
            empleados: [],
            productos: [],
            clientes: [],
            ventas: [],
            almacenes: [],
            rutas: [],
            visitas: []
        };
        
        // =============================================
        // FUNCIONES DE UTILIDAD
        // =============================================
        function showLoading(text = 'Cargando...') {
            document.getElementById('loadingText').textContent = text;
            document.getElementById('loadingSpinner').style.display = 'flex';
        }
        
        function hideLoading() {
            document.getElementById('loadingSpinner').style.display = 'none';
        }
        
        function showNotification(type, title, message) {
            const notification = document.createElement('div');
            notification.className = `notification ${type}`;
            notification.innerHTML = `
                <div style="display: flex; justify-content: space-between; align-items: start; margin-bottom: 0.5rem;">
                    <strong>${title}</strong>
                    <button onclick="this.parentElement.parentElement.remove()" style="background: none; border: none; color: white; cursor: pointer;">
                        <i class="fas fa-times"></i>
                    </button>
                </div>
                <div>${message}</div>
            `;
            
            document.body.appendChild(notification);
            
            setTimeout(() => {
                if (notification.parentElement) {
                    notification.remove();
                }
            }, 5000);
        }
        
        function showModal(title, content) {
            document.getElementById('modalTitle').textContent = title;
            document.getElementById('modalContent').innerHTML = content;
            document.getElementById('modalOverlay').style.display = 'flex';
        }
        
        function closeModal() {
            document.getElementById('modalOverlay').style.display = 'none';
        }
        
        function showConfirmation(title, message, onConfirm) {
            document.getElementById('confirmationTitle').textContent = title;
            document.getElementById('confirmationMessage').textContent = message;
            document.getElementById('confirmationDialog').style.display = 'flex';
            
            document.getElementById('confirmActionBtn').onclick = function() {

        function getRoleName(role) {
            const roles = {
                'superadmin': 'Super Admin',
                'admin_empresa': 'Jefe Empresa',
                'gerente': 'Gerente',
                'contador': 'Contador',
                'vendedor': 'Vendedor',
                'distribuidor': 'Distribuidor',
                'almacenero': 'Almacenero',
                'supervisor': 'Supervisor'
            };
            return roles[role] || role;
        }
        
        function formatDate(dateString) {
            if (!dateString) return 'No disponible';
            try {
                const date = new Date(dateString);
                return date.toLocaleDateString('es-ES');
            } catch (e) {
                return dateString;
            }
        }

        async function checkSession() {
            try {
                console.log('🔍 Verificando sesión...');
                const { data: { session }, error } = await supabase.auth.getSession();
                
                if (error) {
                    console.error('Error en sesión:', error);
                    throw error;
                }
                
                if (!session) {
                    console.log('⚠️ No hay sesión activa, redirigiendo...');
                    window.location.href = 'index.html';
                    return null;
                }
                
                currentSession = session;
                console.log('✅ Sesión activa encontrada');
                return session;
            } catch (error) {
                console.error('Error checking session:', error);
                window.location.href = 'index.html';
                return null;
            }
        }
        
        async function loadUserData() {
            if (!currentSession) return null;
            
            try {
                console.log('👤 Cargando datos del usuario...');
                // CORRECCIÓN: Usar limit(1) en lugar de single() por si hay múltiples usuarios
                const { data: usuarios, error } = await supabase
                    .from('usuarios')
                    .select('*')
                    .eq('email', currentSession.user.email)
                    .limit(1);
                
                if (error) {
                    console.error('Error loading user:', error);
                    throw error;
                }
                
                if (!usuarios || usuarios.length === 0) {
                    console.error('❌ Usuario no encontrado en la base de datos');
                    showNotification('error', 'Error', 'Usuario no encontrado en la base de datos');
                    return null;
                }
                
                const usuarioData = usuarios[0];
                currentUser = {
                    id: usuarioData.id,
                    email: usuarioData.email,
                    nombre: usuarioData.nombre,
                    rol: usuarioData.rol,
                    empresa_id: usuarioData.empresa_id,
                    codigo: usuarioData.codigo,
                    activo: usuarioData.activo
                };
                
                console.log('✅ Usuario cargado:', currentUser.nombre);
                return currentUser;
            } catch (error) {
                console.error('Error loading user data:', error);
                showNotification('error', 'Error', 'Error cargando datos del usuario');
                return null;
            }
        }

        function configureInterface() {
            if (!currentUser) {
                console.error('❌ No hay usuario actual');
                return;
            }
            
            console.log('🎨 Configurando interfaz para rol:', currentUser.rol);
            
            // Configurar badge según rol
            const userBadge = document.getElementById('userBadge');
            userBadge.className = `user-badge ${currentUser.rol}`;
            userBadge.textContent = getRoleName(currentUser.rol).toUpperCase();
            
            document.getElementById('userName').textContent = currentUser.nombre || 'Usuario';
            document.getElementById('userRole').textContent = getRoleName(currentUser.rol);
            
            // Configurar menú según rol
            const navMenu = document.getElementById('navMenu');
            navMenu.innerHTML = generateNavMenu(currentUser.rol);
            
            // Ocultar todas las vistas y mostrar solo la del rol actual
            document.querySelectorAll('.role-view').forEach(view => {
                view.classList.remove('active');
                view.innerHTML = '';
            });
            
            // Cargar dashboard según rol
            setTimeout(() => {
                if (currentUser.rol === 'superadmin') {
                    loadSuperadminDashboard();
                } else if (currentUser.rol === 'admin_empresa') {
                    loadJefeDashboard();
                } else if (currentUser.rol === 'gerente') {
                    loadGerenteDashboard();
                } else if (currentUser.rol === 'contador') {
                    loadContadorDashboard();
                } else if (currentUser.rol === 'vendedor') {
                    loadVendedorDashboard();
                } else if (currentUser.rol === 'distribuidor') {
                    loadDistribuidorDashboard();
                } else if (currentUser.rol === 'almacenero') {
                    loadAlmaceneroDashboard();
                } else if (currentUser.rol === 'supervisor') {
                    loadSupervisorDashboard();
                }
            }, 100);
        }

        function getRoleColor(role) {
            switch(role) {
                case 'superadmin': return 'rgba(255,0,85,0.2)';
                case 'admin_empresa': return 'rgba(0,255,65,0.2)';
                case 'gerente': return 'rgba(255,170,0,0.2)';
                case 'contador': return 'rgba(0,170,255,0.2)';
                case 'vendedor': return 'rgba(124,58,237,0.2)';
                case 'distribuidor': return 'rgba(255,0,255,0.2)';
                case 'almacenero': return 'rgba(255,85,0,0.2)';
                case 'supervisor': return 'rgba(0,255,255,0.2)';
                default: return 'rgba(255,255,255,0.1)';
            }
        }
        
        // =============================================
        // FUNCIONES DE FORMULARIOS
        // =============================================
        function mostrarFormularioEmpresa(empresaId = null) {
            const empresa = empresaId ? database.empresas.find(e => e.id === empresaId) : null;
            
            const content = `
                <div style="max-width: 600px;">
                    <h3 style="color: var(--secondary); margin-bottom: 1.5rem;">
                        ${empresa ? 'Editar Empresa' : 'Nueva Empresa'}
                    </h3>
                    
                    <form id="formEmpresa" onsubmit="guardarEmpresa(event, '${empresaId}')">
                        <div class="form-group">
                            <label for="nombre">Nombre de la Empresa *</label>
                            <input type="text" id="nombre" name="nombre" required 
                                   value="${empresa ? empresa.nombre : ''}">
                        </div>
                        
                        <div class="form-group">
                            <label for="nit">NIT *</label>
                            <input type="text" id="nit" name="nit" required 
                                   value="${empresa ? empresa.nit : ''}">
                        </div>
                        
                        <div class="form-group">
                            <label for="email">Email</label>
                            <input type="email" id="email" name="email" 
                                   value="${empresa ? empresa.email : ''}">
                        </div>
                        
                        <div class="form-group">
                            <label for="telefono">Teléfono</label>
                            <input type="text" id="telefono" name="telefono" 
                                   value="${empresa ? empresa.telefono : ''}">
                        </div>
                        
                        <div class="form-group">
                            <label for="direccion">Dirección</label>
                            <textarea id="direccion" name="direccion" rows="3">${empresa ? empresa.direccion : ''}</textarea>
                        </div>
                        
                        <div class="form-group">
                            <label for="activa">Estado</label>
                            <select id="activa" name="activa">
                                <option value="true" ${empresa && empresa.activa ? 'selected' : ''}>Activa</option>
                                <option value="false" ${empresa && !empresa.activa ? 'selected' : ''}>Inactiva</option>
                            </select>
                        </div>
                        
                        <div style="display: flex; gap: 1rem; margin-top: 2rem;">
                            <button type="button" class="btn btn-secondary" onclick="closeModal()">
                                Cancelar
                            </button>
                            <button type="submit" class="btn btn-primary">
                                ${empresa ? 'Actualizar Empresa' : 'Crear Empresa'}
                            </button>
                        </div>
                    </form>
                </div>
            `;
            
            showModal(empresa ? 'Editar Empresa' : 'Nueva Empresa', content);
        }
        
        async function guardarEmpresa(event, empresaId = null) {
            event.preventDefault();
            showLoading();
            
            try {
                const formData = new FormData(event.target);
                const empresaData = {
                    nombre: formData.get('nombre'),
                    nit: formData.get('nit'),
                    email: formData.get('email'),
                    telefono: formData.get('telefono'),
                    direccion: formData.get('direccion'),
                    activa: formData.get('activa') === 'true'
                };
                
                let result;
                if (empresaId) {
                    result = await supabase
                        .from('empresas')
                        .update(empresaData)
                        .eq('id', empresaId);
                } else {
                    result = await supabase
                        .from('empresas')
                        .insert([empresaData]);
                }
                
                if (result.error) throw result.error;
                
                closeModal();
                showNotification('success', 'Éxito', 
                    `Empresa ${empresaId ? 'actualizada' : 'creada'} correctamente`);
                
                await loadAllData();
                if (currentUser.rol === 'superadmin') {
                    loadEmpresasManagement();
                } else {
                    loadJefeDashboard();
                }
            } catch (error) {
                console.error('Error guardando empresa:', error);
                showNotification('error', 'Error', 
                    `No se pudo ${empresaId ? 'actualizar' : 'crear'} la empresa`);
            } finally {
                hideLoading();
            }
        }
        
        // =============================================
        // FUNCIONES CRUD
        // =============================================
        function editarEmpresa(id) {
            mostrarFormularioEmpresa(id);
        }
        
        function editarInformacionEmpresa() {
            mostrarFormularioEmpresa(currentUser.empresa_id);
        }
        
        async function eliminarEmpresa(id, nombre) {
            showConfirmation(
                'Eliminar Empresa',
                `¿Estás seguro de eliminar la empresa "${nombre}"? Esta acción no se puede deshacer.`,
                async () => {
                    showLoading();
                    try {
                        const { error } = await supabase
                            .from('empresas')
                            .delete()
                            .eq('id', id);
                        
                        if (error) throw error;
                        
                        showNotification('success', 'Éxito', 'Empresa eliminada correctamente');
                        
                        await loadAllData();
                        if (currentUser.rol === 'superadmin') {
                            loadEmpresasManagement();
                        }
                    } catch (error) {
                        console.error('Error eliminando empresa:', error);
                        showNotification('error', 'Error', 'No se pudo eliminar la empresa');
                    } finally {
                        hideLoading();
                    }
                }
            );
        }
        
        // =============================================
        // FUNCIONES DE ACTUALIZACIÓN
        // =============================================
        async function refreshData() {
            showLoading('Actualizando datos...');
            try {
                await loadAllData();
                
                // Recargar la vista actual según el rol
                if (currentUser.rol === 'superadmin') {
                    loadSuperadminDashboard();
                } else if (currentUser.rol === 'admin_empresa') {
                    loadJefeDashboard();
                } else if (currentUser.rol === 'vendedor') {
                    loadVendedorDashboard();
                }
                
                showNotification('success', 'Datos Actualizados', 'La información se sincronizó correctamente');
            } catch (error) {
                console.error('Error actualizando datos:', error);
                showNotification('error', 'Error', 'No se pudieron actualizar los datos');
            } finally {
                hideLoading();
            }
        }
        
        // =============================================
        // FUNCIONES DE SESIÓN
        // =============================================
        async function logout() {
            showLoading('Cerrando sesión...');
            try {
                const { error } = await supabase.auth.signOut();
                if (error) throw error;
                
                window.location.href = 'index.html';
            } catch (error) {
                console.error('Error al cerrar sesión:', error);
                showNotification('error', 'Error', 'No se pudo cerrar sesión');
                hideLoading();
            }
        }
        
        // =============================================
        // FUNCIONES DE INICIALIZACIÓN
        // =============================================
        async function initializeDashboard() {
            console.log('🔄 Inicializando dashboard...');
            showLoading('Verificando sesión...');
            
            try {
                // 1. Verificar sesión
                const session = await checkSession();
                if (!session) return;
                
                // 2. Cargar datos del usuario
                const user = await loadUserData();
                if (!user) {
                    window.location.href = 'index.html';
                    return;
                }
                
                // 3. Cargar datos iniciales
                await loadAllData();
                
                // 4. Configurar interfaz
                configureInterface();
                
                console.log('✅ Dashboard inicializado correctamente');
                console.log(`👤 Usuario: ${user.nombre} (${user.rol})`);
                console.log(`🏢 Empresa ID: ${user.empresa_id}`);
                
            } catch (error) {
                console.error('Error inicializando dashboard:', error);
                showNotification('error', 'Error', 'Error al cargar el dashboard');
            } finally {
                hideLoading();
            }
        }

        // =============================================
        // EVENT LISTENERS
        // =============================================
        document.addEventListener('DOMContentLoaded', function() {
            document.getElementById('modalOverlay').addEventListener('click', function(e) {
                if (e.target === this) {
                    closeModal();
                }
            });
            
            document.getElementById('confirmationDialog').addEventListener('click', function(e) {
                if (e.target === this) {
                    hideConfirmation();
                }
            });
            
            // Inicializar dashboard
            setTimeout(initializeDashboard, 100);
            
            console.log('🚀 Nexial Suite - Supabase Edition v4.0');
            console.log('🔗 URL:', SUPABASE_URL);
        });
