<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard - Director Corporativo</title>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>👑</text></svg>">
    <style>
        /* [Mismos estilos que antes, pero simplificados] */
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', sans-serif; }
        body { background: #0f0f23; color: white; min-height: 100vh; }
        .app-container { display: flex; min-height: 100vh; }
        .sidebar { width: 260px; background: #1a1a2e; border-right: 1px solid rgba(124, 58, 237, 0.2); padding: 24px; position: fixed; height: 100vh; }
        .main-content { flex: 1; margin-left: 260px; padding: 24px; }
        .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 32px; padding-bottom: 24px; border-bottom: 1px solid rgba(124, 58, 237, 0.2); }
        .stats-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 16px; margin-bottom: 32px; }
        .stat-card { background: rgba(255, 255, 255, 0.03); border: 1px solid rgba(124, 58, 237, 0.1); border-radius: 12px; padding: 20px; }
        .table-container { background: rgba(255, 255, 255, 0.03); border: 1px solid rgba(124, 58, 237, 0.1); border-radius: 12px; padding: 24px; }
        .btn { padding: 10px 20px; background: #7c3aed; color: white; border: none; border-radius: 8px; cursor: pointer; }
        .table-wrapper { overflow-x: auto; }
        .data-table { width: 100%; border-collapse: collapse; }
        .data-table th { background: rgba(124, 58, 237, 0.1); color: #9d5bff; padding: 16px; text-align: left; }
        .data-table td { padding: 16px; border-bottom: 1px solid rgba(255, 255, 255, 0.05); }
        .action-buttons { display: flex; gap: 8px; }
        .action-btn { width: 36px; height: 36px; border-radius: 8px; border: none; cursor: pointer; display: flex; align-items: center; justify-content: center; }
        .modal-overlay { position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(15, 15, 35, 0.95); display: none; align-items: center; justify-content: center; z-index: 1000; }
        .modal { background: #1a1a2e; border-radius: 12px; padding: 32px; max-width: 500px; width: 90%; border: 1px solid rgba(124, 58, 237, 0.3); }
        .loading-overlay { position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(15, 15, 35, 0.9); display: none; align-items: center; justify-content: center; z-index: 2000; }
        .spinner { width: 40px; height: 40px; border: 3px solid rgba(124, 58, 237, 0.3); border-radius: 50%; border-top-color: #7c3aed; animation: spin 1s linear infinite; }
        @keyframes spin { to { transform: rotate(360deg); } }
    </style>
</head>
<body>
    <div class="app-container">
        <div class="sidebar">
            <h2 style="color: #7c3aed; margin-bottom: 24px;">Nexial Suite</h2>
            <div style="margin-bottom: 32px;">
                <h3 id="userName">Cargando...</h3>
                <p style="color: rgba(255,255,255,0.6); font-size: 14px;">Director Corporativo</p>
            </div>
            <div style="display: flex; flex-direction: column; gap: 8px;">
                <button class="btn" onclick="loadDashboard()" style="text-align: left;">Dashboard</button>
                <button class="btn" onclick="loadEmpresas()" style="text-align: left;">Empresas</button>
                <button class="btn" onclick="logout()" style="background: rgba(255,0,85,0.2); color: #ff0055; margin-top: 32px;">Cerrar Sesión</button>
            </div>
        </div>
        
        <div class="main-content" id="mainContent">
            <!-- Contenido dinámico -->
        </div>
    </div>
    
    <div class="modal-overlay" id="modalOverlay">
        <div class="modal" id="modalContent"></div>
    </div>
    
    <div class="loading-overlay" id="loadingOverlay">
        <div class="spinner"></div>
    </div>
    
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script>
        // IIFE para evitar conflictos
        (function() {
            // CONFIGURACIÓN
            const SUPABASE_URL = 'https://tjtpdxeoxissrpdrhqbc.supabase.co';
            const SUPABASE_ANON_KEY = 'sb_publishable_yH2lzZ_AWTvHsxW4TI2yYw_KnY5krtq';
            
            // Variables globales
            var supabase = null;
            var currentUser = null;
            
            // Funciones de utilidad
            function showLoading() {
                document.getElementById('loadingOverlay').style.display = 'flex';
            }
            
            function hideLoading() {
                document.getElementById('loadingOverlay').style.display = 'none';
            }
            
            function showModal(content) {
                document.getElementById('modalContent').innerHTML = content;
                document.getElementById('modalOverlay').style.display = 'flex';
            }
            
            function closeModal() {
                document.getElementById('modalOverlay').style.display = 'none';
            }
            
            // Cargar dashboard
            async function loadDashboard() {
                showLoading();
                try {
                    const { data: empresas } = await supabase.from('empresas').select('*');
                    const { count: totalUsuarios } = await supabase.from('usuarios').select('*', { count: 'exact', head: true });
                    
                    document.getElementById('mainContent').innerHTML = `
                        <div class="header">
                            <h1>Dashboard Corporativo</h1>
                            <button class="btn" onclick="loadEmpresas()">Ver Empresas</button>
                        </div>
                        
                        <div class="stats-grid">
                            <div class="stat-card">
                                <h3 style="color: #7c3aed; font-size: 32px;">${empresas?.length || 0}</h3>
                                <p style="color: rgba(255,255,255,0.6);">Empresas</p>
                            </div>
                            <div class="stat-card">
                                <h3 style="color: #7c3aed; font-size: 32px;">${totalUsuarios || 0}</h3>
                                <p style="color: rgba(255,255,255,0.6);">Usuarios</p>
                            </div>
                        </div>
                        
                        <div class="table-container">
                            <h3 style="margin-bottom: 20px;">Empresas Recientes</h3>
                            <div class="table-wrapper">
                                <table class="data-table">
                                    <thead>
                                        <tr><th>Nombre</th><th>RUC</th><th>Email</th><th>Acciones</th></tr>
                                    </thead>
                                    <tbody>
                                        ${empresas?.slice(0, 5).map(empresa => `
                                            <tr>
                                                <td>${empresa.nombre}</td>
                                                <td>${empresa.identificacion_tributaria || 'N/A'}</td>
                                                <td>${empresa.email}</td>
                                                <td>
                                                    <button class="action-btn" onclick="verEmpresa('${empresa.id}')" style="background: rgba(0,255,65,0.1); color: #00ff41;">👁️</button>
                                                    <button class="action-btn" onclick="editarEmpresa('${empresa.id}')" style="background: rgba(0,170,255,0.1); color: #00aaff;">✏️</button>
                                                </td>
                                            </tr>
                                        `).join('') || '<tr><td colspan="4">No hay empresas</td></tr>'}
                                    </tbody>
                                </table>
                            </div>
                        </div>
                    `;
                } catch (error) {
                    console.error(error);
                } finally {
                    hideLoading();
                }
            }
            
            // Cargar empresas
            async function loadEmpresas() {
                showLoading();
                try {
                    const { data: empresas } = await supabase.from('empresas').select('*').order('creado_en', { ascending: false });
                    
                    document.getElementById('mainContent').innerHTML = `
                        <div class="header">
                            <h1>Empresas (${empresas?.length || 0})</h1>
                            <button class="btn" onclick="crearEmpresa()">Nueva Empresa</button>
                        </div>
                        
                        <div class="table-container">
                            <div class="table-wrapper">
                                <table class="data-table">
                                    <thead>
                                        <tr><th>Código</th><th>Nombre</th><th>RUC</th><th>Email</th><th>Estado</th><th>Acciones</th></tr>
                                    </thead>
                                    <tbody>
                                        ${empresas?.map(empresa => `
                                            <tr>
                                                <td>${empresa.codigo || 'N/A'}</td>
                                                <td>${empresa.nombre}</td>
                                                <td>${empresa.identificacion_tributaria || 'N/A'}</td>
                                                <td>${empresa.email}</td>
                                                <td><span style="padding: 4px 12px; border-radius: 20px; background: ${empresa.activo ? 'rgba(0,255,65,0.1)' : 'rgba(255,255,255,0.1)'}; color: ${empresa.activo ? '#00ff41' : 'rgba(255,255,255,0.5)'};">${empresa.activo ? 'Activa' : 'Inactiva'}</span></td>
                                                <td>
                                                    <div class="action-buttons">
                                                        <button class="action-btn" onclick="verEmpresa('${empresa.id}')" style="background: rgba(0,255,65,0.1); color: #00ff41;">👁️</button>
                                                        <button class="action-btn" onclick="editarEmpresa('${empresa.id}')" style="background: rgba(0,170,255,0.1); color: #00aaff;">✏️</button>
                                                        <button class="action-btn" onclick="eliminarEmpresa('${empresa.id}')" style="background: rgba(255,0,85,0.1); color: #ff0055;">🗑️</button>
                                                    </div>
                                                </td>
                                            </tr>
                                        `).join('') || '<tr><td colspan="6">No hay empresas</td></tr>'}
                                    </tbody>
                                </table>
                            </div>
                        </div>
                    `;
                } catch (error) {
                    console.error(error);
                } finally {
                    hideLoading();
                }
            }
            
            // Funciones de empresa (simplificadas)
            async function crearEmpresa() {
                const nombre = prompt('Nombre de la empresa:');
                if (!nombre) return;
                
                showLoading();
                try {
                    const empresaData = {
                        id: 'emp-' + Date.now(),
                        codigo: 'EMP-' + Date.now().toString().slice(-4),
                        nombre: nombre,
                        identificacion_tributaria: prompt('RUC:') || '',
                        email: prompt('Email:') || '',
                        telefono: prompt('Teléfono:') || '',
                        pais: 'Bolivia',
                        activo: true,
                        creado_en: new Date().toISOString()
                    };
                    
                    const { error } = await supabase.from('empresas').insert([empresaData]);
                    if (error) throw error;
                    
                    alert('Empresa creada');
                    loadEmpresas();
                } catch (error) {
                    alert('Error: ' + error.message);
                } finally {
                    hideLoading();
                }
            }
            
            async function verEmpresa(id) {
                showLoading();
                try {
                    const { data: empresa } = await supabase.from('empresas').select('*').eq('id', id).single();
                    
                    showModal(`
                        <h2 style="color: #7c3aed; margin-bottom: 20px;">${empresa.nombre}</h2>
                        <p><strong>Código:</strong> ${empresa.codigo}</p>
                        <p><strong>RUC:</strong> ${empresa.identificacion_tributaria}</p>
                        <p><strong>Email:</strong> ${empresa.email}</p>
                        <p><strong>Teléfono:</strong> ${empresa.telefono}</p>
                        <p><strong>País:</strong> ${empresa.pais}</p>
                        <p><strong>Estado:</strong> ${empresa.activo ? 'Activa' : 'Inactiva'}</p>
                        <div style="margin-top: 24px;">
                            <button class="btn" onclick="closeModal()">Cerrar</button>
                        </div>
                    `);
                } catch (error) {
                    alert('Error: ' + error.message);
                } finally {
                    hideLoading();
                }
            }
            
            async function editarEmpresa(id) {
                showLoading();
                try {
                    const { data: empresa } = await supabase.from('empresas').select('*').eq('id', id).single();
                    
                    const nuevoNombre = prompt('Nuevo nombre:', empresa.nombre);
                    if (!nuevoNombre) return;
                    
                    const { error } = await supabase
                        .from('empresas')
                        .update({ nombre: nuevoNombre, actualizado_en: new Date().toISOString() })
                        .eq('id', id);
                    
                    if (error) throw error;
                    
                    alert('Empresa actualizada');
                    loadEmpresas();
                } catch (error) {
                    alert('Error: ' + error.message);
                } finally {
                    hideLoading();
                }
            }
            
            async function eliminarEmpresa(id) {
                if (!confirm('¿Eliminar esta empresa?')) return;
                
                showLoading();
                try {
                    const { error } = await supabase.from('empresas').delete().eq('id', id);
                    if (error) throw error;
                    
                    alert('Empresa eliminada');
                    loadEmpresas();
                } catch (error) {
                    alert('Error: ' + error.message);
                } finally {
                    hideLoading();
                }
            }
            
            // Cerrar sesión
            async function logout() {
                showLoading();
                try {
                    await supabase.auth.signOut();
                    window.location.href = 'login.html';
                } catch (error) {
                    window.location.href = 'login.html';
                }
            }
            
            // Inicializar aplicación
            async function initApp() {
                showLoading();
                try {
                    // Inicializar Supabase
                    supabase = window.supabaseClient.createClient(SUPABASE_URL, SUPABASE_ANON_KEY, {
                        auth: { persistSession: true, autoRefreshToken: true }
                    });
                    
                    // Verificar sesión
                    const { data: { session } } = await supabase.auth.getSession();
                    
                    if (!session) {
                        window.location.href = 'login.html';
                        return;
                    }
                    
                    // Obtener usuario
                    const { data: userData } = await supabase
                        .from('usuarios')
                        .select('*')
                        .eq('id', session.user.id)
                        .single();
                    
                    if (!userData || userData.rol !== 'Director Corporativo') {
                        await supabase.auth.signOut();
                        window.location.href = 'login.html';
                        return;
                    }
                    
                    currentUser = userData;
                    document.getElementById('userName').textContent = userData.nombre;
                    
                    // Cargar dashboard
                    loadDashboard();
                    
                } catch (error) {
                    console.error('Error inicializando:', error);
                    window.location.href = 'login.html';
                } finally {
                    hideLoading();
                }
            }
            
            // Hacer funciones disponibles globalmente
            window.loadDashboard = loadDashboard;
            window.loadEmpresas = loadEmpresas;
            window.crearEmpresa = crearEmpresa;
            window.verEmpresa = verEmpresa;
            window.editarEmpresa = editarEmpresa;
            window.eliminarEmpresa = eliminarEmpresa;
            window.logout = logout;
            window.closeModal = closeModal;
            
            // Iniciar cuando se cargue la página
            document.addEventListener('DOMContentLoaded', initApp);
            
        })(); // Fin de la IIFE
    </script>
</body>
</html>
