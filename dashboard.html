<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nexial Suite - Panel de Control</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        /* ============================================= */
        /* VARIABLES CSS */
        /* ============================================= */
        :root {
            --primary: #7c3aed;
            --primary-glow: #9d5bff;
            --secondary: #00f5ff;
            --success: #00ff41;
            --danger: #ff0055;
            --warning: #ffaa00;
            --info: #00aaff;
            
            --dark: #0f0f23;
            --darker: #070710;
            --card-bg: rgba(15, 15, 35, 0.8);
            --glass: rgba(255, 255, 255, 0.05);
            
            /* Colores por rol */
            --superadmin: #ff0055;
            --jefe: #00ff41;
            --gerente: #ffaa00;
            --contador: #00aaff;
            --vendedor: #7c3aed;
            --distribuidor: #ff00ff;
            --almacenero: #ff5500;
            --supervisor: #00ffff;
        }
        
        /* ============================================= */
        /* RESET Y BASE */
        /* ============================================= */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Segoe UI', 'Roboto', sans-serif;
            background: var(--darker);
            color: #fff;
            overflow-x: hidden;
        }
        
        /* ============================================= */
        /* ANIMACIONES SIMPLES */
        /* ============================================= */
        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }
        
        .fade-in {
            animation: fadeIn 0.3s ease-out;
        }
        
        /* ============================================= */
        /* ESTRUCTURA PRINCIPAL */
        /* ============================================= */
        #dashboardScreen {
            display: block;
            min-height: 100vh;
        }
        
        .dashboard-container {
            display: flex;
            min-height: 100vh;
        }
        
        /* ============================================= */
        /* COMPONENTE: SIDEBAR */
        /* ============================================= */
        .sidebar {
            width: 280px;
            background: var(--dark);
            border-right: 1px solid rgba(124, 58, 237, 0.3);
            display: flex;
            flex-direction: column;
            position: fixed;
            height: 100vh;
            z-index: 100;
        }
        
        .sidebar-header {
            padding: 1.5rem;
            border-bottom: 1px solid rgba(124, 58, 237, 0.3);
        }
        
        .company-logo {
            display: flex;
            align-items: center;
            gap: 1rem;
            font-size: 1.3rem;
            font-weight: 700;
            color: var(--secondary);
        }
        
        .user-info {
            padding: 1.5rem;
            border-bottom: 1px solid rgba(124, 58, 237, 0.3);
        }
        
        .user-badge {
            display: inline-block;
            padding: 0.3rem 1rem;
            border-radius: 20px;
            font-size: 0.8rem;
            font-weight: 600;
            margin-bottom: 1rem;
        }
        
        .user-badge.superadmin { background: var(--superadmin); }
        .user-badge.jefe { background: var(--jefe); }
        .user-badge.gerente { background: var(--gerente); }
        .user-badge.contador { background: var(--contador); }
        .user-badge.vendedor { background: var(--vendedor); }
        .user-badge.distribuidor { background: var(--distribuidor); }
        .user-badge.almacenero { background: var(--almacenero); }
        .user-badge.supervisor { background: var(--supervisor); }
        
        .user-name {
            font-size: 1.1rem;
            font-weight: 600;
            margin-bottom: 0.3rem;
        }
        
        .user-role {
            color: var(--secondary);
            font-size: 0.9rem;
        }
        
        .nav-menu {
            flex: 1;
            overflow-y: auto;
            padding: 1rem;
        }
        
        .nav-section {
            margin-bottom: 2rem;
        }
        
        .nav-title {
            color: var(--secondary);
            font-size: 0.8rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 1rem;
            padding-left: 1rem;
        }
        
        .nav-links {
            list-style: none;
        }
        
        .nav-item {
            margin-bottom: 0.5rem;
        }
        
        .nav-link {
            display: flex;
            align-items: center;
            gap: 1rem;
            padding: 0.8rem 1rem;
            color: rgba(255, 255, 255, 0.8);
            text-decoration: none;
            border-radius: 8px;
            transition: all 0.3s;
        }
        
        .nav-link:hover {
            background: rgba(124, 58, 237, 0.1);
            color: white;
        }
        
        .nav-link.active {
            background: linear-gradient(90deg, rgba(124, 58, 237, 0.3), transparent);
            color: var(--secondary);
            border-left: 4px solid var(--primary);
        }
        
        .sidebar-footer {
            padding: 1rem;
            border-top: 1px solid rgba(124, 58, 237, 0.3);
            text-align: center;
        }
        
        .logout-btn {
            width: 100%;
            padding: 0.8rem;
            background: rgba(255, 0, 85, 0.1);
            border: 1px solid rgba(255, 0, 85, 0.3);
            color: var(--danger);
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.3s;
        }
        
        .logout-btn:hover {
            background: rgba(255, 0, 85, 0.2);
        }
        
        /* ============================================= */
        /* COMPONENTE: CONTENIDO PRINCIPAL */
        /* ============================================= */
        .main-content {
            flex: 1;
            margin-left: 280px;
            padding: 2rem;
            min-height: 100vh;
        }
        
        .top-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 2rem;
            padding-bottom: 1.5rem;
            border-bottom: 1px solid rgba(124, 58, 237, 0.3);
        }
        
        .page-title {
            font-size: 1.8rem;
            color: var(--secondary);
        }
        
        .top-actions {
            display: flex;
            gap: 1rem;
            align-items: center;
        }
        
        .refresh-btn {
            background: rgba(124, 58, 237, 0.1);
            border: 1px solid rgba(124, 58, 237, 0.3);
            color: var(--secondary);
            border-radius: 8px;
            padding: 0.5rem 1rem;
            cursor: pointer;
            transition: all 0.3s;
        }
        
        .refresh-btn:hover {
            background: rgba(124, 58, 237, 0.2);
        }
        
        /* ============================================= */
        /* COMPONENTE: TARJETAS DE ESTADÍSTICAS */
        /* ============================================= */
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 1.5rem;
            margin-bottom: 2rem;
        }
        
        .stat-card {
            background: var(--card-bg);
            border-radius: 12px;
            padding: 1.5rem;
            border: 1px solid rgba(124, 58, 237, 0.2);
            position: relative;
            overflow: hidden;
        }
        
        .stat-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 5px;
            height: 100%;
            background: linear-gradient(to bottom, var(--primary), var(--secondary));
        }
        
        .stat-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 1rem;
        }
        
        .stat-title {
            color: var(--secondary);
            font-size: 0.9rem;
            text-transform: uppercase;
            letter-spacing: 1px;
        }
        
        .stat-icon {
            font-size: 1.5rem;
            color: rgba(255, 255, 255, 0.3);
        }
        
        .stat-value {
            font-size: 2.5rem;
            font-weight: 700;
            margin-bottom: 0.5rem;
            background: linear-gradient(45deg, white, var(--secondary));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        
        .stat-change {
            font-size: 0.9rem;
            display: flex;
            align-items: center;
            gap: 0.3rem;
        }
        
        .stat-change.positive { color: var(--success); }
        .stat-change.negative { color: var(--danger); }
        
        /* ============================================= */
        /* COMPONENTE: TABLAS DE DATOS */
        /* ============================================= */
        .table-card {
            background: var(--card-bg);
            border-radius: 12px;
            padding: 1.5rem;
            border: 1px solid rgba(124, 58, 237, 0.2);
            margin-bottom: 2rem;
        }
        
        .table-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 1.5rem;
        }
        
        .table-title {
            color: var(--secondary);
            font-size: 1.2rem;
            font-weight: 600;
        }
        
        .table-actions {
            display: flex;
            gap: 1rem;
        }
        
        .table-wrapper {
            overflow-x: auto;
        }
        
        .data-table {
            width: 100%;
            border-collapse: collapse;
        }
        
        .data-table th {
            background: rgba(124, 58, 237, 0.1);
            color: var(--secondary);
            font-weight: 600;
            text-align: left;
            padding: 1rem;
            border-bottom: 1px solid rgba(124, 58, 237, 0.3);
        }
        
        .data-table td {
            padding: 1rem;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
        }
        
        .data-table tr:hover {
            background: rgba(124, 58, 237, 0.05);
        }
        
        .status-badge {
            display: inline-block;
            padding: 0.3rem 0.8rem;
            border-radius: 20px;
            font-size: 0.8rem;
            font-weight: 600;
        }
        
        .status-active { background: rgba(0, 255, 65, 0.1); color: var(--success); }
        .status-pending { background: rgba(255, 170, 0, 0.1); color: var(--warning); }
        .status-inactive { background: rgba(255, 255, 255, 0.1); color: rgba(255, 255, 255, 0.5); }
        
        .action-buttons {
            display: flex;
            gap: 0.5rem;
        }
        
        .action-btn {
            width: 35px;
            height: 35px;
            border-radius: 6px;
            border: none;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.3s;
        }
        
        .action-btn.edit { background: rgba(0, 170, 255, 0.1); color: var(--info); }
        .action-btn.delete { background: rgba(255, 0, 85, 0.1); color: var(--danger); }
        .action-btn.view { background: rgba(0, 255, 65, 0.1); color: var(--success); }
        
        /* ============================================= */
        /* COMPONENTE: MODALES */
        /* ============================================= */
        .modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(7, 7, 16, 0.95);
            display: none;
            align-items: center;
            justify-content: center;
            z-index: 1000;
        }
        
        .modal {
            background: var(--card-bg);
            border-radius: 15px;
            padding: 2rem;
            width: 90%;
            max-width: 800px;
            max-height: 90vh;
            overflow-y: auto;
            border: 1px solid rgba(124, 58, 237, 0.3);
        }
        
        .modal-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 1.5rem;
            padding-bottom: 1rem;
            border-bottom: 1px solid rgba(124, 58, 237, 0.3);
        }
        
        .modal-title {
            color: var(--secondary);
            font-size: 1.5rem;
        }
        
        .modal-close {
            background: none;
            border: none;
            color: white;
            font-size: 1.5rem;
            cursor: pointer;
        }
        
        /* ============================================= */
        /* COMPONENTE: VISTAS POR ROL */
        /* ============================================= */
        .role-view {
            display: none;
        }
        
        .role-view.active {
            display: block;
        }
        
        /* ============================================= */
        /* COMPONENTE: DIÁLOGO DE CONFIRMACIÓN */
        /* ============================================= */
        .confirmation-dialog {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(7, 7, 16, 0.95);
            display: none;
            align-items: center;
            justify-content: center;
            z-index: 1000;
        }
        
        .confirmation-content {
            background: var(--card-bg);
            border-radius: 15px;
            padding: 2rem;
            max-width: 400px;
            width: 90%;
            border: 1px solid rgba(124, 58, 237, 0.3);
            text-align: center;
        }
        
        .confirmation-buttons {
            display: flex;
            gap: 1rem;
            margin-top: 1.5rem;
            justify-content: center;
        }
        
        /* ============================================= */
        /* COMPONENTE: LOADING SPINNER */
        /* ============================================= */
        .loading-spinner {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(7, 7, 16, 0.95);
            align-items: center;
            justify-content: center;
            z-index: 2000;
        }
        
        .spinner {
            width: 50px;
            height: 50px;
            border: 5px solid rgba(124, 58, 237, 0.3);
            border-radius: 50%;
            border-top-color: var(--primary);
            animation: spin 1s ease-in-out infinite;
        }
        
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
        
        /* ============================================= */
        /* UTILIDADES DE FORMULARIO */
        /* ============================================= */
        .form-group {
            margin-bottom: 1.5rem;
        }
        
        .form-group label {
            display: block;
            margin-bottom: 0.5rem;
            color: var(--secondary);
            font-weight: 500;
        }
        
        .form-group input,
        .form-group select,
        .form-group textarea {
            width: 100%;
            padding: 0.8rem;
            background: var(--dark);
            border: 1px solid rgba(124, 58, 237, 0.3);
            border-radius: 6px;
            color: white;
            font-size: 1rem;
            transition: all 0.3s;
        }
        
        .form-group input:focus,
        .form-group select:focus,
        .form-group textarea:focus {
            outline: none;
            border-color: var(--primary);
        }
        
        .btn {
            padding: 0.8rem 1.5rem;
            border-radius: 8px;
            border: none;
            cursor: pointer;
            font-weight: 600;
            transition: all 0.3s;
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
        }
        
        .btn-primary {
            background: linear-gradient(45deg, var(--primary), var(--secondary));
            color: white;
        }
        
        .btn-secondary {
            background: rgba(255, 255, 255, 0.05);
            color: white;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }
        
        /* ============================================= */
        /* RESPONSIVE DESIGN */
        /* ============================================= */
        @media (max-width: 1200px) {
            .sidebar {
                width: 80px;
            }
            
            .main-content {
                margin-left: 80px;
            }
            
            .company-logo span,
            .user-name,
            .user-role,
            .nav-title,
            .nav-link span {
                display: none;
            }
            
            .nav-link {
                justify-content: center;
                padding: 1rem;
            }
        }
        
        @media (max-width: 768px) {
            .main-content {
                padding: 1rem;
                margin-left: 0;
            }
            
            .sidebar {
                width: 100%;
                height: auto;
                position: fixed;
                bottom: 0;
                top: auto;
                flex-direction: row;
                border-right: none;
                border-top: 1px solid rgba(124, 58, 237, 0.3);
            }
            
            .sidebar-header,
            .user-info,
            .nav-section,
            .nav-title {
                display: none;
            }
            
            .nav-menu {
                display: flex;
                justify-content: space-around;
                width: 100%;
                padding: 0.5rem;
            }
            
            .nav-links {
                display: flex;
                width: 100%;
                justify-content: space-around;
            }
            
            .nav-item {
                margin: 0;
            }
            
            .sidebar-footer {
                display: none;
            }
            
            .stats-grid {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>
    <!-- ============================================= -->
    <!-- ESTRUCTURA PRINCIPAL DEL DASHBOARD -->
    <!-- ============================================= -->
    <div id="dashboardScreen">
        <div class="dashboard-container">
            <!-- BLOQUE: SIDEBAR -->
            <aside class="sidebar" id="sidebar">
                <div class="sidebar-header">
                    <div class="company-logo">
                        <i class="fas fa-brain"></i>
                        <span id="sidebarCompanyName">NEXIAL SUITE</span>
                    </div>
                </div>
                
                <div class="user-info">
                    <div class="user-badge" id="userBadge">CARGANDO...</div>
                    <div class="user-name" id="userName">Cargando...</div>
                    <div class="user-role" id="userRole">Cargando rol...</div>
                </div>
                
                <nav class="nav-menu" id="navMenu">
                    <!-- Menú dinámico por rol -->
                </nav>
                
                <div class="sidebar-footer">
                    <button class="logout-btn" onclick="showLogoutConfirmation()">
                        <i class="fas fa-sign-out-alt"></i> Cerrar Sesión
                    </button>
                </div>
            </aside>

            <!-- BLOQUE: CONTENIDO PRINCIPAL -->
            <main class="main-content">
                <!-- BLOQUE: BARRA SUPERIOR -->
                <div class="top-bar">
                    <h1 class="page-title" id="pageTitle">Panel de Control</h1>
                    
                    <div class="top-actions">
                        <button class="refresh-btn" onclick="refreshData()" title="Actualizar datos">
                            <i class="fas fa-sync-alt"></i>
                        </button>
                    </div>
                </div>

                <!-- BLOQUE: VISTA SUPER ADMIN -->
                <div id="viewSuperadmin" class="role-view">
                    <!-- Contenido dinámico para Super Admin -->
                </div>

                <!-- BLOQUE: VISTA JEFE EMPRESA -->
                <div id="viewAdminEmpresa" class="role-view">
                    <!-- Contenido dinámico para Jefe de Empresa -->
                </div>

                <!-- BLOQUE: VISTA GERENTE (DIRECCIÓN COMERCIAL) -->
                <div id="viewGerente" class="role-view">
                    <!-- Contenido dinámico para Gerente/Comercial -->
                </div>

                <!-- BLOQUE: VISTA CONTADOR (ADMINISTRACIÓN Y FINANZAS) -->
                <div id="viewContador" class="role-view">
                    <!-- Contenido dinámico para Contador/Finanzas -->
                </div>

                <!-- BLOQUE: VISTA VENDEDOR -->
                <div id="viewVendedor" class="role-view">
                    <!-- Contenido dinámico para Vendedor -->
                </div>

                <!-- BLOQUE: VISTA DISTRIBUIDOR -->
                <div id="viewDistribuidor" class="role-view">
                    <!-- Contenido dinámico para Distribuidor -->
                </div>

                <!-- BLOQUE: VISTA ALMACENERO -->
                <div id="viewAlmacenero" class="role-view">
                    <!-- Contenido dinámico para Almacenero -->
                </div>

                <!-- BLOQUE: VISTA SUPERVISOR -->
                <div id="viewSupervisor" class="role-view">
                    <!-- Contenido dinámico para Supervisor -->
                </div>
            </main>
        </div>
    </div>

    <!-- ============================================= -->
    <!-- COMPONENTES GLOBALES -->
    <!-- ============================================= -->

    <!-- COMPONENTE: LOADING SPINNER -->
    <div class="loading-spinner" id="loadingSpinner">
        <div class="spinner"></div>
    </div>

    <!-- COMPONENTE: MODAL GENÉRICO -->
    <div class="modal-overlay" id="modalOverlay">
        <div class="modal">
            <div class="modal-header">
                <h3 class="modal-title" id="modalTitle">Título del Modal</h3>
                <button class="modal-close" onclick="closeModal()">&times;</button>
            </div>
            <div id="modalContent">
                Contenido del modal...
            </div>
        </div>
    </div>

    <!-- COMPONENTE: DIÁLOGO DE CONFIRMACIÓN -->
    <div class="confirmation-dialog" id="confirmationDialog">
        <div class="confirmation-content">
            <h3 style="color: var(--secondary); margin-bottom: 1rem;" id="confirmationTitle">¿Estás seguro?</h3>
            <p style="color: rgba(255,255,255,0.7); margin-bottom: 1.5rem;" id="confirmationMessage"></p>
            <div class="confirmation-buttons">
                <button class="btn btn-secondary" onclick="hideConfirmation()">
                    Cancelar
                </button>
                <button class="btn btn-primary" id="confirmActionBtn">
                    Confirmar
                </button>
            </div>
        </div>
    </div>

    <script>
        // =============================================
        // CONFIGURACIÓN SUPABASE (SINGLETON PATTERN)
        // =============================================
        const SUPABASE_URL = 'https://cmrysvcahpouziogzang.supabase.co';
        const SUPABASE_ANON_KEY = 'sb_publishable_rj4q31YiBwxLcfuswCX21g_LxsxRc_n';
        
        // Verificar si ya existe una instancia de Supabase
        let supabase;
        if (typeof window.supabase !== 'undefined' && window.supabase) {
            supabase = window.supabase;
        } else {
            // Crear nueva instancia solo si no existe
            supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
            window.supabase = supabase; // Asignar a window para uso global
        }
        
        console.log('✅ Supabase inicializado:', !!supabase);
        
        // =============================================
        // VARIABLES GLOBALES
        // =============================================
        let currentUser = null;
        let currentSession = null;
        let database = {
            empresas: [],
            usuarios: [],
            empleados: [],
            productos: [],
            clientes: [],
            ventas: [],
            almacenes: [],
            inventario: [],
            rutas: [],
            visitas: []
        };
        
        // =============================================
        // MÓDULO: FUNCIONES DE LOADING
        // =============================================
        function showLoading() {
            document.getElementById('loadingSpinner').style.display = 'flex';
        }
        
        function hideLoading() {
            document.getElementById('loadingSpinner').style.display = 'none';
        }
        
        // =============================================
        // MÓDULO: FUNCIONES DE SUPABASE
        // =============================================
        async function checkSession() {
            try {
                console.log('🔍 Verificando sesión...');
                const { data: { session }, error } = await supabase.auth.getSession();
                
                if (error) {
                    console.error('Error en sesión:', error);
                    throw error;
                }
                
                if (!session) {
                    console.log('⚠️ No hay sesión activa, redirigiendo...');
                    window.location.href = 'index.html';
                    return null;
                }
                
                currentSession = session;
                console.log('✅ Sesión activa encontrada');
                return session;
            } catch (error) {
                console.error('Error checking session:', error);
                showNotification('error', 'Error de sesión', 'No se pudo verificar la sesión');
                window.location.href = 'index.html';
                return null;
            }
        }
        
        async function loadUserData() {
            if (!currentSession) return null;
            
            try {
                console.log('👤 Cargando datos del usuario...');
                const { data: usuarioData, error } = await supabase
                    .from('usuarios')
                    .select('*')
                    .eq('email', currentSession.user.email)
                    .single();
                
                if (error) {

        async function loadEmpresas() {
            try {
                console.log('🏢 Cargando empresas...');
                let query = supabase.from('empresas').select('*');
                
                if (currentUser.rol !== 'superadmin' && currentUser.empresa_id) {
                    query = query.eq('id', currentUser.empresa_id);
                }
                
                const { data, error } = await query;
                
                if (error) throw error;
                database.empresas = data || [];
                console.log(`✅ ${database.empresas.length} empresas cargadas`);
                return database.empresas;
            } catch (error) {
                console.error('Error loading empresas:', error);
                showNotification('error', 'Error', 'No se pudieron cargar las empresas');
                return [];
            }
        }
        
        async function loadUsuarios() {
            try {
                console.log('👥 Cargando usuarios...');
                let query = supabase.from('usuarios').select('*');
                
                if (currentUser.rol === 'superadmin') {
                    // Superadmin ve todos los usuarios
                } else if (currentUser.rol === 'admin_empresa') {
                    query = query.eq('empresa_id', currentUser.empresa_id);
                } else if (currentUser.rol === 'gerente') {
                    query = query.eq('empresa_id', currentUser.empresa_id)
                                 .in('rol', ['vendedor', 'distribuidor', 'almacenero']);
                } else if (currentUser.rol === 'contador') {
                    query = query.eq('empresa_id', currentUser.empresa_id)
                                 .neq('rol', 'superadmin');
                } else if (['vendedor', 'distribuidor', 'almacenero'].includes(currentUser.rol)) {
                    query = query.eq('id', currentUser.id);
                }
                
                const { data, error } = await query;
                
                if (error) throw error;
                database.usuarios = data || [];
                console.log(`✅ ${database.usuarios.length} usuarios cargados`);
                return database.usuarios;
            } catch (error) {

        // =============================================
        // FUNCIONES AUXILIARES
        // =============================================
        function getRoleName(role) {
            const roles = {
                'superadmin': 'Super Admin',
                'admin_empresa': 'Jefe Empresa',
                'gerente': 'Gerente',
                'contador': 'Contador',
                'vendedor': 'Vendedor',
                'distribuidor': 'Distribuidor',
                'almacenero': 'Almacenero',
                'supervisor': 'Supervisor'
            };
            return roles[role] || role;
        }
        
        function getRoleColor(role) {
            switch(role) {
                case 'superadmin': return 'rgba(255,0,85,0.2)';
                case 'admin_empresa': return 'rgba(0,255,65,0.2)';
                case 'gerente': return 'rgba(255,170,0,0.2)';
                case 'contador': return 'rgba(0,170,255,0.2)';
                case 'vendedor': return 'rgba(124,58,237,0.2)';
                case 'distribuidor': return 'rgba(255,0,255,0.2)';
                case 'almacenero': return 'rgba(255,85,0,0.2)';
                case 'supervisor': return 'rgba(0,255,255,0.2)';
                default: return 'rgba(255,255,255,0.1)';
            }
        }
        
        function getStatusClass(status) {
            switch(status) {
                case 'pendiente': return 'status-pending';
                case 'en_ruta': return 'status-active';
                case 'completada': return 'status-active';
                case 'cancelada': return 'status-inactive';
                default: return 'status-pending';
            }
        }
        
        function getStatusName(status) {
            switch(status) {
                case 'pendiente': return 'Pendiente';
                case 'en_ruta': return 'En Ruta';
                case 'completada': return 'Completada';
                case 'cancelada': return 'Cancelada';
                default: return status;
            }
        }
        
        function formatDate(dateString) {
            if (!dateString) return 'No disponible';
            try {
                const date = new Date(dateString);
                return date.toLocaleDateString('es-ES');
            } catch (e) {
                return dateString;
            }
        }

            showLoading();
            try {
                await loadAllData();
                
                // Recargar la vista actual según el rol
                if (currentUser.rol === 'superadmin') {
                    loadSuperadminDashboard();
                } else if (currentUser.rol === 'admin_empresa') {
                    loadJefeDashboard();
                } else if (currentUser.rol === 'gerente') {
                    loadGerenteDashboard();
                } else if (currentUser.rol === 'contador') {
                    loadContadorDashboard();
                } else if (currentUser.rol === 'vendedor') {
                    loadVendedorDashboard();
                } else if (currentUser.rol === 'distribuidor') {
                    loadDistribuidorDashboard();
                } else if (currentUser.rol === 'almacenero') {
                    loadAlmaceneroDashboard();
                } else if (currentUser.rol === 'supervisor') {
                    loadSupervisorDashboard();
                }
                
                showNotification('success', 'Datos Actualizados', 'La información se sincronizó correctamente');

                console.error('Error actualizando datos:', error);
                showNotification('error', 'Error', 'No se pudieron actualizar los datos');
            } finally {
                hideLoading();
            }
        }

        async function guardarEmpresa(event, empresaId = null) {
            event.preventDefault();
            showLoading();
            
            try {
                const formData = new FormData(event.target);
                const empresaData = {
                    nombre: formData.get('nombre'),
                    nit: formData.get('nit'),
                    email: formData.get('email'),
                    telefono: formData.get('telefono'),
                    direccion: formData.get('direccion'),
                    activa: formData.get('activa') === 'true'
                };
                
                let result;
                if (empresaId) {
                    // Actualizar empresa existente
                    result = await supabase
                        .from('empresas')
                        .update(empresaData)
                        .eq('id', empresaId);
                } else {
                    // Crear nueva empresa
                    result = await supabase
                        .from('empresas')
                        .insert([empresaData]);
                }
                
                if (result.error) throw result.error;
                
                closeModal();
                showNotification('success', 'Éxito', 
                    `Empresa ${empresaId ? 'actualizada' : 'creada'} correctamente`);
                
                // Recargar datos y vistas
                await loadAllData();
                if (currentUser.rol === 'superadmin') {
                    loadEmpresasManagement();
                } else {
                    loadJefeDashboard();
                }
            } catch (error) {
                console.error('Error guardando empresa:', error);
                showNotification('error', 'Error', 
                    `No se pudo ${empresaId ? 'actualizar' : 'crear'} la empresa`);
            } finally {
                hideLoading();
            }
        }
        
        async function guardarUsuario(event, usuarioId = null) {
            event.preventDefault();
            showLoading();
            
            try {
                const formData = new FormData(event.target);
                const usuarioData = {
                    nombre: formData.get('nombre'),
                    email: formData.get('email'),
                    empresa_id: currentUser.rol === 'superadmin' ? formData.get('empresa_id') : currentUser.empresa_id,
                    rol: formData.get('rol'),
                    activo: formData.get('activo') === 'true'
                };
                
                let result;
                if (usuarioId) {
                    // Actualizar usuario existente
                    result = await supabase
                        .from('usuarios')
                        .update(usuarioData)
                        .eq('id', usuarioId);
                } else {
                    // Crear nuevo usuario
                    const password = formData.get('password');
                    // Nota: En un sistema real, aquí deberías crear el usuario en Supabase Auth
                    // y luego crear el registro en la tabla usuarios
                    result = await supabase
                        .from('usuarios')
                        .insert([usuarioData]);
                }
                
                if (result.error) throw result.error;
                
                closeModal();
                showNotification('success', 'Éxito', 
                    `Usuario ${usuarioId ? 'actualizado' : 'creado'} correctamente`);
                
                // Recargar datos y vistas
                await loadAllData();
                if (currentUser.rol === 'superadmin') {
                    loadUsuariosManagement();
                } else {
                    loadUsuariosEmpresa();
                }
            } catch (error) {
                console.error('Error guardando usuario:', error);
                showNotification('error', 'Error', 
                    `No se pudo ${usuarioId ? 'actualizar' : 'crear'} el usuario`);
            } finally {
                hideLoading();
            }
        }
        
        async function eliminarEmpresa(id, nombre) {
            showConfirmation(
                'Eliminar Empresa',
                `¿Estás seguro de eliminar la empresa "${nombre}"? Esta acción no se puede deshacer.`,
                async () => {
                    showLoading();
                    try {
                        const { error } = await supabase
                            .from('empresas')
                            .delete()

                        showNotification('success', 'Ubicación obtenida', `Lat: ${lat.toFixed(6)}, Lng: ${lng.toFixed(6)}`);

        // =============================================
        // FUNCIONES DE MODALES
        // =============================================
        function showModal(title, content) {
            document.getElementById('modalTitle').textContent = title;
            document.getElementById('modalContent').innerHTML = content;
            document.getElementById('modalOverlay').style.display = 'flex';
        }
        
        function closeModal() {
            document.getElementById('modalOverlay').style.display = 'none';
        }
        
        function showConfirmation(title, message, onConfirm) {
            document.getElementById('confirmationTitle').textContent = title;
            document.getElementById('confirmationMessage').innerHTML = message;
            document.getElementById('confirmationDialog').style.display = 'flex';
            
            const confirmBtn = document.getElementById('confirmActionBtn');
            confirmBtn.onclick = function() {
                hideConfirmation();
                onConfirm();
            };
        }
        
        function hideConfirmation() {
            document.getElementById('confirmationDialog').style.display = 'none';
        }
        
        // =============================================
        // MÓDULO: NOTIFICACIONES
        // =============================================
        function showNotification(type, title, message) {
            const toast = document.createElement('div');
            toast.style.cssText = `
                position: fixed;
                top: 20px;
                right: 20px;
                background: ${type === 'success' ? 'rgba(0,255,65,0.1)' : 
                            type === 'error' ? 'rgba(255,0,85,0.1)' :
                            type === 'info' ? 'rgba(0,170,255,0.1)' :
                            'rgba(255,170,0,0.1)'};
                border: 1px solid ${type === 'success' ? 'var(--success)' : 
                                 type === 'error' ? 'var(--danger)' :
                                 type === 'info' ? 'var(--info)' :
                                 'var(--warning)'};
                color: white;
                padding: 1rem;
                border-radius: 8px;
                min-width: 300px;
                max-width: 400px;
                z-index: 10000;
            `;
            
            toast.innerHTML = `
                <div style="display: flex; justify-content: space-between; align-items: start; margin-bottom: 0.5rem;">
                    <strong style="color: ${type === 'success' ? 'var(--success)' : 
                                     type === 'error' ? 'var(--danger)' :
                                     type === 'info' ? 'var(--info)' :
                                     'var(--warning)'}">
                        ${title}
                    </strong>
                    <button onclick="this.parentElement.parentElement.remove()" style="background: none; border: none; color: white; cursor: pointer;">
                        <i class="fas fa-times"></i>
                    </button>
                </div>
                <div style="color: rgba(255,255,255,0.8); font-size: 0.9rem;">${message}</div>
            `;
            
            document.body.appendChild(toast);
            
            setTimeout(() => {
                if (toast.parentElement) {
                    toast.remove();
                }
            }, 5000);
        }

        async function logout() {
            showLoading();
            try {
                const { error } = await supabase.auth.signOut();
                if (error) throw error;
                
                window.location.href = 'index.html';
            } catch (error) {
                console.error('Error al cerrar sesión:', error);
                showNotification('error', 'Error', 'No se pudo cerrar sesión');
            } finally {
                hideLoading();
            }
        }
        
        // =============================================
        // MÓDULO: INICIALIZACIÓN
        // =============================================
        async function initializeDashboard() {
            console.log('🔄 Inicializando dashboard...');
            showLoading();
            
            try {
                // 1. Verificar sesión
                const session = await checkSession();
                if (!session) return;
                
                // 2. Cargar datos del usuario
                const user = await loadUserData();
                if (!user) {
                    window.location.href = 'index.html';
                    return;
                }
                
                // 3. Cargar datos iniciales
                await loadAllData();
                
                // 4. Configurar interfaz
                configureInterface();
                
                console.log('✅ Dashboard inicializado correctamente');
                console.log(`👤 Usuario: ${user.nombre} (${user.rol})`);
                console.log(`🏢 Empresa ID: ${user.empresa_id}`);
                
            } catch (error) {
                console.error('Error inicializando dashboard:', error);
                showNotification('error', 'Error', 'Error al cargar el dashboard');
            } finally {
                hideLoading();
            }
        }
        
        // =============================================
        // EVENT LISTENERS
        // =============================================
        document.addEventListener('DOMContentLoaded', function() {
            document.getElementById('modalOverlay').addEventListener('click', function(e) {
                if (e.target === this) {
                    closeModal();
                }
            });
            
            document.getElementById('confirmationDialog').addEventListener('click', function(e) {
                if (e.target === this) {
                    hideConfirmation();
                }
            });
            
            // Esperar un momento para asegurar que todo esté cargado
            setTimeout(() => {
                initializeDashboard();

            console.log('📊 Sistema Corporativo Multiempresa v4.0');
            console.log('🔗 Supabase URL:', SUPABASE_URL);
        });

        function verRutaDetalle(rutaId) {
            const ruta = database.rutas.find(r => r.id === rutaId);
            if (!ruta) {
                showNotification('error', 'Error', 'Ruta no encontrada');
                return;
            }
            
            showModal(`Detalle de Ruta: ${ruta.codigo}`, `
                <div style="max-width: 600px;">
                    <div style="padding: 1rem;">
                        <p><strong>Código:</strong> ${ruta.codigo}</p>
                        <p><strong>Fecha:</strong> ${formatDate(ruta.fecha)}</p>
                        <p><strong>Estado:</strong> <span class="status-badge ${getStatusClass(ruta.estado)}">${getStatusName(ruta.estado)}</span></p>
                        <p><strong>Distancia Total:</strong> ${ruta.distancia_total_km || 0} km</p>
                        <p><strong>Observaciones:</strong> ${ruta.observaciones || 'Sin observaciones'}</p>
                    </div>

            `);
        }

                        showNotification('error', 'Error', 'No se pudo iniciar la ruta');
