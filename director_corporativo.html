<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Panel Director Corporativo</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        body { font-family: Arial; margin: 0; background: #f5f7fa; }
        header { background: #1a1a2e; color: white; padding: 1rem; display: flex; justify-content: space-between; align-items: center; }
        header h1 { margin: 0; font-size: 1.3rem; }
        .user-info { font-size: 0.9rem; }
        button.logout { background: #e74c3c; border: none; color: white; padding: 8px 16px; border-radius: 5px; cursor: pointer; }
        .container { max-width: 1200px; margin: 2rem auto; padding: 1rem; }
        .card { background: white; border-radius: 8px; padding: 1.5rem; margin-bottom: 2rem; box-shadow: 0 2px 8px rgba(0,0,0,0.05); }
        table { width: 100%; border-collapse: collapse; margin-top: 1rem; }
        th, td { border: 1px solid #dee2e6; padding: 10px; text-align: left; }
        th { background: #e9ecef; }
        .btn { padding: 6px 12px; border: none; border-radius: 4px; cursor: pointer; margin-right: 5px; }
        .btn-primary { background: #2c7be5; color: white; }
        .btn-danger { background: #e74c3c; color: white; }
        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); justify-content: center; align-items: center; }
        .modal-content { background: white; padding: 2rem; border-radius: 10px; width: 500px; max-width: 90%; }
        .form-group { margin-bottom: 1rem; }
        .form-group label { display: block; margin-bottom: 4px; font-weight: bold; }
        .form-group input, .form-group select, .form-group textarea { width: 100%; padding: 8px; border: 1px solid #ccc; border-radius: 5px; }
        .flex { display: flex; gap: 1rem; margin-bottom: 1rem; }
    </style>
</head>
<body>
    <header>
        <h1>Panel Director Corporativo</h1>
        <div class="user-info">
            Bienvenido, <span id="userName"></span> 
            <button class="logout" onclick="logout()">Cerrar sesión</button>
        </div>
    </header>

    <div class="container">
        <!-- Sección de empresas (CRUD completo) -->
        <div class="card">
            <h2>Gestión de Empresas</h2>
            <button class="btn btn-primary" onclick="openCreateEmpresa()">+ Nueva Empresa</button>
            <table id="empresasTable">
                <thead>
                    <tr>
                        <th>Nombre</th>
                        <th>RFC</th>
                        <th>Moneda</th>
                        <th>Activo</th>
                        <th>Acciones</th>
                    </tr>
                </thead>
                <tbody></tbody>
            </table>
        </div>

        <!-- Más secciones se pueden añadir fácilmente (monedas, usuarios, etc.) -->
    </div>

    <!-- Modal para crear/editar empresa -->
    <div class="modal" id="empresaModal">
        <div class="modal-content">
            <h3 id="modalTitle">Nueva Empresa</h3>
            <form id="empresaForm">
                <input type="hidden" id="empresaId">
                <div class="form-group">
                    <label>Nombre</label>
                    <input type="text" id="nombre" required>
                </div>
                <div class="form-group">
                    <label>RFC</label>
                    <input type="text" id="rfc" required>
                </div>
                <div class="form-group">
                    <label>Moneda</label>
                    <select id="moneda_id" required></select>
                </div>
                <div class="form-group">
                    <label>Teléfono</label>
                    <input type="text" id="telefono">
                </div>
                <div class="form-group">
                    <label>Email</label>
                    <input type="email" id="email">
                </div>
                <div class="form-group">
                    <label>Website</label>
                    <input type="text" id="website">
                </div>
                <div class="form-group">
                    <label>Dirección</label>
                    <textarea id="direccion" rows="2"></textarea>
                </div>
                <div class="form-group">
                    <label>Activo</label>
                    <input type="checkbox" id="activo" checked>
                </div>
                <div class="flex">
                    <button type="submit" class="btn btn-primary">Guardar</button>
                    <button type="button" class="btn btn-danger" onclick="closeModal()">Cancelar</button>
                </div>
            </form>
        </div>
    </div>

    <script>
        // CONFIGURACIÓN SUPABASE (mismos datos que en login)
        const SUPABASE_URL = 'https://your-project.supabase.co';
        const SUPABASE_ANON_KEY = 'your-anon-key';

        // Verificar sesión
        const userId = localStorage.getItem('user_id');
        const userRol = localStorage.getItem('user_rol');
        if (!userId || userRol !== 'Director Corporativo') {
            alert('Acceso denegado. Redirigiendo al login.');
            window.location.href = 'login.html';
            throw new Error('No autorizado');
        }

        // Configurar cliente con header x-user-id
        const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY, {
            global: {
                headers: { 'x-user-id': userId }
            }
        });

        document.getElementById('userName').textContent = localStorage.getItem('user_nombres') || 'Usuario';

        // Logout
        function logout() {
            localStorage.clear();
            window.location.href = 'login.html';
        }

        // Cargar empresas
        async function loadEmpresas() {
            const { data, error } = await supabase
                .from('empresas')
                .select('*, monedas(nombre, codigo)')
                .order('nombre', { ascending: true });

            if (error) {
                console.error('Error cargando empresas:', error);
                return;
            }

            const tbody = document.querySelector('#empresasTable tbody');
            tbody.innerHTML = '';
            data.forEach(empresa => {
                const row = tbody.insertRow();
                row.innerHTML = `
                    <td>${empresa.nombre}</td>
                    <td>${empresa.rfc}</td>
                    <td>${empresa.monedas?.nombre || ''} (${empresa.monedas?.codigo || ''})</td>
                    <td>${empresa.activo ? 'Sí' : 'No'}</td>
                    <td>
                        <button class="btn btn-primary" onclick="editEmpresa('${empresa.id}')">Editar</button>
                        <button class="btn btn-danger" onclick="deleteEmpresa('${empresa.id}')">Eliminar</button>
                    </td>
                `;
            });
        }

        // Abrir modal para nueva empresa
        async function openCreateEmpresa() {
            document.getElementById('modalTitle').textContent = 'Nueva Empresa';
            document.getElementById('empresaId').value = '';
            document.getElementById('empresaForm').reset();
            document.getElementById('activo').checked = true;
            await loadMonedasOptions();
            document.getElementById('empresaModal').style.display = 'flex';
        }

        // Editar empresa
        async function editEmpresa(id) {
            document.getElementById('modalTitle').textContent = 'Editar Empresa';
            const { data, error } = await supabase.from('empresas').select('*').eq('id', id).single();
            if (error || !data) {
                alert('Error al cargar empresa');
                return;
            }
            document.getElementById('empresaId').value = data.id;
            document.getElementById('nombre').value = data.nombre || '';
            document.getElementById('rfc').value = data.rfc || '';
            document.getElementById('telefono').value = data.telefono || '';
            document.getElementById('email').value = data.email || '';
            document.getElementById('website').value = data.website || '';
            document.getElementById('direccion').value = data.direccion || '';
            document.getElementById('activo').checked = data.activo;
            await loadMonedasOptions();
            document.getElementById('moneda_id').value = data.moneda_id;
            document.getElementById('empresaModal').style.display = 'flex';
        }

        // Cerrar modal
        function closeModal() {
            document.getElementById('empresaModal').style.display = 'none';
        }

        // Cargar opciones de monedas
        async function loadMonedasOptions() {
            const { data, error } = await supabase.from('monedas').select('id, nombre, codigo');
            if (error) return;
            const select = document.getElementById('moneda_id');
            select.innerHTML = '';
            data.forEach(m => {
                const opt = document.createElement('option');
                opt.value = m.id;
                opt.textContent = `${m.nombre} (${m.codigo})`;
                select.appendChild(opt);
            });
        }

        // Guardar empresa (crear/actualizar)
        document.getElementById('empresaForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const id = document.getElementById('empresaId').value;
            const empresa = {
                nombre: document.getElementById('nombre').value,
                rfc: document.getElementById('rfc').value,
                moneda_id: document.getElementById('moneda_id').value,
                telefono: document.getElementById('telefono').value,
                email: document.getElementById('email').value,
                website: document.getElementById('website').value,
                direccion: document.getElementById('direccion').value,
                activo: document.getElementById('activo').checked
            };

            if (id) {
                // Actualizar
                const { error } = await supabase.from('empresas').update(empresa).eq('id', id);
                if (error) { alert('Error al actualizar: ' + error.message); return; }
            } else {
                // Crear nueva
                const { error } = await supabase.from('empresas').insert([empresa]);
                if (error) { alert('Error al crear: ' + error.message); return; }
            }

            closeModal();
            loadEmpresas();
        });

        // Eliminar empresa
        async function deleteEmpresa(id) {
            if (!confirm('¿Estás seguro de eliminar esta empresa? Se borrarán todos sus datos relacionados.')) return;
            const { error } = await supabase.from('empresas').delete().eq('id', id);
            if (error) alert('Error al eliminar: ' + error.message);
            loadEmpresas();
        }

        // Inicializar al cargar
        document.addEventListener('DOMContentLoaded', () => {
            loadEmpresas();
        });
    </script>
</body>
</html>
