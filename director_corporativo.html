<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Panel Director Corporativo</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-50 min-h-screen flex">
  <!-- Sidebar -->
  <aside class="w-64 bg-indigo-700 text-white flex flex-col">
    <div class="p-5 text-xl font-bold border-b border-indigo-500">Corporativo</div>
    <nav class="flex-1 p-4 space-y-2">
      <button onclick="showSection('empresas')" class="w-full text-left px-3 py-2 rounded hover:bg-indigo-600 focus:outline-none focus:bg-indigo-600">Empresas</button>
      <button onclick="showSection('usuarios')" class="w-full text-left px-3 py-2 rounded hover:bg-indigo-600 focus:outline-none focus:bg-indigo-600">Usuarios</button>
    </nav>
    <div class="p-4 border-t border-indigo-500">
      <button id="logout-btn" class="w-full bg-red-500 hover:bg-red-600 text-white py-2 rounded">Cerrar sesión</button>
    </div>
  </aside>

  <!-- Contenido principal -->
  <main class="flex-1 p-8 overflow-auto">
    <div id="empresas-section" class="section hidden">
      <div class="flex justify-between items-center mb-6">
        <h2 class="text-2xl font-bold">Gestión de Empresas</h2>
        <button onclick="openEmpresaModal()" class="bg-indigo-600 text-white px-4 py-2 rounded hover:bg-indigo-700">Nueva Empresa</button>
      </div>
      <div id="empresas-list" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-4"></div>
    </div>

    <div id="usuarios-section" class="section hidden">
      <div class="flex justify-between items-center mb-6">
        <h2 class="text-2xl font-bold">Gestión de Usuarios</h2>
        <div class="flex space-x-2">
          <select id="empresa-select-users" class="border rounded px-3 py-2">
            <option value="">Seleccione una empresa</option>
          </select>
          <button onclick="openUsuarioModal()" class="bg-indigo-600 text-white px-4 py-2 rounded hover:bg-indigo-700">Nuevo Usuario</button>
        </div>
      </div>
      <div id="usuarios-list" class="bg-white rounded shadow overflow-x-auto"></div>
    </div>
  </main>

  <!-- Modal (genérico) -->
  <div id="modal" class="fixed inset-0 bg-black bg-opacity-50 flex items-center justify-center hidden">
    <div class="bg-white p-6 rounded-lg shadow-xl w-full max-w-2xl max-h-[90vh] overflow-y-auto" id="modal-content"></div>
  </div>

  <script type="module">
    import { createClient } from 'https://cdn.jsdelivr.net/npm/@supabase/supabase-js/+esm';

    const supabase = createClient(
      'https://ogkjeokfcosaeqrlyfdj.supabase.co',
      'sb_publishable_SdiAWuSUYzEQiNF0ILOCOQ_IAKESzos'
    );

    // Verificar sesión y rol
    const { data: { session }, error: sessionError } = await supabase.auth.getSession();
    if (!session) window.location.href = 'login.html';

    const { data: usuario } = await supabase.from('usuarios').select('rol').eq('auth_id', session.user.id).single();
    if (!usuario || usuario.rol !== 'Director Corporativo') {
      alert('No tienes permiso para acceder a este panel.');
      await supabase.auth.signOut();
      window.location.href = 'login.html';
    }

    // Cerrar sesión
    document.getElementById('logout-btn').addEventListener('click', async () => {
      await supabase.auth.signOut();
      window.location.href = 'login.html';
    });

    // Funciones de navegación
    window.showSection = (section) => {
      document.querySelectorAll('.section').forEach(s => s.classList.add('hidden'));
      document.getElementById(`${section}-section`).classList.remove('hidden');
      if (section === 'empresas') cargarEmpresas();
      if (section === 'usuarios') { cargarEmpresasSelect(); cargarUsuarios(); }
    };

    // Inicializar
    showSection('empresas');

    // ============== EMPRESAS ==============
    async function cargarEmpresas() {
      const { data: empresas, error } = await supabase.from('empresas').select('*');
      if (error) return alert(error.message);
      const container = document.getElementById('empresas-list');
      container.innerHTML = empresas.map(e => `
        <div class="bg-white p-4 rounded shadow">
          <h3 class="font-semibold text-lg">${e.nombre}</h3>
          <p class="text-sm text-gray-600">RFC: ${e.rfc}</p>
          <p class="text-sm">Email: ${e.email || '-'}</p>
          <div class="mt-3 flex space-x-2">
            <button onclick="editarEmpresa('${e.id}')" class="text-blue-600 hover:underline">Editar</button>
            <button onclick="eliminarEmpresa('${e.id}')" class="text-red-600 hover:underline">Eliminar</button>
          </div>
        </div>
      `).join('');
    }

    window.editarEmpresa = async (id) => {
      const { data } = await supabase.from('empresas').select('*').eq('id', id).single();
      openEmpresaModal(data);
    };

    window.eliminarEmpresa = async (id) => {
      if (!confirm('¿Eliminar esta empresa? Se borrarán todos sus datos asociados.')) return;
      const { error } = await supabase.from('empresas').delete().eq('id', id);
      if (error) alert(error.message);
      cargarEmpresas();
    };

    window.openEmpresaModal = (empresa = null) => {
      const modal = document.getElementById('modal');
      const content = document.getElementById('modal-content');
      const editMode = empresa !== null;
      const defaultMoneda = ''; // Podrías cargar monedas dinámicamente

      content.innerHTML = `
        <h3 class="text-xl font-bold mb-4">${editMode ? 'Editar Empresa' : 'Nueva Empresa'}</h3>
        <form id="empresa-form" class="space-y-4">
          <div class="grid grid-cols-2 gap-4">
            <div>
              <label class="block text-sm font-medium">Nombre</label>
              <input type="text" name="nombre" value="${empresa?.nombre || ''}" required class="w-full border rounded px-3 py-2">
            </div>
            <div>
              <label class="block text-sm font-medium">RFC</label>
              <input type="text" name="rfc" value="${empresa?.rfc || ''}" required class="w-full border rounded px-3 py-2">
            </div>
            <div class="col-span-2">
              <label class="block text-sm font-medium">Dirección</label>
              <input type="text" name="direccion" value="${empresa?.direccion || ''}" class="w-full border rounded px-3 py-2">
            </div>
            <div>
              <label class="block text-sm font-medium">Teléfono</label>
              <input type="text" name="telefono" value="${empresa?.telefono || ''}" class="w-full border rounded px-3 py-2">
            </div>
            <div>
              <label class="block text-sm font-medium">Email</label>
              <input type="email" name="email" value="${empresa?.email || ''}" class="w-full border rounded px-3 py-2">
            </div>
            <div>
              <label class="block text-sm font-medium">Website</label>
              <input type="url" name="website" value="${empresa?.website || ''}" class="w-full border rounded px-3 py-2">
            </div>
            <div>
              <label class="block text-sm font-medium">Moneda</label>
              <select name="moneda_id" required class="w-full border rounded px-3 py-2"></select>
            </div>
            <div>
              <label class="block text-sm font-medium">Tipo de empresa</label>
              <input type="text" name="tipo_empresa" value="${empresa?.tipo_empresa || ''}" class="w-full border rounded px-3 py-2">
            </div>
            <div>
              <label class="block text-sm font-medium">Régimen Fiscal</label>
              <input type="text" name="regimen_fiscal" value="${empresa?.regimen_fiscal || ''}" class="w-full border rounded px-3 py-2">
            </div>
          </div>
          <div class="flex justify-end space-x-2">
            <button type="button" onclick="cerrarModal()" class="px-4 py-2 border rounded">Cancelar</button>
            <button type="submit" class="px-4 py-2 bg-indigo-600 text-white rounded hover:bg-indigo-700">Guardar</button>
          </div>
        </form>
      `;

      // Cargar monedas en el select
      cargarMonedasSelect(content.querySelector('select[name="moneda_id"]'), empresa?.moneda_id);

      document.getElementById('empresa-form').addEventListener('submit', async (e) => {
        e.preventDefault();
        const formData = new FormData(e.target);
        const data = Object.fromEntries(formData.entries());
        let res;
        if (editMode) {
          res = await supabase.from('empresas').update(data).eq('id', empresa.id);
        } else {
          res = await supabase.from('empresas').insert(data);
        }
        if (res.error) alert(res.error.message);
        else {
          cerrarModal();
          cargarEmpresas();
        }
      });

      modal.classList.remove('hidden');
    };

    async function cargarMonedasSelect(selectElement, selectedId = null) {
      const { data: monedas } = await supabase.from('monedas').select('id, codigo');
      selectElement.innerHTML = monedas.map(m => `<option value="${m.id}" ${selectedId === m.id ? 'selected' : ''}>${m.codigo}</option>`).join('');
    }

    window.cerrarModal = () => document.getElementById('modal').classList.add('hidden');

    // ============== USUARIOS ==============
    async function cargarEmpresasSelect() {
      const select = document.getElementById('empresa-select-users');
      const { data: empresas } = await supabase.from('empresas').select('id, nombre');
      select.innerHTML = '<option value="">Todas las empresas</option>' + empresas.map(e => `<option value="${e.id}">${e.nombre}</option>`).join('');
      select.onchange = () => cargarUsuarios(select.value);
    }

    async function cargarUsuarios(empresaId = '') {
      let query = supabase.from('usuarios').select('*, empresas(nombre)');
      if (empresaId) query = query.eq('empresa_id', empresaId);
      const { data: usuarios, error } = await query;
      if (error) return alert(error.message);
      const container = document.getElementById('usuarios-list');
      container.innerHTML = `
        <table class="w-full text-sm">
          <thead class="bg-gray-100">
            <tr>
              <th class="p-2 text-left">Nombre</th>
              <th class="p-2 text-left">Email</th>
              <th class="p-2 text-left">Usuario</th>
              <th class="p-2 text-left">Rol</th>
              <th class="p-2 text-left">Empresa</th>
              <th class="p-2 text-left">Acciones</th>
            </tr>
          </thead>
          <tbody>
            ${usuarios.map(u => `
              <tr class="border-b">
                <td class="p-2">${u.nombres} ${u.apellido_paterno}</td>
                <td class="p-2">${u.email}</td>
                <td class="p-2">${u.usuario}</td>
                <td class="p-2">${u.rol}</td>
                <td class="p-2">${u.empresas?.nombre || '-'}</td>
                <td class="p-2 space-x-1">
                  <button onclick="editarUsuario('${u.id}')" class="text-blue-600 hover:underline">Editar</button>
                  <button onclick="eliminarUsuario('${u.id}')" class="text-red-600 hover:underline">Eliminar</button>
                </td>
              </tr>
            `).join('')}
          </tbody>
        </table>
      `;
    }

    window.openUsuarioModal = (usuarioActual = null) => {
      const modal = document.getElementById('modal');
      const content = document.getElementById('modal-content');
      const editMode = usuarioActual !== null;
      const title = editMode ? 'Editar Usuario' : 'Nuevo Usuario';
      content.innerHTML = `
        <h3 class="text-xl font-bold mb-4">${title}</h3>
        <form id="usuario-form" class="space-y-4">
          <div class="grid grid-cols-2 gap-4">
            <div>
              <label class="block text-sm font-medium">Nombres</label>
              <input type="text" name="nombres" value="${usuarioActual?.nombres || ''}" required class="w-full border rounded px-3 py-2">
            </div>
            <div>
              <label class="block text-sm font-medium">Apellido Paterno</label>
              <input type="text" name="apellido_paterno" value="${usuarioActual?.apellido_paterno || ''}" required class="w-full border rounded px-3 py-2">
            </div>
            <div>
              <label class="block text-sm font-medium">Apellido Materno</label>
              <input type="text" name="apellido_materno" value="${usuarioActual?.apellido_materno || ''}" class="w-full border rounded px-3 py-2">
            </div>
            <div>
              <label class="block text-sm font-medium">Email</label>
              <input type="email" name="email" value="${usuarioActual?.email || ''}" required class="w-full border rounded px-3 py-2">
            </div>
            <div>
              <label class="block text-sm font-medium">Usuario</label>
              <input type="text" name="usuario" value="${usuarioActual?.usuario || ''}" required class="w-full border rounded px-3 py-2">
            </div>
            <div>
              <label class="block text-sm font-medium">Rol</label>
              <select name="rol" required class="w-full border rounded px-3 py-2">
                ${['Director General', 'Director Financiero', 'Supervisor Senior', 'Ejecutivo Comercial', 'Especialista Logístico', 'Gestor de Almacén'].map(r => `<option value="${r}" ${usuarioActual?.rol === r ? 'selected' : ''}>${r}</option>`).join('')}
              </select>
            </div>
            <div>
              <label class="block text-sm font-medium">Empresa</label>
              <select name="empresa_id" required class="w-full border rounded px-3 py-2" id="empresa-usuario-select"></select>
            </div>
            ${!editMode ? `
            <div class="col-span-2">
              <label class="block text-sm font-medium">Contraseña</label>
              <input type="password" name="contrasena" required class="w-full border rounded px-3 py-2">
            </div>` : ''}
          </div>
          <div class="flex justify-end space-x-2">
            <button type="button" onclick="cerrarModal()" class="px-4 py-2 border rounded">Cancelar</button>
            <button type="submit" class="px-4 py-2 bg-indigo-600 text-white rounded hover:bg-indigo-700">Guardar</button>
          </div>
        </form>
      `;

      // Cargar empresas en el select
      cargarEmpresasSelectUsuario(content.querySelector('#empresa-usuario-select'), usuarioActual?.empresa_id);

      content.querySelector('#usuario-form').addEventListener('submit', async (e) => {
        e.preventDefault();
        const formData = new FormData(e.target);
        const data = Object.fromEntries(formData.entries());
        if (editMode) delete data.contrasena;

        // Si es nuevo, debemos crear el usuario en auth y luego en usuarios
        if (!editMode) {
          const { data: authData, error: authError } = await supabase.auth.admin.createUser({
            email: data.email,
            password: data.contrasena,
            email_confirm: true
          });
          if (authError) return alert('Error al crear auth user: ' + authError.message);
          data.auth_id = authData.user.id;
          delete data.contrasena;
        }

        const { error } = editMode 
          ? await supabase.from('usuarios').update(data).eq('id', usuarioActual.id)
          : await supabase.from('usuarios').insert(data);
        if (error) alert(error.message);
        else {
          cerrarModal();
          cargarUsuarios(document.getElementById('empresa-select-users').value);
        }
      });

      modal.classList.remove('hidden');
    };

    async function cargarEmpresasSelectUsuario(selectElement, selectedId = null) {
      const { data: empresas } = await supabase.from('empresas').select('id, nombre');
      selectElement.innerHTML = empresas.map(e => `<option value="${e.id}" ${selectedId === e.id ? 'selected' : ''}>${e.nombre}</option>`).join('');
    }

    window.editarUsuario = async (id) => {
      const { data } = await supabase.from('usuarios').select('*').eq('id', id).single();
      openUsuarioModal(data);
    };

    window.eliminarUsuario = async (id) => {
      if (!confirm('¿Eliminar permanentemente este usuario?')) return;
      const { error } = await supabase.from('usuarios').delete().eq('id', id);
      if (error) alert(error.message);
      cargarUsuarios(document.getElementById('empresa-select-users').value);
    };

    // Exponer funciones globalmente
    window.editarUsuario = editarUsuario;
    window.eliminarUsuario = eliminarUsuario;
    window.openUsuarioModal = openUsuarioModal;
  </script>
</body>
</html>
