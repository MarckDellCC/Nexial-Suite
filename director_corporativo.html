<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Panel Director Corporativo</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        body { font-family: Arial, sans-serif; margin: 0; background: #f5f7fa; }
        header { background: #1a1a2e; color: white; padding: 1rem; display: flex; justify-content: space-between; align-items: center; }
        header h1 { margin: 0; font-size: 1.3rem; }
        .user-info { display: flex; align-items: center; gap: 1rem; }
        button.logout { background: #e74c3c; border: none; color: white; padding: 8px 16px; border-radius: 5px; cursor: pointer; }
        .container { max-width: 1400px; margin: 2rem auto; padding: 1rem; }
        .tabs { display: flex; gap: 0.5rem; margin-bottom: 1rem; }
        .tab { padding: 0.5rem 1.5rem; background: #e2e8f0; border: none; border-radius: 5px 5px 0 0; cursor: pointer; }
        .tab.active { background: white; font-weight: bold; }
        .card { background: white; border-radius: 0 5px 5px 5px; padding: 1.5rem; box-shadow: 0 2px 8px rgba(0,0,0,0.05); }
        table { width: 100%; border-collapse: collapse; margin-top: 1rem; }
        th, td { border: 1px solid #dee2e6; padding: 8px; text-align: left; }
        th { background: #e9ecef; }
        .btn { padding: 6px 12px; border: none; border-radius: 4px; cursor: pointer; margin-right: 5px; }
        .btn-primary { background: #2c7be5; color: white; }
        .btn-danger { background: #e74c3c; color: white; }
        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); justify-content: center; align-items: center; }
        .modal-content { background: white; padding: 2rem; border-radius: 10px; width: 500px; max-width: 90%; overflow-y: auto; max-height: 80vh; }
        .form-group { margin-bottom: 1rem; }
        .form-group label { display: block; margin-bottom: 4px; font-weight: bold; }
        .form-group input, .form-group select, .form-group textarea { width: 100%; padding: 8px; border: 1px solid #ccc; border-radius: 5px; box-sizing: border-box; }
        .flex { display: flex; gap: 1rem; margin-bottom: 1rem; }
        .stats-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(250px, 1fr)); gap: 1rem; }
        .stat-card { background: white; border-radius: 8px; padding: 1.5rem; box-shadow: 0 2px 8px rgba(0,0,0,0.05); }
        .stat-value { font-size: 2rem; font-weight: bold; color: #2c7be5; }
        .stat-label { color: #555; }
    </style>
</head>
<body>
    <header>
        <h1>Panel Director Corporativo</h1>
        <div class="user-info">
            <span id="userName"></span>
            <button class="logout" onclick="logout()">Cerrar sesión</button>
        </div>
    </header>

    <div class="container">
        <div class="tabs">
            <button class="tab active" data-tab="empresas">Empresas</button>
            <button class="tab" data-tab="usuarios">Usuarios</button>
            <button class="tab" data-tab="monedas">Monedas</button>
            <button class="tab" data-tab="stats">Estadísticas</button>
        </div>

        <!-- Sección Empresas -->
        <div id="tab-empresas" class="card" style="display:block;">
            <button class="btn btn-primary" onclick="openCreateEmpresa()">+ Nueva Empresa</button>
            <table id="empresasTable">
                <thead>
                    <tr>
                        <th>Nombre</th>
                        <th>Tax ID</th>
                        <th>Moneda</th>
                        <th>Email</th>
                        <th>Activo</th>
                        <th>Acciones</th>
                    </tr>
                </thead>
                <tbody></tbody>
            </table>
        </div>

        <!-- Sección Usuarios -->
        <div id="tab-usuarios" class="card" style="display:none;">
            <button class="btn btn-primary" onclick="openCreateUsuario()">+ Nuevo Usuario</button>
            <table id="usuariosTable">
                <thead>
                    <tr>
                        <th>Nombre</th>
                        <th>Email</th>
                        <th>Usuario</th>
                        <th>Rol</th>
                        <th>Empresa</th>
                        <th>Activo</th>
                        <th>Acciones</th>
                    </tr>
                </thead>
                <tbody></tbody>
            </table>
        </div>

        <!-- Sección Monedas -->
        <div id="tab-monedas" class="card" style="display:none;">
            <button class="btn btn-primary" onclick="openCreateMoneda()">+ Nueva Moneda</button>
            <table id="monedasTable">
                <thead>
                    <tr>
                        <th>Código</th>
                        <th>Nombre</th>
                        <th>Símbolo</th>
                        <th>Tasa de cambio</th>
                        <th>Activo</th>
                        <th>Acciones</th>
                    </tr>
                </thead>
                <tbody></tbody>
            </table>
        </div>

        <!-- Sección Estadísticas -->
        <div id="tab-stats" class="card" style="display:none;">
            <h2>Resumen diario</h2>
            <div class="stats-grid" id="statsContainer"></div>
        </div>
    </div>

    <!-- Modal Empresa -->
    <div class="modal" id="empresaModal">
        <div class="modal-content">
            <h3 id="modalEmpresaTitle">Nueva Empresa</h3>
            <form id="empresaForm">
                <input type="hidden" id="empresaId">
                <div class="form-group"><label>Nombre</label><input type="text" id="nombre" required></div>
                <div class="form-group"><label>Tax ID / CIF / RUT</label><input type="text" id="rfc" required></div>
                <div class="form-group"><label>Moneda</label><select id="moneda_id" required></select></div>
                <div class="form-group"><label>Teléfono</label><input type="text" id="telefono"></div>
                <div class="form-group"><label>Email</label><input type="email" id="emailEmpresa"></div>
                <div class="form-group"><label>Website</label><input type="text" id="website"></div>
                <div class="form-group"><label>Dirección</label><textarea id="direccion" rows="2"></textarea></div>
                <div class="form-group"><label>Activo</label><input type="checkbox" id="activo" checked></div>
                <div class="flex">
                    <button type="submit" class="btn btn-primary">Guardar</button>
                    <button type="button" class="btn btn-danger" onclick="closeModal('empresaModal')">Cancelar</button>
                </div>
            </form>
        </div>
    </div>

    <!-- Modal Usuario -->
    <div class="modal" id="usuarioModal">
        <div class="modal-content">
            <h3 id="modalUsuarioTitle">Nuevo Usuario</h3>
            <form id="usuarioForm">
                <input type="hidden" id="usuarioId">
                <div class="form-group"><label>Empresa</label><select id="usuario_empresa_id" required></select></div>
                <div class="form-group"><label>Nombres</label><input type="text" id="usuario_nombres" required></div>
                <div class="form-group"><label>Apellido Paterno</label><input type="text" id="usuario_apaterno" required></div>
                <div class="form-group"><label>Apellido Materno</label><input type="text" id="usuario_amaterno"></div>
                <div class="form-group"><label>Email</label><input type="email" id="usuario_email" required></div>
                <div class="form-group"><label>Usuario</label><input type="text" id="usuario_usuario" required></div>
                <div class="form-group"><label>Contraseña</label><input type="password" id="usuario_password"></div>
                <div class="form-group"><label>Rol</label><select id="usuario_rol" required>
                    <option value="Director General">Director General</option>
                    <option value="Director Financiero">Director Financiero</option>
                    <option value="Supervisor Senior">Supervisor Senior</option>
                    <option value="Ejecutivo Comercial">Ejecutivo Comercial</option>
                    <option value="Gestor de Almacén">Gestor de Almacén</option>
                    <option value="Especialista Logístico">Especialista Logístico</option>
                </select></div>
                <div class="form-group"><label>Activo</label><input type="checkbox" id="usuario_activo" checked></div>
                <div class="flex">
                    <button type="submit" class="btn btn-primary">Guardar</button>
                    <button type="button" class="btn btn-danger" onclick="closeModal('usuarioModal')">Cancelar</button>
                </div>
            </form>
        </div>
    </div>

    <!-- Modal Moneda -->
    <div class="modal" id="monedaModal">
        <div class="modal-content">
            <h3 id="modalMonedaTitle">Nueva Moneda</h3>
            <form id="monedaForm">
                <input type="hidden" id="monedaId">
                <div class="form-group"><label>Código (3 letras)</label><input type="text" id="codigo" required maxlength="3"></div>
                <div class="form-group"><label>Nombre</label><input type="text" id="moneda_nombre" required></div>
                <div class="form-group"><label>Símbolo</label><input type="text" id="simbolo"></div>
                <div class="form-group"><label>Tasa de cambio</label><input type="number" step="any" id="tasa_cambio"></div>
                <div class="form-group"><label>Activo</label><input type="checkbox" id="moneda_activo" checked></div>
                <div class="flex">
                    <button type="submit" class="btn btn-primary">Guardar</button>
                    <button type="button" class="btn btn-danger" onclick="closeModal('monedaModal')">Cancelar</button>
                </div>
            </form>
        </div>
    </div>

    <script>
        const SUPABASE_URL = 'https://fzwrqragnpircimqbwgp.supabase.co';
        const SUPABASE_ANON_KEY = 'sb_publishable_3AljPZoi7sna9m7SKOeuoA_P4xICJfS';

        const userId = localStorage.getItem('user_id');
        const userRol = localStorage.getItem('user_rol');
        if (!userId || userRol !== 'Director Corporativo') {
            alert('Acceso denegado.');
            window.location.href = 'login.html';
            throw new Error('No autorizado');
        }

        const supabaseClient = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY, {
            global: { headers: { 'x-user-id': userId } }
        });

        document.getElementById('userName').textContent = localStorage.getItem('user_nombres') || 'Usuario';

        // Cambio de pestañas
        document.querySelectorAll('.tab').forEach(btn => {
            btn.addEventListener('click', () => {
                document.querySelectorAll('.tab').forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
                document.querySelectorAll('.card').forEach(c => c.style.display = 'none');
                document.getElementById('tab-' + btn.dataset.tab).style.display = 'block';
                if (btn.dataset.tab === 'empresas') loadEmpresas();
                if (btn.dataset.tab === 'usuarios') loadUsuarios();
                if (btn.dataset.tab === 'monedas') loadMonedas();
                if (btn.dataset.tab === 'stats') loadStats();
            });
        });

        function logout() {
            localStorage.clear();
            window.location.href = 'login.html';
        }

        // ==================== EMPRESAS ====================
        async function loadEmpresas() {
            const { data, error } = await supabaseClient.from('empresas').select('*, monedas(nombre, codigo)').order('nombre');
            if (error) { console.error(error); return; }
            const tbody = document.querySelector('#empresasTable tbody');
            tbody.innerHTML = '';
            data.forEach(emp => {
                tbody.innerHTML += `
                    <tr>
                        <td>${emp.nombre}</td>
                        <td>${emp.rfc}</td>
                        <td>${emp.monedas?.codigo || ''}</td>
                        <td>${emp.email || ''}</td>
                        <td>${emp.activo ? 'Sí' : 'No'}</td>
                        <td>
                            <button class="btn btn-primary" onclick="editEmpresa('${emp.id}')">Editar</button>
                            <button class="btn btn-danger" onclick="deleteRegistro('empresas','${emp.id}',loadEmpresas)">Eliminar</button>
                        </td>
                    </tr>`;
            });
        }

        async function openCreateEmpresa() {
            document.getElementById('modalEmpresaTitle').textContent = 'Nueva Empresa';
            document.getElementById('empresaForm').reset();
            document.getElementById('empresaId').value = '';
            document.getElementById('activo').checked = true;
            await loadMonedasSelect('moneda_id');
            document.getElementById('empresaModal').style.display = 'flex';
        }

        async function editEmpresa(id) {
            document.getElementById('modalEmpresaTitle').textContent = 'Editar Empresa';
            const { data } = await supabaseClient.from('empresas').select('*').eq('id', id).single();
            if (!data) return;
            document.getElementById('empresaId').value = data.id;
            document.getElementById('nombre').value = data.nombre || '';
            document.getElementById('rfc').value = data.rfc || '';
            document.getElementById('telefono').value = data.telefono || '';
            document.getElementById('emailEmpresa').value = data.email || '';
            document.getElementById('website').value = data.website || '';
            document.getElementById('direccion').value = data.direccion || '';
            document.getElementById('activo').checked = data.activo;
            await loadMonedasSelect('moneda_id');
            document.getElementById('moneda_id').value = data.moneda_id;
            document.getElementById('empresaModal').style.display = 'flex';
        }

        document.getElementById('empresaForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const id = document.getElementById('empresaId').value;
            const payload = {
                nombre: document.getElementById('nombre').value,
                rfc: document.getElementById('rfc').value,
                moneda_id: document.getElementById('moneda_id').value,
                telefono: document.getElementById('telefono').value,
                email: document.getElementById('emailEmpresa').value,
                website: document.getElementById('website').value,
                direccion: document.getElementById('direccion').value,
                activo: document.getElementById('activo').checked
            };
            let result;
            if (id) result = await supabaseClient.from('empresas').update(payload).eq('id', id);
            else result = await supabaseClient.from('empresas').insert([payload]);
            if (result.error) alert('Error: ' + result.error.message);
            closeModal('empresaModal');
            loadEmpresas();
        });

        // ==================== USUARIOS ====================
        async function loadUsuarios() {
            const { data, error } = await supabaseClient.from('usuarios').select('*, empresas(nombre)').order('nombres');
            if (error) { console.error(error); return; }
            const tbody = document.querySelector('#usuariosTable tbody');
            tbody.innerHTML = '';
            data.forEach(u => {
                tbody.innerHTML += `
                    <tr>
                        <td>${u.nombres} ${u.apellido_paterno}</td>
                        <td>${u.email}</td>
                        <td>${u.usuario}</td>
                        <td>${u.rol}</td>
                        <td>${u.empresas?.nombre || ''}</td>
                        <td>${u.activo ? 'Sí' : 'No'}</td>
                        <td>
                            <button class="btn btn-primary" onclick="editUsuario('${u.id}')">Editar</button>
                            <button class="btn btn-danger" onclick="deleteRegistro('usuarios','${u.id}',loadUsuarios)">Eliminar</button>
                        </td>
                    </tr>`;
            });
        }

        async function openCreateUsuario() {
            document.getElementById('modalUsuarioTitle').textContent = 'Nuevo Usuario';
            document.getElementById('usuarioForm').reset();
            document.getElementById('usuarioId').value = '';
            document.getElementById('usuario_activo').checked = true;
            document.getElementById('usuario_password').required = true; // requerido en creación
            await loadEmpresasSelect('usuario_empresa_id');
            document.getElementById('usuarioModal').style.display = 'flex';
        }

        async function editUsuario(id) {
            document.getElementById('modalUsuarioTitle').textContent = 'Editar Usuario';
            const { data } = await supabaseClient.from('usuarios').select('*').eq('id', id).single();
            if (!data) return;
            document.getElementById('usuarioId').value = data.id;
            document.getElementById('usuario_nombres').value = data.nombres;
            document.getElementById('usuario_apaterno').value = data.apellido_paterno;
            document.getElementById('usuario_amaterno').value = data.apellido_materno || '';
            document.getElementById('usuario_email').value = data.email;
            document.getElementById('usuario_usuario').value = data.usuario;
            document.getElementById('usuario_rol').value = data.rol;
            document.getElementById('usuario_activo').checked = data.activo;
            document.getElementById('usuario_password').required = false; // opcional en edición
            document.getElementById('usuario_password').value = '';
            await loadEmpresasSelect('usuario_empresa_id');
            document.getElementById('usuario_empresa_id').value = data.empresa_id;
            document.getElementById('usuarioModal').style.display = 'flex';
        }

        document.getElementById('usuarioForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const id = document.getElementById('usuarioId').value;
            const payload = {
                empresa_id: document.getElementById('usuario_empresa_id').value,
                nombres: document.getElementById('usuario_nombres').value,
                apellido_paterno: document.getElementById('usuario_apaterno').value,
                apellido_materno: document.getElementById('usuario_amaterno').value || null,
                email: document.getElementById('usuario_email').value,
                usuario: document.getElementById('usuario_usuario').value,
                rol: document.getElementById('usuario_rol').value,
                activo: document.getElementById('usuario_activo').checked
            };
            const password = document.getElementById('usuario_password').value;
            if (!id || password) {
                // Si se proporciona contraseña, la encriptamos con la función de base de datos
                if (password) {
                    const { data, error } = await supabaseClient.rpc('crypt_password', { pass: password });
                    if (error) { alert('Error al cifrar contraseña'); return; }
                    payload.contrasena = data;
                }
            }
            let result;
            if (id) result = await supabaseClient.from('usuarios').update(payload).eq('id', id);
            else result = await supabaseClient.from('usuarios').insert([payload]);
            if (result.error) alert('Error: ' + result.error.message);
            closeModal('usuarioModal');
            loadUsuarios();
        });

        // Necesitamos una función en BD para cifrar: creamos una RPC sencilla.
        // Si no existe, ejecuta este SQL: CREATE OR REPLACE FUNCTION public.crypt_password(pass text) RETURNS text AS $$ SELECT extensions.crypt(pass, extensions.gen_salt('bf')) $$ LANGUAGE sql SECURITY DEFINER;
        // Ya la incluiré en el SQL de corrección.

        // ==================== MONEDAS ====================
        async function loadMonedas() {
            const { data, error } = await supabaseClient.from('monedas').select('*').order('codigo');
            if (error) return;
            const tbody = document.querySelector('#monedasTable tbody');
            tbody.innerHTML = '';
            data.forEach(m => {
                tbody.innerHTML += `
                    <tr><td>${m.codigo}</td><td>${m.nombre}</td><td>${m.simbolo || ''}</td><td>${m.tasa_cambio || ''}</td><td>${m.activo ? 'Sí' : 'No'}</td>
                    <td><button class="btn btn-primary" onclick="editMoneda('${m.id}')">Editar</button><button class="btn btn-danger" onclick="deleteRegistro('monedas','${m.id}',loadMonedas)">Eliminar</button></td></tr>`;
            });
        }

        async function openCreateMoneda() {
            document.getElementById('modalMonedaTitle').textContent = 'Nueva Moneda';
            document.getElementById('monedaForm').reset();
            document.getElementById('monedaId').value = '';
            document.getElementById('moneda_activo').checked = true;
            document.getElementById('monedaModal').style.display = 'flex';
        }

        async function editMoneda(id) {
            document.getElementById('modalMonedaTitle').textContent = 'Editar Moneda';
            const { data } = await supabaseClient.from('monedas').select('*').eq('id', id).single();
            if (!data) return;
            document.getElementById('monedaId').value = data.id;
            document.getElementById('codigo').value = data.codigo;
            document.getElementById('moneda_nombre').value = data.nombre;
            document.getElementById('simbolo').value = data.simbolo || '';
            document.getElementById('tasa_cambio').value = data.tasa_cambio || '';
            document.getElementById('moneda_activo').checked = data.activo;
            document.getElementById('monedaModal').style.display = 'flex';
        }

        document.getElementById('monedaForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const id = document.getElementById('monedaId').value;
            const payload = {
                codigo: document.getElementById('codigo').value,
                nombre: document.getElementById('moneda_nombre').value,
                simbolo: document.getElementById('simbolo').value,
                tasa_cambio: parseFloat(document.getElementById('tasa_cambio').value) || null,
                activo: document.getElementById('moneda_activo').checked
            };
            let result;
            if (id) result = await supabaseClient.from('monedas').update(payload).eq('id', id);
            else result = await supabaseClient.from('monedas').insert([payload]);
            if (result.error) alert('Error: ' + result.error.message);
            closeModal('monedaModal');
            loadMonedas();
        });

        // ==================== STATS ====================
        async function loadStats() {
            const { data: ventas } = await supabaseClient.from('ventas').select('total, empresa_id, empresas(nombre)').eq('estado', 'completada').gte('fecha', new Date().toISOString().slice(0,10));
            const stats = {};
            ventas?.forEach(v => {
                const empresa = v.empresas?.nombre || 'Desconocida';
                if (!stats[empresa]) stats[empresa] = { total: 0, count: 0 };
                stats[empresa].total += parseFloat(v.total);
                stats[empresa].count++;
            });
            const container = document.getElementById('statsContainer');
            container.innerHTML = Object.entries(stats).map(([emp, values]) => `
                <div class="stat-card">
                    <div class="stat-label">${emp}</div>
                    <div class="stat-value">$${values.total.toFixed(2)}</div>
                    <div>Transacciones: ${values.count}</div>
                </div>`).join('') || '<p>Sin ventas hoy.</p>';
        }

        // Funciones de utilidad
        function closeModal(modalId) {
            document.getElementById(modalId).style.display = 'none';
        }

        async function loadMonedasSelect(selectId) {
            const { data } = await supabaseClient.from('monedas').select('id, nombre, codigo');
            const select = document.getElementById(selectId);
            select.innerHTML = '';
            data.forEach(m => select.innerHTML += `<option value="${m.id}">${m.nombre} (${m.codigo})</option>`);
        }

        async function loadEmpresasSelect(selectId) {
            const { data } = await supabaseClient.from('empresas').select('id, nombre');
            const select = document.getElementById(selectId);
            select.innerHTML = '';
            data.forEach(e => select.innerHTML += `<option value="${e.id}">${e.nombre}</option>`);
        }

        async function deleteRegistro(tabla, id, callback) {
            if (!confirm('¿Eliminar permanentemente?')) return;
            const { error } = await supabaseClient.from(tabla).delete().eq('id', id);
            if (error) alert('Error: ' + error.message);
            else callback();
        }

        // Inicialización
        loadEmpresas();
    </script>
</body>
</html>
