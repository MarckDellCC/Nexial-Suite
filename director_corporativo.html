<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Panel Director Corporativo</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        :root {
            --bg: #f0f2f5;
            --card-bg: #ffffff;
            --primary: #2c7be5;
            --danger: #e74c3c;
            --text: #1a1a2e;
            --text-secondary: #555;
            --border: #dee2e6;
        }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: 'Segoe UI', system-ui, -apple-system, sans-serif; background: var(--bg); color: var(--text); }
        header { background: var(--text); color: white; padding: 1rem 2rem; display: flex; justify-content: space-between; align-items: center; }
        header h1 { font-size: 1.3rem; }
        .user-info { display: flex; align-items: center; gap: 1rem; }
        .btn { padding: 8px 16px; border: none; border-radius: 6px; cursor: pointer; font-size: 0.9rem; }
        .btn-logout { background: var(--danger); color: white; }
        .btn-primary { background: var(--primary); color: white; }
        .btn-sm { padding: 4px 10px; font-size: 0.8rem; }
        .btn-icon { background: none; border: 1px solid var(--border); border-radius: 6px; width: 32px; height: 32px; display: inline-flex; align-items: center; justify-content: center; cursor: pointer; font-weight: bold; vertical-align: middle; }
        .container { max-width: 1400px; margin: 2rem auto; padding: 0 1rem; }
        .tabs { display: flex; gap: 0.25rem; margin-bottom: 0; }
        .tab { padding: 0.75rem 1.5rem; background: #e2e8f0; border: none; cursor: pointer; border-radius: 8px 8px 0 0; font-weight: 500; }
        .tab.active { background: var(--card-bg); color: var(--primary); }
        .card { background: var(--card-bg); border-radius: 0 8px 8px 8px; padding: 1.5rem; box-shadow: 0 2px 8px rgba(0,0,0,0.05); min-height: 400px; }
        table { width: 100%; border-collapse: collapse; margin-top: 1rem; }
        th, td { border: 1px solid var(--border); padding: 10px 12px; text-align: left; }
        th { background: #f8f9fa; font-weight: 600; }
        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); justify-content: center; align-items: center; z-index: 1000; }
        .modal-content { background: white; padding: 2rem; border-radius: 10px; width: 550px; max-width: 95%; max-height: 85vh; overflow-y: auto; }
        .form-group { margin-bottom: 1rem; }
        .form-group label { display: block; margin-bottom: 4px; font-weight: 600; font-size: 0.9rem; }
        .form-group input, .form-group select, .form-group textarea { width: 100%; padding: 8px 10px; border: 1px solid var(--border); border-radius: 6px; font-size: 0.9rem; }
        .form-row { display: flex; gap: 1rem; }
        .form-row .form-group { flex: 1; }
        .flex { display: flex; gap: 1rem; margin-top: 1rem; }
        .select-with-btn { display: flex; gap: 0.5rem; align-items: center; }
        .select-with-btn select { flex: 1; }
        .filter-bar { display: flex; gap: 1rem; align-items: center; margin-bottom: 1rem; }
        .filter-bar label { font-weight: 600; margin-right: 0.25rem; }
        .stats-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(260px, 1fr)); gap: 1rem; }
        .stat-card { background: var(--card-bg); border-radius: 8px; padding: 1.5rem; box-shadow: 0 2px 8px rgba(0,0,0,0.05); }
        .stat-value { font-size: 2rem; font-weight: bold; color: var(--primary); }
        .stat-label { color: var(--text-secondary); }
        .toast { position: fixed; top: 20px; right: 20px; background: #333; color: white; padding: 12px 20px; border-radius: 8px; z-index: 2000; display: none; }
        .toast.error { background: var(--danger); }
        .toast.success { background: #27ae60; }
    </style>
</head>
<body>
    <header>
        <h1>🏢 Panel Director Corporativo</h1>
        <div class="user-info">
            <span id="userName"></span>
            <button class="btn btn-logout" onclick="logout()">Cerrar sesión</button>
        </div>
    </header>

    <div class="container">
        <div class="tabs">
            <button class="tab active" data-tab="empresas">🏭 Empresas</button>
            <button class="tab" data-tab="usuarios">👥 Usuarios</button>
            <button class="tab" data-tab="stats">📊 Estadísticas</button>
        </div>

        <!-- EMPRESAS -->
        <div id="tab-empresas" class="card">
            <div style="display:flex; justify-content:space-between; align-items:center;">
                <h2>Gestión de Empresas</h2>
                <button class="btn btn-primary" onclick="openModalEmpresa()">+ Nueva Empresa</button>
            </div>
            <table id="empresasTable"><thead><tr><th>Nombre</th><th>Registration Number (Tax ID)</th><th>Moneda</th><th>Email</th><th>Activo</th><th></th></tr></thead><tbody></tbody></table>
        </div>

        <!-- USUARIOS -->
        <div id="tab-usuarios" class="card" style="display:none;">
            <div style="display:flex; justify-content:space-between; align-items:center;">
                <h2>Gestión de Usuarios</h2>
                <button class="btn btn-primary" onclick="openModalUsuario()">+ Nuevo Usuario</button>
            </div>
            <div class="filter-bar">
                <div>
                    <label>Empresa:</label>
                    <select id="filtroEmpresa"><option value="">Todas</option></select>
                </div>
                <div>
                    <label>Rol:</label>
                    <select id="filtroRol">
                        <option value="">Todos</option>
                        <option value="Director General">Director General</option>
                        <option value="Director Financiero">Director Financiero</option>
                        <option value="Supervisor Senior">Supervisor Senior</option>
                        <option value="Ejecutivo Comercial">Ejecutivo Comercial</option>
                        <option value="Gestor de Almacén">Gestor de Almacén</option>
                        <option value="Especialista Logístico">Especialista Logístico</option>
                    </select>
                </div>
            </div>
            <table id="usuariosTable"><thead><tr><th>Nombre</th><th>Email</th><th>Usuario</th><th>Rol</th><th>Empresa</th><th>Activo</th><th></th></tr></thead><tbody></tbody></table>
        </div>

        <!-- ESTADÍSTICAS -->
        <div id="tab-stats" class="card" style="display:none;">
            <h2>📈 Resumen de Ventas Hoy</h2>
            <div class="stats-grid" id="statsContainer"></div>
        </div>
    </div>

    <!-- MODAL EMPRESA -->
    <div class="modal" id="empresaModal"><div class="modal-content">
        <h3 id="modalEmpresaTitle">Nueva Empresa</h3>
        <form id="empresaForm"><input type="hidden" id="empresaId">
            <div class="form-group"><label>Nombre *</label><input type="text" id="empNombre" required></div>
            <div class="form-group"><label>Registration Number (Tax ID) *</label><input type="text" id="empRfc" required></div>
            <div class="form-group"><label>Moneda *</label>
                <div class="select-with-btn">
                    <select id="empMoneda" required></select>
                    <button type="button" class="btn-icon" title="Nueva moneda" onclick="openModalMoneda(null, 'empMoneda')">+</button>
                </div>
            </div>
            <div class="form-row"><div class="form-group"><label>Teléfono</label><input type="text" id="empTel"></div><div class="form-group"><label>Email</label><input type="email" id="empEmail"></div></div>
            <div class="form-group"><label>Website</label><input type="text" id="empWeb"></div>
            <div class="form-group"><label>Dirección</label><textarea id="empDir" rows="2"></textarea></div>
            <div class="form-group"><label><input type="checkbox" id="empActivo" checked> Activo</label></div>
            <div class="flex"><button type="submit" class="btn btn-primary">Guardar</button><button type="button" class="btn btn-logout" onclick="closeModal('empresaModal')">Cancelar</button></div>
        </form>
    </div></div>

    <!-- MODAL USUARIO -->
    <div class="modal" id="usuarioModal"><div class="modal-content">
        <h3 id="modalUsuarioTitle">Nuevo Usuario</h3>
        <form id="usuarioForm"><input type="hidden" id="usuarioId">
            <div class="form-group"><label>Empresa *</label><select id="usrEmpresa" required></select></div>
            <div class="form-row"><div class="form-group"><label>Nombres *</label><input type="text" id="usrNombres" required></div><div class="form-group"><label>Apellido Paterno *</label><input type="text" id="usrApaterno" required></div></div>
            <div class="form-group"><label>Apellido Materno</label><input type="text" id="usrAmaterno"></div>
            <div class="form-row"><div class="form-group"><label>Email *</label><input type="email" id="usrEmail" required></div><div class="form-group"><label>Usuario <small>(auto si vacío)</small> *</label><input type="text" id="usrUsuario" required></div></div>
            <div class="form-row"><div class="form-group"><label>Contraseña <span id="usrPassReq">*</span></label><input type="password" id="usrPassword"></div><div class="form-group"><label>Rol *</label><select id="usrRol" required><option value="Director General">Director General</option><option value="Director Financiero">Director Financiero</option><option value="Supervisor Senior">Supervisor Senior</option><option value="Ejecutivo Comercial">Ejecutivo Comercial</option><option value="Gestor de Almacén">Gestor de Almacén</option><option value="Especialista Logístico">Especialista Logístico</option></select></div></div>
            <div class="form-group"><label><input type="checkbox" id="usrActivo" checked> Activo</label></div>
            <div class="flex"><button type="submit" class="btn btn-primary">Guardar</button><button type="button" class="btn btn-logout" onclick="closeModal('usuarioModal')">Cancelar</button></div>
        </form>
    </div></div>

    <!-- MODAL MONEDA (rápido) -->
    <div class="modal" id="monedaModal"><div class="modal-content">
        <h3 id="modalMonedaTitle">Nueva Moneda</h3>
        <form id="monedaForm"><input type="hidden" id="monedaId">
            <div class="form-row"><div class="form-group"><label>Código (3 letras) *</label><input type="text" id="monCodigo" required maxlength="3" style="text-transform:uppercase"></div><div class="form-group"><label>Nombre *</label><input type="text" id="monNombre" required></div></div>
            <div class="form-row"><div class="form-group"><label>Símbolo</label><input type="text" id="monSimbolo"></div><div class="form-group"><label>Tasa de cambio</label><input type="number" step="any" id="monTasa"></div></div>
            <div class="form-group"><label><input type="checkbox" id="monActivo" checked> Activo</label></div>
            <div class="flex"><button type="submit" class="btn btn-primary">Guardar</button><button type="button" class="btn btn-logout" onclick="closeModal('monedaModal')">Cancelar</button></div>
        </form>
    </div></div>

    <div class="toast" id="toast"></div>

    <script>
        // ==================== CONFIGURACIÓN ====================
        const SUPABASE_URL = 'https://lmnajvyfpfeupndwtnjl.supabase.co';
        const SUPABASE_ANON_KEY = 'sb_publishable_sqbIz3nzHMp8z2gvJZbDhA_CPjB3Bo1';

        // ==================== AUTENTICACIÓN ====================
        const userId = localStorage.getItem('user_id');
        const userRol = localStorage.getItem('user_rol');
        if (!userId || userRol !== 'Director Corporativo') {
            alert('Acceso denegado. Redirigiendo al login.');
            window.location.href = 'login.html';
        }

        const supabaseClient = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY, {
            global: { headers: { 'x-user-id': userId } }
        });

        document.getElementById('userName').textContent = localStorage.getItem('user_nombres') || 'Usuario';

        function logout() { localStorage.clear(); window.location.href = 'login.html'; }

        // ==================== TOAST ====================
        function showToast(msg, type = 'success') {
            const t = document.getElementById('toast');
            t.textContent = msg; t.className = 'toast ' + type; t.style.display = 'block';
            setTimeout(() => t.style.display = 'none', 3000);
        }

        // ==================== TABS ====================
        document.querySelectorAll('.tab').forEach(btn => {
            btn.addEventListener('click', () => {
                document.querySelectorAll('.tab').forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
                document.querySelectorAll('#tab-empresas, #tab-usuarios, #tab-stats').forEach(c => c.style.display = 'none');
                document.getElementById('tab-' + btn.dataset.tab).style.display = 'block';
                if (btn.dataset.tab === 'empresas') loadEmpresas();
                if (btn.dataset.tab === 'usuarios') { loadUsuarios(); loadFiltroEmpresas(); }
                if (btn.dataset.tab === 'stats') loadStats();
            });
        });

        // ==================== EMPRESAS ====================
        async function loadEmpresas() {
            const { data, error } = await supabaseClient.from('empresas').select('*, monedas(codigo, nombre)').order('nombre');
            if (error) { showToast('Error cargando empresas: ' + error.message, 'error'); return; }
            const tbody = document.querySelector('#empresasTable tbody');
            tbody.innerHTML = data.map(e => `<tr>
                <td>${e.nombre}</td><td>${e.rfc}</td><td>${e.monedas?.codigo || ''}</td><td>${e.email || ''}</td><td>${e.activo ? '✅' : '❌'}</td>
                <td><button class="btn btn-primary btn-sm" onclick="editEmpresa('${e.id}')">Editar</button> <button class="btn btn-logout btn-sm" onclick="deleteRegistro('empresas','${e.id}',loadEmpresas)">Eliminar</button></td>
            </tr>`).join('');
        }

        async function openModalEmpresa(id = null) {
            document.getElementById('modalEmpresaTitle').textContent = id ? 'Editar Empresa' : 'Nueva Empresa';
            document.getElementById('empresaId').value = id || '';
            document.getElementById('empresaForm').reset();
            document.getElementById('empActivo').checked = true;
            await loadMonedasSelect('empMoneda');
            if (id) {
                const { data } = await supabaseClient.from('empresas').select('*').eq('id', id).single();
                if (data) {
                    document.getElementById('empNombre').value = data.nombre || '';
                    document.getElementById('empRfc').value = data.rfc || '';
                    document.getElementById('empTel').value = data.telefono || '';
                    document.getElementById('empEmail').value = data.email || '';
                    document.getElementById('empWeb').value = data.website || '';
                    document.getElementById('empDir').value = data.direccion || '';
                    document.getElementById('empActivo').checked = data.activo;
                    document.getElementById('empMoneda').value = data.moneda_id;
                }
            }
            document.getElementById('empresaModal').style.display = 'flex';
        }
        function editEmpresa(id) { openModalEmpresa(id); }

        document.getElementById('empresaForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const id = document.getElementById('empresaId').value;
            const payload = {
                nombre: document.getElementById('empNombre').value,
                rfc: document.getElementById('empRfc').value,
                moneda_id: document.getElementById('empMoneda').value,
                telefono: document.getElementById('empTel').value,
                email: document.getElementById('empEmail').value,
                website: document.getElementById('empWeb').value,
                direccion: document.getElementById('empDir').value,
                activo: document.getElementById('empActivo').checked
            };
            const { error } = id ? await supabaseClient.from('empresas').update(payload).eq('id', id) : await supabaseClient.from('empresas').insert([payload]);
            if (error) { showToast('Error: ' + error.message, 'error'); return; }
            showToast('Empresa guardada correctamente');
            closeModal('empresaModal'); loadEmpresas();
        });

        // ==================== USUARIOS (con filtros) ====================
        async function loadUsuarios() {
            const empresaFiltro = document.getElementById('filtroEmpresa')?.value || '';
            const rolFiltro = document.getElementById('filtroRol')?.value || '';
            let query = supabaseClient.from('usuarios').select('*, empresas(nombre)').order('nombres');
            if (empresaFiltro) query = query.eq('empresa_id', empresaFiltro);
            if (rolFiltro) query = query.eq('rol', rolFiltro);
            const { data, error } = await query;
            if (error) { showToast('Error cargando usuarios: ' + error.message, 'error'); return; }
            const tbody = document.querySelector('#usuariosTable tbody');
            tbody.innerHTML = data.map(u => `<tr>
                <td>${u.nombres} ${u.apellido_paterno} ${u.apellido_materno || ''}</td>
                <td>${u.email}</td><td>${u.usuario}</td><td>${u.rol}</td><td>${u.empresas?.nombre || ''}</td><td>${u.activo ? '✅' : '❌'}</td>
                <td><button class="btn btn-primary btn-sm" onclick="editUsuario('${u.id}')">Editar</button> <button class="btn btn-logout btn-sm" onclick="deleteRegistro('usuarios','${u.id}',loadUsuarios)">Eliminar</button></td>
            </tr>`).join('');
        }

        async function loadFiltroEmpresas() {
            const { data } = await supabaseClient.from('empresas').select('id, nombre').order('nombre');
            const select = document.getElementById('filtroEmpresa');
            select.innerHTML = '<option value="">Todas</option>' + data.map(e => `<option value="${e.id}">${e.nombre}</option>`).join('');
        }
        document.getElementById('filtroEmpresa').addEventListener('change', loadUsuarios);
        document.getElementById('filtroRol').addEventListener('change', loadUsuarios);

        async function openModalUsuario(id = null) {
            document.getElementById('modalUsuarioTitle').textContent = id ? 'Editar Usuario' : 'Nuevo Usuario';
            document.getElementById('usuarioId').value = id || '';
            document.getElementById('usuarioForm').reset();
            document.getElementById('usrActivo').checked = true;
            document.getElementById('usrPassReq').textContent = id ? '' : '*';
            document.getElementById('usrPassword').required = !id;
            await loadEmpresasSelect('usrEmpresa');
            if (id) {
                const { data } = await supabaseClient.from('usuarios').select('*').eq('id', id).single();
                if (data) {
                    document.getElementById('usrEmpresa').value = data.empresa_id;
                    document.getElementById('usrNombres').value = data.nombres || '';
                    document.getElementById('usrApaterno').value = data.apellido_paterno || '';
                    document.getElementById('usrAmaterno').value = data.apellido_materno || '';
                    document.getElementById('usrEmail').value = data.email || '';
                    document.getElementById('usrUsuario').value = data.usuario || '';
                    document.getElementById('usrRol').value = data.rol || '';
                    document.getElementById('usrActivo').checked = data.activo;
                }
            }
            document.getElementById('usuarioModal').style.display = 'flex';
        }
        function editUsuario(id) { openModalUsuario(id); }

        // Autocompletar usuario desde email
        document.getElementById('usrEmail').addEventListener('blur', function() {
            const usuarioInput = document.getElementById('usrUsuario');
            if (!usuarioInput.value) {
                const email = this.value;
                if (email.includes('@')) {
                    usuarioInput.value = email.split('@')[0].toLowerCase().replace(/[^a-z0-9_]/g, '_');
                }
            }
        });

        document.getElementById('usuarioForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const id = document.getElementById('usuarioId').value;
            const password = document.getElementById('usrPassword').value;
            const payload = {
                empresa_id: document.getElementById('usrEmpresa').value,
                nombres: document.getElementById('usrNombres').value,
                apellido_paterno: document.getElementById('usrApaterno').value,
                apellido_materno: document.getElementById('usrAmaterno').value || null,
                email: document.getElementById('usrEmail').value,
                usuario: document.getElementById('usrUsuario').value,
                rol: document.getElementById('usrRol').value,
                activo: document.getElementById('usrActivo').checked
            };
            if (password) {
                const { data: crypted, error: errCrypt } = await supabaseClient.rpc('crypt_password', { pass: password });
                if (errCrypt) { showToast('Error cifrando contraseña', 'error'); return; }
                payload.contrasena = crypted;
            }
            const { error } = id ? await supabaseClient.from('usuarios').update(payload).eq('id', id) : await supabaseClient.from('usuarios').insert([payload]);
            if (error) { showToast('Error: ' + error.message, 'error'); return; }
            showToast('Usuario guardado correctamente');
            closeModal('usuarioModal'); loadUsuarios();
        });

        // ==================== MONEDAS (rápido) ====================
        async function openModalMoneda(id = null, refreshSelectId = null) {
            document.getElementById('modalMonedaTitle').textContent = id ? 'Editar Moneda' : 'Nueva Moneda';
            document.getElementById('monedaId').value = id || '';
            document.getElementById('monedaForm').reset();
            document.getElementById('monActivo').checked = true;
            if (id) {
                const { data } = await supabaseClient.from('monedas').select('*').eq('id', id).single();
                if (data) {
                    document.getElementById('monCodigo').value = data.codigo || '';
                    document.getElementById('monNombre').value = data.nombre || '';
                    document.getElementById('monSimbolo').value = data.simbolo || '';
                    document.getElementById('monTasa').value = data.tasa_cambio || '';
                    document.getElementById('monActivo').checked = data.activo;
                }
            }
            document.getElementById('monedaModal').dataset.refreshSelect = refreshSelectId || '';
            document.getElementById('monedaModal').style.display = 'flex';
        }

        document.getElementById('monedaForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const id = document.getElementById('monedaId').value;
            const payload = {
                codigo: document.getElementById('monCodigo').value.toUpperCase(),
                nombre: document.getElementById('monNombre').value,
                simbolo: document.getElementById('monSimbolo').value,
                tasa_cambio: parseFloat(document.getElementById('monTasa').value) || null,
                activo: document.getElementById('monActivo').checked
            };
            const { error } = id ? await supabaseClient.from('monedas').update(payload).eq('id', id) : await supabaseClient.from('monedas').insert([payload]);
            if (error) { showToast('Error: ' + error.message, 'error'); return; }
            showToast('Moneda guardada correctamente');
            closeModal('monedaModal');
            const refreshId = document.getElementById('monedaModal').dataset.refreshSelect;
            if (refreshId) await loadMonedasSelect(refreshId);
        });

        // ==================== ESTADÍSTICAS ====================
        async function loadStats() {
            const today = new Date().toISOString().slice(0, 10);
            const { data: ventas, error } = await supabaseClient.from('ventas').select('total, empresa_id, empresas(nombre)').eq('estado', 'completada').gte('fecha', today);
            if (error) { document.getElementById('statsContainer').innerHTML = '<p>Error cargando estadísticas.</p>'; return; }
            const stats = {};
            (ventas || []).forEach(v => {
                const nombre = v.empresas?.nombre || 'Sin empresa';
                if (!stats[nombre]) stats[nombre] = { total: 0, count: 0 };
                stats[nombre].total += parseFloat(v.total || 0);
                stats[nombre].count++;
            });
            const container = document.getElementById('statsContainer');
            if (Object.keys(stats).length === 0) { container.innerHTML = '<p>No hay ventas registradas hoy.</p>'; return; }
            container.innerHTML = Object.entries(stats).map(([nombre, s]) => `
                <div class="stat-card"><div class="stat-label">${nombre}</div><div class="stat-value">$${s.total.toFixed(2)}</div><div>Transacciones: ${s.count}</div></div>
            `).join('');
        }

        // ==================== UTILIDADES ====================
        function closeModal(id) { document.getElementById(id).style.display = 'none'; }
        async function loadMonedasSelect(selectId) {
            const { data } = await supabaseClient.from('monedas').select('id, codigo, nombre').order('codigo');
            const select = document.getElementById(selectId);
            select.innerHTML = data?.map(m => `<option value="${m.id}">${m.codigo} - ${m.nombre}</option>`).join('') || '';
        }
        async function loadEmpresasSelect(selectId) {
            const { data } = await supabaseClient.from('empresas').select('id, nombre').order('nombre');
            const select = document.getElementById(selectId);
            select.innerHTML = data?.map(e => `<option value="${e.id}">${e.nombre}</option>`).join('') || '';
        }
        async function deleteRegistro(tabla, id, callback) {
            if (!confirm('¿Eliminar este registro permanentemente?')) return;
            const { error } = await supabaseClient.from(tabla).delete().eq('id', id);
            if (error) { showToast('Error: ' + error.message, 'error'); return; }
            showToast('Registro eliminado');
            callback();
        }

        // ==================== INICIALIZACIÓN ====================
        loadEmpresas();
    </script>
</body>
</html>
